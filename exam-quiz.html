<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>军队文职 · 练习测试</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap');
  :root {
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3350;
    --accent:#e8a84c;--accent-dim:rgba(232,168,76,0.12);
    --text:#e8e9f0;--text-dim:#8890a8;
    --correct:#4caf82;--correct-bg:rgba(76,175,130,0.12);
    --wrong:#e85c5c;--wrong-bg:rgba(232,92,92,0.12);
    --radius:12px;--shadow:0 2px 16px rgba(0,0,0,0.3);
  }
  body.day {
    --bg:#f4f5f7;--surface:#fff;--surface2:#eef0f5;--border:#d8dce8;
    --accent:#c47f1a;--accent-dim:rgba(196,127,26,0.10);
    --text:#1a1d2e;--text-dim:#6b7080;
    --correct:#2e8f5e;--correct-bg:rgba(46,143,94,0.10);
    --wrong:#c0392b;--wrong-bg:rgba(192,57,43,0.10);
    --shadow:0 2px 16px rgba(0,0,0,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background .3s,color .3s;}
  .topbar{width:100%;max-width:680px;padding:20px 20px 0;display:flex;justify-content:space-between;align-items:flex-start;}
  .header-label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:500;}
  .topbar-left h1{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:700;margin-top:2px;}
  .theme-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;color:var(--text-dim);cursor:pointer;transition:all .2s;font-family:'Noto Sans SC',sans-serif;margin-top:4px;}
  .theme-btn:hover{border-color:var(--accent);color:var(--accent);}
  .progress-wrap{width:100%;max-width:680px;padding:16px 20px 0;}
  .progress-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-bottom:8px;}
  .progress-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;}
  main{width:100%;max-width:680px;padding:16px 20px 40px;flex:1;}
  .api-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .api-banner label{font-size:13px;color:var(--text-dim);white-space:nowrap;}
  .api-banner input{flex:1;min-width:180px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);font-family:monospace;outline:none;transition:border-color .2s;}
  .api-banner input:focus{border-color:var(--accent);}
  .api-status{font-size:12px;padding:4px 10px;border-radius:12px;white-space:nowrap;}
  .api-status.ok{background:var(--correct-bg);color:var(--correct);}
  .api-status.no{background:var(--wrong-bg);color:var(--wrong);}
  #start-screen{display:flex;flex-direction:column;align-items:center;text-align:center;padding:24px 0 32px;gap:16px;}
  #start-screen .big-icon{font-size:52px;}
  #start-screen h2{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:700;}
  #start-screen p{color:var(--text-dim);font-size:14px;line-height:1.7;max-width:320px;}
  .stats-row{display:flex;gap:10px;width:100%;max-width:360px;}
  .stat-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
  .stat-num{font-size:22px;font-weight:700;color:var(--accent);font-family:'Noto Serif SC',serif;}
  .stat-label{font-size:11px;color:var(--text-dim);margin-top:2px;}
  .config-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 18px;width:100%;max-width:360px;}
  .config-row label{font-size:14px;color:var(--text-dim);flex:1;text-align:left;}
  .config-row select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 10px;font-size:14px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;outline:none;}
  .section-label{font-size:11px;color:var(--text-dim);letter-spacing:.08em;text-align:center;margin:4px 0 8px;}
  .chapter-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:360px;}
  .ch-tag{padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);font-size:13px;color:var(--text-dim);cursor:pointer;transition:all .15s;text-align:left;}
  .ch-tag.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent);}
  .ch-count{font-size:11px;opacity:.7;margin-top:2px;}
  .btn-start{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:14px 48px;font-size:16px;font-weight:700;font-family:'Noto Serif SC',serif;cursor:pointer;transition:opacity .15s;margin-top:4px;}
  .btn-start:hover{opacity:.88;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px;box-shadow:var(--shadow);}
  .q-number{font-size:11px;color:var(--accent);letter-spacing:.1em;font-weight:500;margin-bottom:12px;}
  .q-text{font-family:'Noto Serif SC',serif;font-size:16px;line-height:1.8;color:var(--text);margin-bottom:20px;}
  .options{display:flex;flex-direction:column;gap:9px;}
  .option-btn{display:flex;align-items:flex-start;gap:11px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;transition:all .15s;color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:14px;line-height:1.55;width:100%;}
  .option-btn:hover:not(:disabled){border-color:var(--accent);background:var(--accent-dim);}
  .option-btn:disabled{cursor:default;}
  .option-letter{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text-dim);transition:all .15s;margin-top:1px;}
  .option-btn.correct{border-color:var(--correct);background:var(--correct-bg);}
  .option-btn.correct .option-letter{background:var(--correct);color:#fff;}
  .option-btn.wrong{border-color:var(--wrong);background:var(--wrong-bg);}
  .option-btn.wrong .option-letter{background:var(--wrong);color:#fff;}
  .exp-box{margin-top:14px;padding:14px 16px;border-radius:10px;font-size:13px;line-height:1.7;display:none;border-left:3px solid var(--border);background:var(--surface2);color:var(--text-dim);}
  .exp-box.show{display:block;}
  .exp-box.fb-correct{border-left-color:var(--correct);}
  .exp-box.fb-wrong{border-left-color:var(--wrong);}
  .exp-header{font-size:12px;font-weight:600;letter-spacing:.05em;margin-bottom:6px;}
  .exp-header.fb-correct{color:var(--correct);}
  .exp-header.fb-wrong{color:var(--wrong);}
  .exp-loading{display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:13px;}
  .exp-spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .actions{margin-top:14px;display:flex;justify-content:flex-end;}
  .btn-next{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px 26px;font-size:14px;font-weight:600;font-family:'Noto Sans SC',sans-serif;cursor:pointer;transition:opacity .15s;display:none;}
  .btn-next:hover{opacity:.88;}
  .btn-next.show{display:block;}
  #result-screen{display:none;flex-direction:column;align-items:center;text-align:center;padding:32px 0;gap:18px;}
  #result-screen h2{font-family:'Noto Serif SC',serif;font-size:24px;}
  .score-circle{width:110px;height:110px;border-radius:50%;border:4px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--accent-dim);}
  .score-num{font-family:'Noto Serif SC',serif;font-size:34px;font-weight:700;color:var(--accent);line-height:1;}
  .score-label{font-size:12px;color:var(--text-dim);margin-top:4px;}
  .score-detail{font-size:14px;color:var(--text-dim);line-height:1.8;}
  .review-list{width:100%;max-width:640px;text-align:left;display:flex;flex-direction:column;gap:8px;}
  .review-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.65;}
  .review-item.ri-correct{border-left:3px solid var(--correct);}
  .review-item.ri-wrong{border-left:3px solid var(--wrong);}
  .ri-q{color:var(--text);margin-bottom:5px;}
  .ri-meta{color:var(--text-dim);font-size:12px;}
  .ri-wrong-ans{color:var(--wrong);}
  .ri-correct-ans{color:var(--correct);}
  .btn-restart{background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:10px;padding:12px 36px;font-size:15px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;transition:all .15s;}
  .btn-restart:hover{background:var(--accent-dim);}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="header-label">军队文职 · 备考练习</div>
    <h1>精准刷题，逐题突破</h1>
  </div>
  <button class="theme-btn" id="theme-btn">☀️ 白天</button>
</div>

<div class="progress-wrap" id="progress-wrap" style="display:none">
  <div class="progress-meta">
    <span id="prog-text">第 1 题 / 共 10 题</span>
    <span id="prog-score">得分：0 分</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<main>
  <div class="api-banner">
    <label>🔑 API Key</label>
    <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." autocomplete="off">
    <span class="api-status no" id="api-status">未设置</span>
  </div>

  <div id="start-screen">
    <div class="big-icon">📋</div>
    <h2>开始练习测试</h2>
    <p>从内置题库随机出题，填入 Anthropic API Key 后 AI 自动生成解析。</p>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" id="total-q-count">0</div><div class="stat-label">题库总题数</div></div>
      <div class="stat-box"><div class="stat-num" id="total-ch-count">0</div><div class="stat-label">章节数</div></div>
    </div>
    <div class="config-row">
      <label>每次题目数量</label>
      <select id="q-count">
        <option value="10">10 题</option>
        <option value="20">20 题</option>
        <option value="50">50 题</option>
      </select>
    </div>
    <div class="section-label">选择章节（可多选）</div>
    <div class="chapter-grid" id="chapter-grid"></div>
    <button class="btn-start" id="btn-start">开始测试 →</button>
  </div>

  <div id="quiz-screen" style="display:none">
    <div class="card" id="quiz-card"></div>
    <div class="actions"><button class="btn-next" id="btn-next">下一题 →</button></div>
  </div>

  <div id="result-screen">
    <h2>测试完成 🎉</h2>
    <div class="score-circle">
      <div class="score-num" id="res-score">0</div>
      <div class="score-label">/ <span id="res-total">100</span> 分</div>
    </div>
    <div class="score-detail" id="res-detail"></div>
    <div class="review-list" id="review-list"></div>
    <button class="btn-restart" id="btn-restart">再来一轮</button>
  </div>
</main>

<script>
// ══════════════════════════════════════════════
// 题库 — 在此追加题目即可扩展
// { ch:'章节', q:'题干', opts:[{l,t}], ans:'A' }
// ══════════════════════════════════════════════
const QUESTION_BANK = [
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'《为人民服务》是1944年毛泽东在延安悼念（　）的讲演。',opts:[{l:'A',t:'张思德'},{l:'B',t:'白求恩'},{l:'C',t:'董存瑞'},{l:'D',t:'刘胡兰'}],ans:'A'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'我国新民主主义革命的性质是（　）。',opts:[{l:'A',t:'无产阶级社会主义革命'},{l:'B',t:'共产主义革命'},{l:'C',t:'资产阶级民主主义革命'},{l:'D',t:'无产阶级专政'}],ans:'C'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'党章是党的总章程，是党的根本大法，集中体现了党的理论和（　），规定了党的重要制度。',opts:[{l:'A',t:'路线方针政策'},{l:'B',t:'组织路线'},{l:'C',t:'干部路线'},{l:'D',t:'群众路线'}],ans:'A'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'近代中国的民主革命经历了旧民主主义革命与新民主主义革命两个阶段，区别新民主主义革命与旧民主主义革命的根本标志是革命（　）不同。',opts:[{l:'A',t:'指导思想'},{l:'B',t:'领导权'},{l:'C',t:'前途'},{l:'D',t:'对象'}],ans:'B'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'毛泽东在1957年2月所作报告中，强调社会主义国家政治生活的主题是（　）。',opts:[{l:'A',t:'正确区分和处理两类不同性质的矛盾'},{l:'B',t:'正确处理敌我矛盾'},{l:'C',t:'正确处理人民内部矛盾'},{l:'D',t:'正确认识和处理阶级斗争'}],ans:'C'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'（　）是我们党的根本工作路线，也是我们党的根本领导作风和工作方法。',opts:[{l:'A',t:'政治路线'},{l:'B',t:'群众路线'},{l:'C',t:'组织路线'},{l:'D',t:'改革路线'}],ans:'B'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'（　）通过的《中国共产党章程》把毛泽东思想确立为党必须长期坚持的指导思想。',opts:[{l:'A',t:'党的六届七中全会'},{l:'B',t:'党的七届二中全会'},{l:'C',t:'党的八大'},{l:'D',t:'党的七大'}],ans:'D'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'毛泽东在（　）中提出了"没有调查，没有发言权"的著名论断。',opts:[{l:'A',t:'《共产党人》发刊词'},{l:'B',t:'《湖南农民运动考察报告》'},{l:'C',t:'《反对本本主义》'},{l:'D',t:'《改造我们的学习》'}],ans:'C'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'在（　）时期，毛泽东提出把马克思列宁主义基本原理同中国具体实际进行"第二次结合"。',opts:[{l:'A',t:'土地革命战争'},{l:'B',t:'社会主义革命和建设'},{l:'C',t:'新民主主义革命'},{l:'D',t:'抗日战争'}],ans:'B'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'毛泽东思想初步形成的标志是提出并阐述了（　）。',opts:[{l:'A',t:'农村包围城市、武装夺取政权的思想'},{l:'B',t:'官兵平等'},{l:'C',t:'新民主主义革命理论'},{l:'D',t:'新民主主义革命的总路线'}],ans:'A'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'（　）提出了"把国内外一切积极因素调动起来，为社会主义事业服务"的中心思想。',opts:[{l:'A',t:'《论十大关系》'},{l:'B',t:'《论新阶段》'},{l:'C',t:'《论人民民主专政》'},{l:'D',t:'《论联合政府》'}],ans:'A'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'1929年12月，《古田会议决议》确立了（　）的原则。',opts:[{l:'A',t:'一切行动听指挥'},{l:'B',t:'官兵平等'},{l:'C',t:'党指挥枪'},{l:'D',t:'拥政爱民'}],ans:'C'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'我国社会主义基本制度确立的标志是（　）。',opts:[{l:'A',t:'1956年，社会主义改造基本完成'},{l:'B',t:'1953年，提出过渡时期总路线'},{l:'C',t:'1954年，第一届全国人民代表大会召开'},{l:'D',t:'1956年，党的第八次全国代表大会召开'}],ans:'A'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'一切从实际出发，理论联系实际，（　），在实践中检验和发展真理。',opts:[{l:'A',t:'群众路线'},{l:'B',t:'以人为本'},{l:'C',t:'主观能动'},{l:'D',t:'实事求是'}],ans:'D'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'下列对三种作战形式的表述中，错误的是（　）。',opts:[{l:'A',t:'运动战是正规兵团的作战形式，著名战役有四渡赤水'},{l:'B',t:'阵地战通过防守或夺取阵地来实现战斗目的'},{l:'C',t:'游击战是分散流动的作战形式，是一种群众性的武装斗争形式'},{l:'D',t:'游击战的指导方针是"避敌主力，诱敌深入，集中优势兵力，各个歼灭敌人"'}],ans:'D'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'"三个代表"重要思想中，加深了对建设什么样的党、怎样建设党和（　）的认识。',opts:[{l:'A',t:'实现什么样的发展、怎样发展'},{l:'B',t:'建设什么样的国家、怎样建设国家'},{l:'C',t:'什么是社会主义、怎样建设社会主义'},{l:'D',t:'建设什么样的文化、怎样建设文化'}],ans:'C'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'党的十二大提出（　）重大命题。',opts:[{l:'A',t:'"党和国家领导制度的改革"'},{l:'B',t:'"一个中心，两个基本点"'},{l:'C',t:'"建设有中国特色的社会主义"'},{l:'D',t:'"三步走"发展战略'}],ans:'C'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'两岸关系的政治基础是（　）。',opts:[{l:'A',t:'反对"台独"'},{l:'B',t:'"两岸一家亲"理念'},{l:'C',t:'交流合作'},{l:'D',t:'一个中国原则'}],ans:'D'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'党的十一届三中全会决定，把全党的工作重心转移到（　）上来。',opts:[{l:'A',t:'解放思想'},{l:'B',t:'全面拨乱反正'},{l:'C',t:'社会主义现代化建设'},{l:'D',t:'社会主义民主制度建设'}],ans:'C'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'中华人民共和国成立初期，主要任务是继续完成（　），进而对生产资料私有制进行社会主义改造。',opts:[{l:'A',t:'国防建设'},{l:'B',t:'土地革命'},{l:'C',t:'新民主主义革命'},{l:'D',t:'整风运动'}],ans:'C'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'过渡时期的总路线，采取的方针中不包括（　）。',opts:[{l:'A',t:'继续以阶级斗争为纲'},{l:'B',t:'迈向社会主义工业化'},{l:'C',t:'"一化三改"'},{l:'D',t:'"一体两翼"'}],ans:'A'},

  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'《论持久战》中，毛泽东指出抗日战争最困难的时期是（　）。',opts:[{l:'A',t:'战略防御阶段'},{l:'B',t:'战略相持阶段'},{l:'C',t:'战略反攻阶段'},{l:'D',t:'大决战阶段'}],ans:'B'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'我国对外政策的基本立场是（　）。',opts:[{l:'A',t:'独立自主'},{l:'B',t:'促进世界和平与发展'},{l:'C',t:'和平共处五项原则'},{l:'D',t:'坚持对外开放，加强国际交往'}],ans:'A'},
  {ch:'毛泽东思想与中国特色社会主义理论体系',q:'党的（　）把"三个代表"重要思想确立为党必须长期坚持的指导思想。',opts:[{l:'A',t:'十六大'},{l:'B',t:'十六届三中全会'},{l:'C',t:'十七大'},{l:'D',t:'十七届三中全会'}],ans:'A'},
];

// ══════════════════════════════════════════════
const state={apiKey:'',totalQ:10,selectedChapters:new Set(),pool:[],order:[],current:0,results:[],score:0};

// Theme
let isDark=true;
document.getElementById('theme-btn').addEventListener('click',()=>{
  isDark=!isDark;
  document.body.classList.toggle('day',!isDark);
  document.getElementById('theme-btn').textContent=isDark?'☀️ 白天':'🌙 夜间';
});

// API Key
document.getElementById('api-key-input').addEventListener('input',function(){
  state.apiKey=this.value.trim();
  const s=document.getElementById('api-status');
  if(state.apiKey.startsWith('sk-ant-')){s.className='api-status ok';s.textContent='✓ 已设置';}
  else if(state.apiKey){s.className='api-status no';s.textContent='格式有误';}
  else{s.className='api-status no';s.textContent='未设置';}
});

// Build chapters
(function(){
  const chapters={};
  QUESTION_BANK.forEach(q=>{chapters[q.ch]=(chapters[q.ch]||0)+1;});
  const grid=document.getElementById('chapter-grid');
  Object.entries(chapters).forEach(([ch,cnt])=>{
    state.selectedChapters.add(ch);
    const d=document.createElement('div');
    d.className='ch-tag active';d.dataset.ch=ch;
    d.innerHTML=ch+'<div class="ch-count">'+cnt+' 题</div>';
    d.addEventListener('click',()=>{
      d.classList.toggle('active');
      if(d.classList.contains('active'))state.selectedChapters.add(ch);
      else state.selectedChapters.delete(ch);
    });
    grid.appendChild(d);
  });
  document.getElementById('total-q-count').textContent=QUESTION_BANK.length;
  document.getElementById('total-ch-count').textContent=Object.keys(chapters).length;
})();

// Start
document.getElementById('btn-start').addEventListener('click',()=>{
  if(!state.selectedChapters.size){alert('请至少选择一个章节');return;}
  state.pool=QUESTION_BANK.filter(q=>state.selectedChapters.has(q.ch));
  if(!state.pool.length){alert('所选章节暂无题目');return;}
  state.totalQ=Math.min(parseInt(document.getElementById('q-count').value),state.pool.length);
  const idx=[...Array(state.pool.length).keys()];
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  state.order=idx.slice(0,state.totalQ);
  state.current=0;state.results=[];state.score=0;
  document.getElementById('start-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  document.getElementById('progress-wrap').style.display='block';
  updateProgress();renderQuestion();
});

function renderQuestion(){
  const q=state.pool[state.order[state.current]];
  document.getElementById('btn-next').classList.remove('show');
  document.getElementById('quiz-card').innerHTML=
    '<div class="q-number">第'+(state.current+1)+'题 · 单选 · '+q.ch+'</div>'+
    '<div class="q-text">'+q.q+'</div>'+
    '<div class="options">'+q.opts.map(o=>'<button class="option-btn" data-l="'+o.l+'"><span class="option-letter">'+o.l+'</span><span>'+o.t+'</span></button>').join('')+'</div>'+
    '<div class="exp-box" id="exp-box"></div>';
  document.querySelectorAll('.option-btn').forEach(b=>b.addEventListener('click',()=>handleAnswer(b.dataset.l,q)));
}

async function handleAnswer(letter,q){
  document.querySelectorAll('.option-btn').forEach(b=>{
    b.disabled=true;
    if(b.dataset.l===q.ans)b.classList.add('correct');
    else if(b.dataset.l===letter&&letter!==q.ans)b.classList.add('wrong');
  });
  const ok=letter===q.ans;
  if(ok)state.score+=2;
  state.results.push({q,userAnswer:letter,ok});
  const fb=ok?'fb-correct':'fb-wrong';
  const hdr=ok?'✓ 回答正确':'✗ 正确答案是 '+q.ans;
  const exp=document.getElementById('exp-box');
  exp.className='exp-box show '+fb;
  exp.innerHTML='<div class="exp-header '+fb+'">'+hdr+'</div><div class="exp-loading"><div class="exp-spinner"></div> AI 解析中…</div>';
  const btn=document.getElementById('btn-next');
  btn.textContent=state.current+1>=state.totalQ?'查看结果 →':'下一题 →';
  btn.classList.add('show');
  updateProgress();
  if(state.apiKey.startsWith('sk-ant-')){
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:300,messages:[{role:'user',content:'你是军队文职考试辅导老师。给出以下题目的简明解析（2-3句，直接讲知识点，不重复题干，不要开场白）：\n题目：'+q.q+'\n选项：'+q.opts.map(o=>o.l+'.'+o.t).join('；')+'\n正确答案：'+q.ans+'\n考生选择：'+letter+'（'+(ok?'正确':'错误')+'）'}]})
      });
      const data=await res.json();
      const txt=data.content?.find(b=>b.type==='text')?.text||'（解析获取失败）';
      exp.innerHTML='<div class="exp-header '+fb+'">'+hdr+'</div>'+txt;
    }catch(e){
      exp.innerHTML='<div class="exp-header '+fb+'">'+hdr+'</div>网络错误，解析获取失败。';
    }
  }else{
    exp.innerHTML='<div class="exp-header '+fb+'">'+hdr+'</div>填入 Anthropic API Key 后可获取 AI 解析。';
  }
}

document.getElementById('btn-next').addEventListener('click',()=>{
  state.current++;
  if(state.current>=state.totalQ)showResult();
  else{updateProgress();renderQuestion();}
});

function updateProgress(){
  document.getElementById('prog-fill').style.width=Math.round(state.current/state.totalQ*100)+'%';
  document.getElementById('prog-text').textContent='第'+(state.current+1)+'题 / 共'+state.totalQ+'题';
  document.getElementById('prog-score').textContent='得分：'+state.score+' 分';
}

function showResult(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('progress-wrap').style.display='none';
  const rs=document.getElementById('result-screen');
  rs.style.display='flex';
  const total=state.totalQ*2;
  const correct=state.results.filter(r=>r.ok).length;
  const pct=Math.round(state.score/total*100);
  document.getElementById('res-score').textContent=state.score;
  document.getElementById('res-total').textContent=total;
  document.getElementById('res-detail').innerHTML='答对 '+correct+' / '+state.totalQ+' 题 &nbsp;·&nbsp; 正确率 '+pct+'%<br>'+(pct>=80?'🎉 优秀！继续保持':pct>=60?'📖 良好，还有提升空间':'💪 加油，继续巩固基础');
  document.getElementById('review-list').innerHTML=state.results.map((r,i)=>
    '<div class="review-item '+(r.ok?'ri-correct':'ri-wrong')+'">'+
    '<div class="ri-q">第'+(i+1)+'题：'+r.q.q.substring(0,40)+(r.q.q.length>40?'…':'')+'</div>'+
    '<div class="ri-meta">'+(r.ok?'<span class="ri-correct-ans">✓ 正确：'+r.q.ans+'</span>':'<span class="ri-wrong-ans">✗ 你选：'+r.userAnswer+'</span>　<span class="ri-correct-ans">正确：'+r.q.ans+'</span>')+'</div></div>'
  ).join('');
}

document.getElementById('btn-restart').addEventListener('click',()=>{
  document.getElementById('result-screen').style.display='none';
  document.getElementById('start-screen').style.display='flex';
});
</script>
