<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Codepath · 边造边学</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#15171c;--bg2:#1d2026;--bg3:#252932;--line:#31363f;
  --ink:#e8e6e0;--ink-dim:#9aa0ab;--ink-faint:#6b7280;
  --amber:#e8a33d;--amber-soft:rgba(232,163,61,.14);
  --green:#7fb069;--red:#e06c5e;--cyan:#6fb3c9;
  --shadow:none;
}
:root[data-theme="light"]{
  --bg:#f5f3ee;--bg2:#ffffff;--bg3:#eceae3;--line:#dcd8cf;
  --ink:#2b2a26;--ink-dim:#6b6a63;--ink-faint:#9a988f;
  --amber:#c47d1a;--amber-soft:rgba(196,125,26,.12);
  --green:#5a8a3f;--red:#c5483a;--cyan:#2f7d96;
  --shadow:0 1px 3px rgba(0,0,0,.06);
}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.6;transition:background .2s,color .2s}
.mono{font-family:"SF Mono","JetBrains Mono",Menlo,Consolas,monospace}
.wrap{max-width:680px;margin:0 auto;padding:0 16px 90px}

.top{position:sticky;top:0;z-index:30;background:var(--bg);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:10px}
.top .logo{font-family:"SF Mono",Menlo,monospace;font-weight:700;letter-spacing:.5px;font-size:1rem}
.top .logo .dot{color:var(--amber)}
.top .back{background:none;border:1px solid var(--line);color:var(--ink-dim);border-radius:8px;padding:5px 12px;font-size:.82rem;cursor:pointer}
.top .back:hover{border-color:var(--amber);color:var(--amber)}
.top .spacer{margin-left:auto}
.top .tbtn{background:none;border:none;color:var(--ink-dim);font-size:1.15rem;cursor:pointer;padding:2px 6px}
.top .tbtn:hover{color:var(--amber)}

.hero{padding:26px 0 16px;text-align:center}
.hero h1{font-family:"SF Mono",Menlo,monospace;font-size:1.5rem;font-weight:700;margin-bottom:6px}
.hero p{color:var(--ink-dim);font-size:.86rem;max-width:440px;margin:0 auto}
.agent-bar{margin:22px auto 6px;max-width:460px;background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
.agent-bar .av-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.agent-bar .av-name{font-family:"SF Mono",Menlo,monospace;font-size:.82rem;color:var(--ink-dim)}
.agent-bar .av-ver{font-family:"SF Mono",Menlo,monospace;font-weight:700;font-size:1.4rem;color:var(--amber)}
.agent-bar .track{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.agent-bar .fill{height:100%;background:linear-gradient(90deg,var(--amber),#f0c060);border-radius:4px;transition:width .6s ease}
.agent-bar .av-foot{margin-top:8px;font-size:.74rem;color:var(--ink-faint)}

.stage-head{display:flex;align-items:center;gap:10px;margin:26px 0 12px}
.stage-head .sn{font-family:"SF Mono",Menlo,monospace;font-size:.72rem;color:var(--amber);border:1px solid var(--amber);border-radius:6px;padding:1px 7px}
.stage-head .st{font-size:.92rem;font-weight:600}
.stage-head .sp{margin-left:auto;font-size:.72rem;color:var(--ink-faint)}

.node{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s,transform .15s;box-shadow:var(--shadow)}
.node:hover{border-color:var(--amber);transform:translateX(2px)}
.node.locked{opacity:.5;cursor:not-allowed}
.node.locked:hover{border-color:var(--line);transform:none}
.node .ic{width:34px;height:34px;flex:none;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:"SF Mono",Menlo,monospace;font-size:.82rem;font-weight:700;background:var(--bg3);color:var(--ink-dim)}
.node.done .ic{background:var(--green);color:#fff}
.node.cur .ic{background:var(--amber);color:#fff}
.node .body{flex:1;min-width:0}
.node .body .t{font-size:.92rem;font-weight:600}
.node .body .z{font-size:.76rem;color:var(--ink-dim)}
.node .meta{text-align:right;flex:none}
.node .meta .v{font-family:"SF Mono",Menlo,monospace;font-size:.78rem;color:var(--amber)}
.node .meta .s{font-size:.68rem;color:var(--ink-faint)}

.entry-btns{display:flex;gap:10px;margin-top:18px}
.entry-btns button{flex:1;background:var(--bg2);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:13px;font-size:.88rem;font-weight:600;cursor:pointer;box-shadow:var(--shadow)}
.entry-btns button:hover{border-color:var(--amber)}

.lesson-hd{padding:20px 0 10px;border-bottom:1px solid var(--line);margin-bottom:18px}
.lesson-hd .eyebrow{font-family:"SF Mono",Menlo,monospace;font-size:.72rem;color:var(--amber);letter-spacing:.5px}
.lesson-hd h2{font-size:1.3rem;font-weight:700;margin:4px 0 2px}
.lesson-hd .zh{color:var(--ink-dim);font-size:.9rem}
.lesson-hd .agent-chip{display:inline-block;margin-top:10px;font-family:"SF Mono",Menlo,monospace;font-size:.74rem;background:var(--amber-soft);color:var(--amber);border-radius:20px;padding:3px 12px}

.sec{margin-bottom:24px}
.sec .lab{display:flex;align-items:center;gap:8px;font-family:"SF Mono",Menlo,monospace;font-size:.74rem;color:var(--ink-faint);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.sec .lab::before{content:"";width:18px;height:1px;background:var(--ink-faint)}
/* 可折叠块 */
.sec.fold .lab{cursor:pointer;user-select:none}
.sec.fold .lab .arrow{margin-left:auto;font-size:.8rem;transition:transform .15s}
.sec.fold.closed .lab .arrow{transform:rotate(-90deg)}
.sec.fold.closed .fold-body{display:none}

.codeblock{background:var(--bg3);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:8px;padding:14px 16px;font-family:"SF Mono",Menlo,monospace;font-size:.9rem;overflow-x:auto;white-space:pre;color:var(--ink)}
.codeblock.out{border-left-color:var(--green);color:var(--green);font-size:.86rem}
.codeblock.err{border-left-color:var(--red);color:var(--red);font-size:.84rem}

.brief{font-size:.94rem;color:var(--ink);background:var(--bg2);border-radius:10px;padding:14px 16px;border:1px solid var(--line);box-shadow:var(--shadow)}

.ai-explain{background:var(--bg2);border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)}
.ai-explain .ai-body{padding:14px 16px;font-size:.9rem;min-height:20px;white-space:pre-wrap}
.ai-explain .ai-foot{border-top:1px solid var(--line);padding:8px 12px;font-size:.72rem;color:var(--ink-faint);display:flex;align-items:center;gap:8px}
.gen-btn{background:var(--amber);color:#fff;border:none;border-radius:9px;padding:11px 16px;font-weight:600;font-size:.88rem;cursor:pointer;width:100%}
.gen-btn:disabled{opacity:.6;cursor:default}
.gen-btn.ghost{background:none;border:1px solid var(--line);color:var(--ink-dim);width:auto;padding:7px 14px;font-size:.8rem}
.typing::after{content:"▋";color:var(--amber);animation:bl 1s steps(2) infinite}
@keyframes bl{50%{opacity:0}}

.docquote{background:var(--bg3);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.docquote .q{font-family:Georgia,"Times New Roman",serif;font-size:.96rem;font-style:italic;color:var(--ink);border-left:3px solid var(--cyan);padding-left:12px}
.docquote .src{font-size:.72rem;color:var(--ink-faint);margin-top:6px}

.wcard{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow)}
.wcard .wh{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.wcard .w{font-family:"SF Mono",Menlo,monospace;font-size:1.02rem;font-weight:700;color:var(--amber)}
.wcard .ph{font-size:.76rem;color:var(--ink-faint)}
.wcard .pos{font-size:.74rem;color:var(--ink-dim);font-style:italic}
.wcard .cn{font-size:.9rem;margin-top:2px}
.wcard .tip{font-size:.78rem;color:var(--ink-dim);margin-top:4px;background:var(--bg3);border-radius:6px;padding:6px 9px}

.breakrow{margin-bottom:10px}
.breakrow .why{margin-top:6px;font-size:.84rem;color:var(--ink-dim);padding-left:12px;border-left:2px solid var(--red);white-space:pre-wrap}

.done-btn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:13px;font-weight:700;font-size:.94rem;cursor:pointer;width:100%;margin-top:8px}
.done-btn.undo{background:none;border:1px solid var(--line);color:var(--ink-dim)}

.chat-wrap{padding-top:14px}
.chat-msgs{min-height:200px;margin-bottom:14px}
.msg{margin-bottom:14px;max-width:90%}
.msg.u{margin-left:auto}
.msg .bubble{display:inline-block;padding:10px 14px;border-radius:12px;font-size:.9rem;white-space:pre-wrap;text-align:left}
.msg.u .bubble{background:var(--amber);color:#fff;border-bottom-right-radius:3px}
.msg.a .bubble{background:var(--bg2);border:1px solid var(--line);border-bottom-left-radius:3px}
.chat-input{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--line);padding:10px 16px}
.chat-input .row{max-width:680px;margin:0 auto;display:flex;gap:8px}
.chat-input textarea{flex:1;background:var(--bg3);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:9px 12px;font-size:.9rem;font-family:inherit;resize:none;max-height:100px}
.chat-input button{background:var(--amber);color:#fff;border:none;border-radius:10px;padding:0 18px;font-weight:600;cursor:pointer}
.chat-meta{max-width:680px;margin:0 auto 6px;display:flex;align-items:center;gap:14px;font-size:.74rem;color:var(--ink-faint)}
.chat-meta .think{display:flex;align-items:center;gap:5px;cursor:pointer}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--line);color:var(--ink);padding:10px 18px;border-radius:10px;font-size:.86rem;opacity:0;pointer-events:none;transition:.25s;z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.panel{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:60;align-items:flex-end}
.panel.open{display:flex}
.panel .sheet{background:var(--bg2);width:100%;max-width:680px;margin:0 auto;border-radius:16px 16px 0 0;padding:20px 18px 28px;border:1px solid var(--line);max-height:88vh;overflow-y:auto}
.panel h3{font-size:1rem;margin-bottom:6px}
.panel label{display:block;font-size:.8rem;color:var(--ink-dim);margin:12px 0 4px}
.panel select,.panel input,.panel textarea{width:100%;background:var(--bg3);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:9px 11px;font-size:.88rem;font-family:inherit}
.panel textarea{resize:vertical;min-height:64px}
.panel .toggle-row{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:14px}
.panel .toggle-row .tl{font-size:.86rem}
.switch{position:relative;width:44px;height:24px;flex:none}
.switch input{opacity:0;width:0;height:0}
.switch .sl{position:absolute;inset:0;background:var(--bg3);border:1px solid var(--line);border-radius:24px;cursor:pointer;transition:.2s}
.switch .sl::before{content:"";position:absolute;width:18px;height:18px;left:2px;top:2px;background:var(--ink-dim);border-radius:50%;transition:.2s}
.switch input:checked+.sl{background:var(--amber-soft);border-color:var(--amber)}
.switch input:checked+.sl::before{transform:translateX(20px);background:var(--amber)}
.panel .pbtns{display:flex;gap:10px;margin-top:18px}
.panel .pbtns button{flex:1;border-radius:9px;padding:11px;font-weight:600;font-size:.88rem;cursor:pointer;border:none}
.panel .save{background:var(--amber);color:#fff}
.panel .clear{background:none;border:1px solid var(--line);color:var(--ink-dim)}
.hint{font-size:.74rem;color:var(--ink-faint);margin-top:6px}
</style>
</head>
<body>

<div class="top">
  <button class="back" id="backbtn" onclick="goHome()" style="display:none">← 课程</button>
  <span class="logo">code<span class="dot">·</span>path</span>
  <span class="spacer"></span>
  <button class="tbtn" id="theme-btn" onclick="toggleTheme()" title="白天/黑夜">🌙</button>
  <button class="tbtn" onclick="goAssistant()" title="AI 助手">💬</button>
  <button class="tbtn" onclick="togglePanel()" title="设置">⚙</button>
</div>

<div class="wrap"><div id="view"></div></div>

<div class="toast" id="toast"></div>

<div class="panel" id="panel">
  <div class="sheet">
    <h3>设置</h3>
    <p class="hint">AI 的 Key 与 Vocab AI 共用，那边填过这里自动通用。</p>
    <label>服务商</label>
    <select id="provider">
      <option value="deepseek">DeepSeek</option>
      <option value="doubao">豆包（火山方舟·可看图）</option>
      <option value="kimi">Kimi 月之暗面（可看图）</option>
      <option value="openrouter">OpenRouter</option>
      <option value="anthropic">Anthropic（可看图）</option>
    </select>
    <div id="model-row"><label>模型</label><select id="model"></select></div>
    <label>API Key</label>
    <input id="apikey" type="password" placeholder="sk-...">
    <div id="ep-row" style="display:none"><label>豆包接入点 ID</label><input id="endpoint" placeholder="ep-xxxxxxxx"></div>

    <div class="toggle-row">
      <span class="tl">🧠 深度思考<div class="hint" style="margin:0">DeepSeek/豆包/Anthropic 支持</div></span>
      <label class="switch"><input type="checkbox" id="think-toggle"><span class="sl"></span></label>
    </div>

    <label>关于我（AI 会据此调整讲解）</label>
    <textarea id="profile" placeholder="说说你的背景和目标…"></textarea>
    <p class="hint">比如水平、目标、希望的讲解风格。每次生成都会带上。</p>

    <div class="pbtns">
      <button class="clear" onclick="clearKey()">清空 Key</button>
      <button class="save" onclick="saveCfg()">保存</button>
    </div>
  </div>
</div>

<script src="lessons.js?v=20260703a"></script>
<script>
const CFG_KEY="vocab_v5_cfg";
const SRS_KEY="gh_vocab_srs_v1";
const IMP_KEY="vocab_v5_imported";  // 与 Vocab AI 共用，Codepath 学的词写这里才能进 Vocab 复习队列
const PROG_KEY="codepath_progress_v1";
const CACHE_KEY="codepath_ai_cache_v1";
const PROFILE_KEY="codepath_profile_v1";
const THEME_KEY="codepath_theme_v1";

function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch(e){return d}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function loadStr(k,d){const v=localStorage.getItem(k);return v===null?d:v}

let cfg=load(CFG_KEY,{provider:"deepseek",apikey:"",endpoint:"",models:{},thinkOn:false});
if(!cfg.models)cfg.models={};
if(typeof cfg.thinkOn!=="boolean")cfg.thinkOn=false;
// Key 按 provider 分开存（与 Vocab 共享同一 cfg）
if(!cfg.keys)cfg.keys={};
if(cfg.apikey&&cfg.provider&&!cfg.keys[cfg.provider]){cfg.keys[cfg.provider]=cfg.apikey;save(CFG_KEY,cfg)}
cfg.apikey=cfg.keys[cfg.provider]||"";
let srs=load(SRS_KEY,{});
let prog=load(PROG_KEY,{done:{}});
if(!prog.done)prog.done={};
let aiCache=load(CACHE_KEY,{});
const DEFAULT_PROFILE="我是自学转 AI 应用开发的学习者，有一点编程基础但 Python 是新学。我的首要目标是学完能读懂 Python 官方技术文档和课程材料里的英文。讲解请用简单中文，别太浅也别堆术语，直接一点。";
let profile=loadStr(PROFILE_KEY,DEFAULT_PROFILE);

let page="home", curLesson=null;

function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1700)}

function applyTheme(t){
  document.documentElement.setAttribute("data-theme",t==="light"?"light":"dark");
  const b=document.getElementById("theme-btn");if(b)b.textContent=t==="light"?"☀":"🌙";
}
let theme=loadStr(THEME_KEY,"dark");
function toggleTheme(){theme=theme==="light"?"dark":"light";localStorage.setItem(THEME_KEY,theme);applyTheme(theme)}

function stripMd(s){
  if(!s)return s;
  return s
    .replace(/\*\*(.+?)\*\*/g,"$1")
    .replace(/(^|\s)\*(?!\s)(.+?)\*/g,"$1$2")
    .replace(/^#{1,6}\s+/gm,"")
    .replace(/`{1,3}([^`]+)`{1,3}/g,"$1")
    .replace(/^\s*[-•]\s+/gm,"· ")
    .trim();
}

const MODELS={
  deepseek:[["deepseek-v4-flash","V4 Flash（快·性价比）"],["deepseek-v4-pro","V4 Pro（强·编程数学）"]],
  kimi:[["kimi-k2.6","Kimi K2.6（可看图·最新）"],["kimi-k2.5","Kimi K2.5（可看图）"]],
  openrouter:[["anthropic/claude-haiku-4.5","Claude Haiku 4.5（快）"],["anthropic/claude-sonnet-4","Claude Sonnet 4（强）"],["deepseek/deepseek-chat","DeepSeek V4（性价比）"],["google/gemini-2.5-flash","Gemini 2.5 Flash（快）"]],
  anthropic:[["claude-haiku-4-5-20251001","Claude Haiku 4.5（快）"],["claude-sonnet-4-20250514","Claude Sonnet 4（强）"],["claude-opus-4-20250514","Claude Opus 4（最强）"]],
};
const VISION_PROVIDERS=["anthropic","doubao","kimi"];
function currentModelLabel(){
  const p=cfg.provider;
  if(p==="doubao")return "豆包·"+(cfg.endpoint||"未填接入点");
  const list=MODELS[p]||MODELS.deepseek;
  const id=currentModel();
  const m=list.find(x=>x[0]===id);
  return m?m[1]:id;
}
function currentModel(){
  const p=cfg.provider;
  if(p==="doubao")return cfg.endpoint;
  const list=MODELS[p]||MODELS.deepseek;
  const saved=cfg.models[p];
  if(saved&&list.some(m=>m[0]===saved))return saved;
  return list[0][0];
}

function togglePanel(){document.getElementById("panel").classList.toggle("open")}
function bindCfg(){
  const p=document.getElementById("provider"),k=document.getElementById("apikey"),ep=document.getElementById("endpoint"),epRow=document.getElementById("ep-row");
  const mRow=document.getElementById("model-row"),mSel=document.getElementById("model");
  const th=document.getElementById("think-toggle"),pf=document.getElementById("profile");
  p.value=cfg.provider;k.value=cfg.apikey;ep.value=cfg.endpoint||"";
  th.checked=cfg.thinkOn;pf.value=profile;
  const syncModel=()=>{
    if(cfg.provider==="doubao"||!MODELS[cfg.provider]){mRow.style.display="none";return}
    mRow.style.display="block";
    mSel.innerHTML=MODELS[cfg.provider].map(m=>`<option value="${m[0]}">${m[1]}</option>`).join("");
    mSel.value=currentModel();
  };
  const syncEp=()=>{epRow.style.display=cfg.provider==="doubao"?"block":"none"};
  syncEp();syncModel();
  p.onchange=()=>{
    cfg.provider=p.value;
    cfg.apikey=cfg.keys[cfg.provider]||"";  // 切 provider 带出它的 key
    k.value=cfg.apikey;                       // 同步输入框
    save(CFG_KEY,cfg);syncEp();syncModel();
  };
  k.onchange=()=>{cfg.apikey=k.value.trim();cfg.keys[cfg.provider]=cfg.apikey;save(CFG_KEY,cfg)};
  mSel.onchange=()=>{cfg.models[cfg.provider]=mSel.value;save(CFG_KEY,cfg)};
  th.onchange=()=>{cfg.thinkOn=th.checked;save(CFG_KEY,cfg)};
}
function saveCfg(){
  cfg.provider=document.getElementById("provider").value;
  cfg.apikey=document.getElementById("apikey").value.trim();
  cfg.endpoint=document.getElementById("endpoint").value.trim();
  cfg.thinkOn=document.getElementById("think-toggle").checked;
  cfg.keys[cfg.provider]=cfg.apikey;  // 存进当前 provider 的槽
  save(CFG_KEY,cfg);
  profile=document.getElementById("profile").value.trim();
  localStorage.setItem(PROFILE_KEY,profile);
  document.getElementById("panel").classList.remove("open");
  toast("已保存");
}
function clearKey(){
  cfg.apikey="";cfg.endpoint="";cfg.keys[cfg.provider]="";save(CFG_KEY,cfg);
  document.getElementById("apikey").value="";document.getElementById("endpoint").value="";
  toast("Key 已清空（仅当前服务商）");
}
function withProfile(sys){return profile?sys+"\n\n【关于这位学习者】"+profile:sys}

async function callAI(messages,sys,maxTokens=700){
  if(!cfg.apikey)throw new Error("先在 ⚙ 设置里填 API Key");
  if(cfg.provider==="doubao"&&!cfg.endpoint)throw new Error("豆包需要先填接入点 ID（ep-xxxx）");
  const p=cfg.provider;let url,headers,body,readText;
  if(p==="anthropic"){
    url="https://api.anthropic.com/v1/messages";
    headers={"Content-Type":"application/json","x-api-key":cfg.apikey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
    body={model:currentModel(),max_tokens:maxTokens,messages};
    if(sys)body.system=sys;
    if(cfg.thinkOn)body.thinking={type:"enabled",budget_tokens:2000};
    readText=d=>(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  }else{
    if(p==="doubao")url="https://ark.cn-beijing.volces.com/api/v3/chat/completions";
    else if(p==="deepseek")url="https://api.deepseek.com/v1/chat/completions";
    else if(p==="kimi")url="https://api.moonshot.cn/v1/chat/completions";
    else url="https://openrouter.ai/api/v1/chat/completions";
    const model=p==="doubao"?cfg.endpoint:currentModel();
    headers={"Content-Type":"application/json","Authorization":"Bearer "+cfg.apikey};
    const msgs=sys?[{role:"system",content:sys},...messages]:messages.slice();
    body={model,max_tokens:maxTokens,messages:msgs};
    if(cfg.thinkOn&&(p==="doubao"||p==="deepseek"))body.thinking={type:"enabled"};
    if(p==="kimi")body.thinking={type:"disabled"};
    readText=d=>d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content;
  }
  const r=await fetch(url,{method:"POST",headers,body:JSON.stringify(body)});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||"接口报错");
  const text=readText(d);
  if(!text)throw new Error("空响应");
  return text;
}
async function callAIStream(messages,sys,onChunk,maxTokens=900){
  if(!cfg.apikey)throw new Error("先在 ⚙ 设置里填 API Key");
  if(cfg.provider==="doubao"&&!cfg.endpoint)throw new Error("豆包需要先填接入点 ID（ep-xxxx）");
  const p=cfg.provider;const mdl=currentModel();let url,headers,body,parseLine;
  if(p==="anthropic"){
    url="https://api.anthropic.com/v1/messages";
    headers={"Content-Type":"application/json","x-api-key":cfg.apikey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
    body={model:mdl,max_tokens:maxTokens,messages,stream:true};
    if(sys)body.system=sys;
    if(cfg.thinkOn)body.thinking={type:"enabled",budget_tokens:2000};
    parseLine=o=>(o.type==="content_block_delta"&&o.delta&&o.delta.text)?o.delta.text:"";
  }else{
    if(p==="doubao")url="https://ark.cn-beijing.volces.com/api/v3/chat/completions";
    else if(p==="deepseek")url="https://api.deepseek.com/v1/chat/completions";
    else if(p==="kimi")url="https://api.moonshot.cn/v1/chat/completions";
    else url="https://openrouter.ai/api/v1/chat/completions";
    headers={"Content-Type":"application/json","Authorization":"Bearer "+cfg.apikey};
    body={model:mdl,max_tokens:maxTokens,messages:sys?[{role:"system",content:sys},...messages]:messages,stream:true};
    if(cfg.thinkOn&&(p==="doubao"||p==="deepseek"))body.thinking={type:"enabled"};
    if(p==="kimi")body.thinking={type:cfg.thinkOn?"enabled":"disabled"};
    parseLine=o=>(o.choices&&o.choices[0]&&o.choices[0].delta&&o.choices[0].delta.content)||"";
  }
  const r=await fetch(url,{method:"POST",headers,body:JSON.stringify(body)});
  if(!r.ok){let e="接口报错";try{const j=await r.json();e=j.error&&j.error.message||e}catch(x){}throw new Error(e)}
  const reader=r.body.getReader();const dec=new TextDecoder();let buf="",full="";
  while(true){
    const {done,value}=await reader.read();if(done)break;
    buf+=dec.decode(value,{stream:true});
    const lines=buf.split("\n");buf=lines.pop();
    for(const line of lines){
      const t=line.trim();if(!t||!t.startsWith("data:"))continue;
      const data=t.slice(5).trim();if(data==="[DONE]")continue;
      try{const o=JSON.parse(data);const pc=parseLine(o);if(pc){full+=pc;onChunk(full)}}catch(e){}
    }
  }
  if(!full)throw new Error("空响应");
  return full;
}

function lessonById(id){return LESSONS.find(l=>l.id===id)}
function isDone(id){return !!prog.done[id]}
function doneCount(){return LESSONS.filter(l=>isDone(l.id)).length}
function currentAgentVer(){
  let v="v0.0",note="还没开始——学完第一课，你的 agent 就上线了";
  for(const l of LESSONS){if(isDone(l.id)){v=l.agentVersion;note=l.agentNote}}
  return {v,note};
}
const TOTAL_PLANNED=40;
function progressPct(){return Math.min(100,Math.round(doneCount()/TOTAL_PLANNED*100))}
function currentLessonId(){for(const l of LESSONS){if(!isDone(l.id))return l.id}return null}
function isUnlocked(idx){if(idx===0)return true;return isDone(LESSONS[idx-1].id)}

function render(){
  const v=document.getElementById("view");
  document.getElementById("backbtn").style.display=(page==="lesson"||page==="assistant")?"inline-block":"none";
  if(page==="lesson")return renderLesson(v);
  if(page==="assistant")return renderAssistant(v);
  return renderHome(v);
}
function goHome(){page="home";curLesson=null;window.scrollTo(0,0);render()}
function goAssistant(){page="assistant";window.scrollTo(0,0);render()}
function openLesson(id,idx){
  if(!isUnlocked(idx)){toast("先完成上一节");return}
  page="lesson";curLesson=id;window.scrollTo(0,0);render();
}

function renderHome(v){
  const a=currentAgentVer();const ver=a.v,note=a.note;
  const pct=progressPct();
  const stages={};
  LESSONS.forEach((l,i)=>{(stages[l.stage]=stages[l.stage]||[]).push({l,i})});
  const curId=currentLessonId();
  let stagesHtml="";
  Object.keys(stages).sort((a,b)=>a-b).forEach(sn=>{
    const items=stages[sn];const name=items[0].l.stageName;
    const sdone=items.filter(x=>isDone(x.l.id)).length;
    stagesHtml+=`<div class="stage-head"><span class="sn">Stage ${sn}</span><span class="st">${name}</span><span class="sp">${sdone}/${items.length}</span></div>`;
    items.forEach(function(o){
      const l=o.l,i=o.i;
      const done=isDone(l.id), cur=l.id===curId, locked=!isUnlocked(i);
      const cls=done?"done":(cur?"cur":(locked?"locked":""));
      const ic=done?"✓":(locked?"🔒":l.num);
      stagesHtml+=`<div class="node ${cls}" onclick="openLesson('${l.id}',${i})">
        <div class="ic">${ic}</div>
        <div class="body"><div class="t">${l.title}</div><div class="z">${l.titleZh} · ${l.minutes} 分钟</div></div>
        <div class="meta"><div class="v">${l.agentVersion}</div><div class="s">${done?"已学":(cur?"在学":"")}</div></div>
      </div>`;
    });
  });
  v.innerHTML=`
    <div class="hero">
      <h1>边造边学</h1>
      <p>40 节课，造一个会进化的 debug agent。每节让它强一点，英文顺手学会。</p>
      <div class="agent-bar">
        <div class="av-head"><span class="av-name">// your debug_agent.py</span><span class="av-ver">${ver}</span></div>
        <div class="track"><div class="fill" style="width:${pct}%"></div></div>
        <div class="av-foot">${note} · 已完成 ${doneCount()}/${TOTAL_PLANNED} 课（${pct}%）</div>
      </div>
      <div class="entry-btns">
        <button onclick="goAssistant()">💬 问 AI 助手</button>
        <button onclick="togglePanel()">⚙ 设置 / 关于我</button>
      </div>
    </div>
    ${stagesHtml}`;
}

function addWordsToSrs(id){
  const l=lessonById(id);
  let imported=load(IMP_KEY,[]);
  let added=0;
  l.words.forEach(w=>{
    const wid="cp_"+id+"_"+w.word;
    // 完整词条写进 Vocab 共用词库（cat=codepath），这样才会出现在 Vocab 的 allWords/复习队列里
    if(!imported.some(x=>x.id===wid)){
      imported.push({id:wid,word:w.word,phonetic:w.phonetic||"",pos:w.pos||"",cn:w.cn||"",tip:w.tip||"",exampleEn:w.exampleEn||"",exampleCn:w.exampleCn||"",scene:w.scene||"",cat:"codepath"});
      added++;
    }
    // 同时建 SRS 记忆条目，立即可复习
    if(!srs[wid])srs[wid]={ef:2.5,interval:0,reps:0,due:Date.now()};
  });
  save(IMP_KEY,imported);
  save(SRS_KEY,srs);
  toast(added?`已加入 ${added} 个词，去 Vocab AI「复习/库」里复习`:"这些词已在复习库里了");
}

  if(!cfg.apikey)toast(`${p} 还没填 Key，去设置（⚙）里填`);
  renderAssistant(document.getElementById("view"));
}
function modelLabel(){
  const p=cfg.provider;
  if(p==="doubao")return "豆包·"+(cfg.endpoint||"未填");
  const list=MODELS[p]||MODELS.deepseek;const id=currentModel();
  const m=list.find(x=>x[0]===id);return m?m[1]:id;
}
function quickToggleThink(){cfg.thinkOn=!cfg.thinkOn;save(CFG_KEY,cfg);const el=document.getElementById("think-ind");if(el)el.textContent=cfg.thinkOn?"🧠 思考开":"🧠 思考关"}
function chatBubble(role,content){return `<div class="msg ${role==="user"?"u":"a"}"><span class="bubble">${esc(content)}</span></div>`}
async function sendChat(){
  const inp=document.getElementById("chat-in");const q=inp.value.trim();if(!q)return;
  inp.value="";
  chatHist.push({role:"user",content:q});
  const msgs=document.getElementById("chat-msgs");
  msgs.innerHTML=chatHist.map(m=>chatBubble(m.role,m.content)).join("")+`<div class="msg a"><span class="bubble typing" id="live"></span></div>`;
  window.scrollTo(0,document.body.scrollHeight);
  const sys=withProfile("你是耐心的编程+英语老师，面向中文学习者，重点帮 ta 读懂 Python 文档和课程。回答简明、亲切、直接。重要：纯文本，不要用 Markdown 符号（不要星号、井号、反引号等）。");
  try{
    let full=await callAIStream(chatHist.map(m=>({role:m.role,content:m.content})),sys,t=>{const live=document.getElementById("live");if(live)live.textContent=t;window.scrollTo(0,document.body.scrollHeight)},1000);
    full=stripMd(full);
    chatHist.push({role:"assistant",content:full});
    const cm=document.getElementById("chat-msgs");if(cm)cm.innerHTML=chatHist.map(m=>chatBubble(m.role,m.content)).join("");
    window.scrollTo(0,document.body.scrollHeight);
  }catch(e){
    const live=document.getElementById("live");if(live){live.classList.remove("typing");live.textContent="出错了："+e.message;live.style.color="var(--red)"}
    chatHist.pop();
  }
}

applyTheme(theme);
bindCfg();
render();

if(typeof window!=="undefined"){
  window.render=render;window.goHome=goHome;window.goAssistant=goAssistant;window.openLesson=openLesson;
  window.toggleDone=toggleDone;window.addWordsToSrs=addWordsToSrs;
  window.renderHome=renderHome;window.renderLesson=renderLesson;window.renderAssistant=renderAssistant;
  window.currentAgentVer=currentAgentVer;window.isDone=isDone;
  window.toggleTheme=toggleTheme;window.stripMd=stripMd;window.sendChat=sendChat;
  window.togglePanel=togglePanel;window.saveCfg=saveCfg;window.genExplain=genExplain;
  window.genDoc=genDoc;window.genBreak=genBreak;window.quickToggleThink=quickToggleThink;
  window.genExercise=genExercise;window.checkExercise=checkExercise;
  window.toggleFold=toggleFold;window.switchProvider=switchProvider;
}
</script>
