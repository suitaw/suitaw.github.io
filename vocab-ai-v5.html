<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Vocab AI v5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f6f2e9; --paper2:#efe9da; --card:#fffdf7; --ink:#2b2620; --ink-dim:#6b6358;
  --line:#ddd4c2; --accent:#b5462f; --accent-soft:#e8d3cb; --green:#5a7a4e; --gold:#c08a2d;
  --shadow:0 1px 3px rgba(43,38,32,.08),0 8px 24px rgba(43,38,32,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--paper);color:var(--ink);font-family:Inter,system-ui,sans-serif;line-height:1.6;padding-bottom:72px}
.wrap{max-width:640px;margin:0 auto;padding:16px}
h1{font-family:Fraunces,serif;font-weight:700;font-size:1.5rem;letter-spacing:-.01em}
.sub{color:var(--ink-dim);font-size:.78rem;margin-top:2px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0 16px}
.gear{background:none;border:1px solid var(--line);border-radius:10px;padding:6px 10px;font-size:.78rem;color:var(--ink-dim);cursor:pointer}
.gear:active{background:var(--paper2)}

/* 设置面板 */
.panel{display:none;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.panel.open{display:block}
.panel label{display:block;font-size:.72rem;color:var(--ink-dim);margin:10px 0 4px;font-weight:500}
.panel input,.panel select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--paper);font-size:.85rem;color:var(--ink);font-family:inherit}
.panel .hint{font-size:.68rem;color:var(--ink-dim);margin-top:6px;line-height:1.5}

/* 闪卡 */
.stage{text-align:center;padding:8px 0}
.progress{font-size:.72rem;color:var(--ink-dim);margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:32px 22px;box-shadow:var(--shadow);min-height:200px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;position:relative;overflow:hidden;touch-action:pan-y}
.card.swiping{transition:none}
.card.snap{transition:transform .2s ease,opacity .2s ease}
.cat-tag{position:absolute;top:12px;right:14px;font-size:.6rem;color:var(--ink-dim);border:1px solid var(--line);border-radius:20px;padding:2px 8px}
.word{font-family:Fraunces,serif;font-size:2.4rem;font-weight:600;letter-spacing:-.02em}
.phonetic{color:var(--accent);font-size:1rem;margin-top:6px;font-family:Fraunces,serif}
.speak{background:none;border:1px solid var(--line);border-radius:20px;padding:5px 14px;font-size:.78rem;color:var(--ink-dim);cursor:pointer;margin-top:14px;align-self:center;transition:transform .1s,border-color .1s}
.speak.playing{border-color:var(--green);color:var(--green);transform:scale(1.08)}
.flip-hint{font-size:.68rem;color:var(--ink-dim);margin-top:18px}
.back{border-top:1px dashed var(--line);margin-top:18px;padding-top:16px;text-align:left}
.cn{font-size:1.15rem;font-weight:600;margin-bottom:8px}
.tip{font-size:.8rem;color:var(--ink-dim);background:var(--paper2);border-radius:8px;padding:8px 11px;margin-bottom:10px}
.ex{font-size:.85rem;margin-bottom:3px}
.ex-cn{font-size:.78rem;color:var(--ink-dim)}

/* 评分按钮 */
.grades{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:18px}
.grade{padding:11px 4px;border:1px solid var(--line);border-radius:11px;background:var(--card);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink)}
.grade small{display:block;font-size:.6rem;font-weight:400;color:var(--ink-dim);margin-top:2px}
.grade:active{transform:scale(.96)}
.g-again{border-color:var(--accent-soft)} .g-again:active{background:var(--accent-soft)}
.g-good{border-color:#cfe0c4} .g-good:active{background:#e6efe0}

/* AI 造句区 */
.ai-box{margin-top:16px;text-align:left}
.ai-box textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-family:inherit;font-size:.85rem;resize:vertical;min-height:64px;background:var(--paper)}
.ai-btn{margin-top:8px;width:100%;padding:10px;border:none;border-radius:10px;background:var(--ink);color:var(--paper);font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit}
.ai-btn:disabled{opacity:.5}
.ai-result{margin-top:12px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:.82rem;display:none}
.ai-result.show{display:block}
.ai-result .score{font-family:Fraunces,serif;font-size:1.4rem;font-weight:700;color:var(--green)}
.ai-result .label{font-size:.7rem;color:var(--ink-dim)}
.ai-result .row{margin-top:8px}
.ai-result .rw{font-style:italic;color:var(--accent)}

/* 完成态 / 空态 */
.done{text-align:center;padding:48px 20px;color:var(--ink-dim)}
.done h2{font-family:Fraunces,serif;color:var(--ink);font-size:1.4rem;margin-bottom:8px}

/* 底部导航 */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.nav button{background:none;border:none;font-size:.72rem;color:var(--ink-dim);cursor:pointer;font-family:inherit;padding:4px 16px;border-radius:8px}
.nav button.active{color:var(--accent);font-weight:600}

/* 复习本 */
.mistake-item{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.mistake-item .w{font-family:Fraunces,serif;font-weight:600;font-size:1.05rem}
.mistake-item .c{font-size:.78rem;color:var(--ink-dim)}

.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:9px 16px;border-radius:20px;font-size:.78rem;opacity:0;transition:opacity .2s;pointer-events:none;z-index:99}
.import-overlay{display:none;position:fixed;inset:0;background:rgba(43,38,32,.4);z-index:200;overflow-y:auto;padding:20px 12px}
.import-overlay.open{display:block}
.import-box{max-width:560px;margin:20px auto;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 12px 40px rgba(43,38,32,.2)}
.toast.show{opacity:1}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
.typing{display:inline-flex;gap:4px;align-items:center;padding:4px 2px}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--ink-dim);opacity:.4;animation:typing-bounce 1.2s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typing-bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>Vocab AI</h1>
      <div class="sub" id="sub">每天背几个，慢慢攒</div>
    </div>
    <button class="gear" onclick="togglePanel()">⚙ 设置</button>
  </div>

  <div class="panel" id="panel">
    <label>AI 服务商</label>
    <select id="provider">
      <option value="deepseek">DeepSeek（纯文本·性价比）</option>
      <option value="doubao">豆包 / 火山方舟</option>
      <option value="openrouter">OpenRouter（一把 Key 多模型）</option>
      <option value="anthropic">Anthropic 直连</option>
    </select>
    <label>API Key</label>
    <input type="password" id="apikey" placeholder="sk-..." autocomplete="off">
    <div id="ep-row" style="display:none">
      <label>火山方舟接入点 ID</label>
      <input type="text" id="endpoint" placeholder="ep-xxxx（在火山控制台创建推理接入点后获得）" autocomplete="off">
    </div>
    <div class="hint">Key 只存在你本机浏览器里，不上传。造句批改是可选功能，不填 Key 也能正常背单词。<br>豆包用的是火山方舟接入点，需要填 ep-xxxx；DeepSeek 直接填 sk- 开头的 Key。</div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="ai-btn" style="flex:1" onclick="saveCfg()">保存设置</button>
      <button class="gear" onclick="clearKey()">清空 Key</button>
    </div>
    <button class="gear" style="width:100%;margin-top:8px" onclick="exportImported()">导出我导入的词（JSON）</button>
  </div>

  <div id="view"></div>
</div>

<div class="nav">
  <button id="nav-home" class="active" onclick="go('home')">学习</button>
  <button id="nav-assistant" onclick="go('assistant')">AI 助手</button>
  <button id="nav-mistake" onclick="go('mistake')">复习本</button>
  <button id="nav-stats" onclick="go('stats')">统计</button>
</div>

<div class="toast" id="toast"></div>
<div class="import-overlay" id="import-overlay"></div>

<script src="words.js?v=20260621"></script>
<script>
// ===== 状态 =====
const SRS_KEY="gh_vocab_srs_v1";
const CFG_KEY="vocab_v5_cfg";
let srs=load(SRS_KEY,{});          // {id:{ef,interval,reps,due}}
let cfg=load(CFG_KEY,{provider:"deepseek",apikey:"",endpoint:"",scope:"all",chatTier:"fast"});
if(!cfg.chatTier)cfg.chatTier="fast";
let queue=[], cur=null, flipped=false, page="home";

function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch(e){return d}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1600)}

// ===== 导入词库 =====
const IMP_KEY="vocab_v5_imported";
let imported=load(IMP_KEY,[]);   // 用户导入的词，结构同 WORDS，cat:"import"
// 全局词表 = 内置 + 导入。所有取词的地方用 allWords()
function allWords(){return WORDS.concat(imported)}

// ===== 设置面板 =====
function togglePanel(){document.getElementById("panel").classList.toggle("open")}
function bindCfg(){
  const p=document.getElementById("provider"),k=document.getElementById("apikey"),ep=document.getElementById("endpoint"),epRow=document.getElementById("ep-row");
  p.value=cfg.provider;k.value=cfg.apikey;ep.value=cfg.endpoint||"";
  const syncEpRow=()=>{epRow.style.display=cfg.provider==="doubao"?"block":"none"};
  syncEpRow();
  p.onchange=()=>{cfg.provider=p.value;save(CFG_KEY,cfg);syncEpRow()};
  k.onchange=()=>{cfg.apikey=k.value.trim();save(CFG_KEY,cfg)};
  ep.onchange=()=>{cfg.endpoint=ep.value.trim();save(CFG_KEY,cfg)};
}
// 显式保存：读当前控件值存盘，折叠面板
function saveCfg(){
  cfg.provider=document.getElementById("provider").value;
  cfg.apikey=document.getElementById("apikey").value.trim();
  cfg.endpoint=document.getElementById("endpoint").value.trim();
  save(CFG_KEY,cfg);
  document.getElementById("panel").classList.remove("open");
  toast("已保存");
}
function clearKey(){
  cfg.apikey="";cfg.endpoint="";save(CFG_KEY,cfg);
  document.getElementById("apikey").value="";
  document.getElementById("endpoint").value="";
  toast("Key 已清空");
}

// ===== SM-2 =====
function grade(id,q){ // q: 0=again,3=hard,4=good,5=easy
  let c=srs[id]||{ef:2.5,interval:0,reps:0};
  if(q<3){c.reps=0;c.interval=1}
  else{
    c.reps++;
    if(c.reps===1)c.interval=1;
    else if(c.reps===2)c.interval=6;
    else c.interval=Math.round(c.interval*c.ef);
    c.ef=Math.max(1.3,c.ef+(0.1-(5-q)*(0.08+(5-q)*0.02)));
  }
  c.due=Date.now()+c.interval*86400000;
  srs[id]=c;save(SRS_KEY,srs);
}

function looseCatsNow(){
  const builtinKeys=["all","nce2","dev","tv","life","biz","academic","news"];
  const all=allWords();
  return [...new Set(imported.map(w=>w.cat))].filter(c=>!builtinKeys.includes(c)&&c!=="import"&&c!=="other"&&all.filter(w=>w.cat===c).length<3);
}
function inScope(w){
  if(cfg.scope==="all")return true;
  if(cfg.scope==="__fav__")return w.cat==="import"||w.cat==="other"||looseCatsNow().includes(w.cat);
  return w.cat===cfg.scope;
}
function buildQueue(){
  const now=Date.now();
  queue=allWords().filter(inScope).filter(w=>{
    const c=srs[w.id];return !c||!c.due||c.due<=now;
  });
  // 简单排序：新词和到期词混合，限每轮 20
  queue=queue.slice(0,20);
}

// ===== 渲染 =====
function go(p){page=p;["home","assistant","mistake","stats"].forEach(x=>{const el=document.getElementById("nav-"+x);if(el)el.classList.toggle("active",x===p)});render()}
let studyStarted=false;  // 是否已从分类页进入学习
function render(){
  const v=document.getElementById("view");
  if(page==="assistant")return renderAssistant(v);
  if(page==="mistake")return renderMistake(v);
  if(page==="stats")return renderStats(v);
  // home：未开始学习时显示分类选择，已开始则显示卡片
  if(page==="home"&&!studyStarted)return renderHome(v);
  // study (卡片)
  if(!cur){buildQueue();cur=queue[0]||null;flipped=false}
  if(!cur){
    v.innerHTML=`<div class="done"><h2>这组都复习完啦</h2><p>当前分类没有到期的词。</p><button class="ai-btn" style="max-width:200px;margin:16px auto 0" onclick="backToHome()">← 选其他分类</button></div>`;return;
  }
  v.innerHTML=`
    <div class="stage">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <button class="gear" onclick="backToHome()">← 返回</button>
        <div class="progress" style="margin:0">本轮剩 ${queue.length} 词</div>
      </div>
      <div class="card" id="card" onclick="if(!flipped)flip()">
        <span class="cat-tag">${catName(cur.cat)}</span>
        <div class="word">${cur.word}</div>
        <div class="phonetic">${cur.phonetic}</div>
        <button class="speak" onclick="event.stopPropagation();speak(this)">🔊 发音</button>
        ${flipped?backHtml():`<div class="flip-hint">点卡片看释义 · 左滑下一个，右滑返回</div>`}
      </div>
      ${flipped?gradesHtml():""}
      ${flipped?aiHtml():""}
    </div>`;
  bindSwipe();
}
function catName(c){
  const fixed={nce2:"新概念二",dev:"科技开发",tv:"影视口语",life:"日常生活",biz:"职场商务",academic:"学术阅读",news:"新闻时事",other:"其他",import:"我的收藏"};
  return fixed[c]||c;
}
function backToHome(){studyStarted=false;cur=null;flipped=false;viewed=[];go("home")}
// 分类选择页（内置 + 7大类，词数<3的归入"我的收藏"显示）
function renderHome(v){
  const MIN=3;  // 自定义大类至少3词才单独成类
  const all=allWords();
  // 固定候选分类（按顺序），有词才显示
  const fixedCats=[
    {key:"all",name:"全部",desc:"混合所有分类"},
    {key:"nce2",name:"新概念二",desc:"课本基础生词"},
    {key:"dev",name:"科技开发",desc:"编程·报错·文档·AI"},
    {key:"tv",name:"影视口语",desc:"看剧高频·课本不教"},
    {key:"life",name:"日常生活",desc:"衣食住行·社交"},
    {key:"biz",name:"职场商务",desc:"邮件·会议·办公"},
    {key:"academic",name:"学术阅读",desc:"论文·正式书面"},
    {key:"news",name:"新闻时事",desc:"报道·政经·社会"},
  ];
  // "我的收藏"特殊处理：装 import + 所有词数<3 的零散分类
  const builtinKeys=fixedCats.map(c=>c.key);
  const looseCats=[...new Set(imported.map(w=>w.cat))].filter(c=>{
    if(builtinKeys.includes(c))return false;       // 已是固定大类的不算零散
    return all.filter(w=>w.cat===c).length<MIN;     // 词数不足才算零散
  });
  // 收藏分类的词 = cat为import的 + 零散分类的 + other
  const favCount=all.filter(w=>w.cat==="import"||w.cat==="other"||looseCats.includes(w.cat)).length;

  const rows=[];
  fixedCats.forEach(c=>{
    const n=all.filter(w=>c.key==="all"||w.cat===c.key).length;
    if(n===0)return;
    const due=all.filter(w=>(c.key==="all"||w.cat===c.key)&&(!srs[w.id]||!srs[w.id].due||srs[w.id].due<=Date.now())).length;
    rows.push({key:c.key,name:c.name,desc:c.desc,n,due});
  });
  // 词数≥3的自定义大类（非固定、非零散）也单独显示
  const bigCustom=[...new Set(imported.map(w=>w.cat))].filter(c=>!builtinKeys.includes(c)&&c!=="import"&&c!=="other"&&all.filter(w=>w.cat===c).length>=MIN);
  bigCustom.forEach(c=>{
    const n=all.filter(w=>w.cat===c).length;
    const due=all.filter(w=>w.cat===c&&(!srs[w.id]||!srs[w.id].due||srs[w.id].due<=Date.now())).length;
    rows.push({key:c,name:catName(c),desc:"自动归类",n,due});
  });
  // 我的收藏（兜底，含零散词）
  if(favCount>0){
    const due=all.filter(w=>(w.cat==="import"||w.cat==="other"||looseCats.includes(w.cat))&&(!srs[w.id]||!srs[w.id].due||srs[w.id].due<=Date.now())).length;
    rows.push({key:"__fav__",name:"我的收藏",desc:"零散词·攒够会自动成类",n:favCount,due});
  }
  v.innerHTML=`<div style="padding-top:8px">
    <p style="color:var(--ink-dim);font-size:.82rem;margin-bottom:14px">选一个分类开始背：</p>
    ${rows.map(r=>`<div class="mistake-item" style="cursor:pointer" onclick="startStudy('${r.key}')">
        <div><div class="w">${r.name}</div><div class="c">${r.desc} · 共 ${r.n} 词</div></div>
        <div style="text-align:right"><div style="font-family:Fraunces,serif;font-weight:700;color:var(--accent)">${r.due}</div><div class="c">待学</div></div>
      </div>`).join("")}
    <button class="ai-btn" style="margin-top:14px" onclick="openImport()">＋ 导入生词（文章/图片）</button>
  </div>`;
}
// 收藏聚合分类的判断
function isFavWord(w,looseCats){return w.cat==="import"||w.cat==="other"||(looseCats&&looseCats.includes(w.cat))}
function startStudy(cat){cfg.scope=cat;save(CFG_KEY,cfg);studyStarted=true;cur=null;flipped=false;viewed=[];buildQueue();cur=queue[0]||null;render()}
function backHtml(){
  const fav=mistakes.find(m=>m.id===cur.id)?"★ 已收藏":"☆ 收藏";
  const pos=cur.pos?`<span style="font-size:.8rem;color:var(--ink-dim);font-style:italic;margin-left:6px">${cur.pos}</span>`:"";
  const scene=cur.scene?`<div class="tip" style="background:#eef3ec;border-left:3px solid var(--green)">🎬 ${cur.scene}</div>`:"";
  return `
  <div class="back">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="cn">${cur.cn}${pos}</div>
      <button class="gear" id="fav-btn" onclick="event.stopPropagation();toggleFav()">${fav}</button>
    </div>
    <div class="tip">💡 ${cur.tip}</div>
    ${scene}
    <div class="ex">${cur.exampleEn}</div>
    <div class="ex-cn">${cur.exampleCn}</div>
  </div>`;
}
function toggleFav(){
  if(mistakes.find(m=>m.id===cur.id)){removeMistake(cur.id);toast("已移出复习本")}
  else{addMistake(cur,"手动收藏");toast("已加入复习本")}
  document.getElementById("fav-btn").textContent=mistakes.find(m=>m.id===cur.id)?"★ 已收藏":"☆ 收藏";
}
function gradesHtml(){return `
  <div class="grades">
    <button class="grade g-again" onclick="rate(0)">忘了<small>重来</small></button>
    <button class="grade" onclick="rate(3)">难<small>勉强</small></button>
    <button class="grade g-good" onclick="rate(4)">记得<small>good</small></button>
    <button class="grade g-good" onclick="rate(5)">秒答<small>easy</small></button>
  </div>`;
}
function aiHtml(){return `
  <div class="ai-box">
    <textarea id="sentence" placeholder="用 ${cur.word} 造个句子，AI 帮你批改（可选）"></textarea>
    <button class="ai-btn" id="check-btn" onclick="checkSentence()">AI 批改造句</button>
    <div class="ai-result" id="ai-result"></div>
  </div>`;
}
function flip(){flipped=true;render()}
// 浏览历史栈：记看过的词，支持左滑返回
let viewed=[];
// 下一词（右滑）：当前词丢回队尾，记入历史
function nextWord(){
  if(queue.length<=1){toast("就剩这一个啦");return false}
  viewed.push(cur);
  const w=queue.shift();queue.push(w);
  cur=queue[0];flipped=false;render();
  return true;
}
// 上一词（左滑）：从历史弹回，重新放回队首
function prevWord(){
  if(!viewed.length){toast("已经是第一个了");return false}
  const idx=queue.indexOf(cur);
  if(idx>=0)queue.splice(idx,1);
  queue.unshift(cur);
  const prev=viewed.pop();
  const pi=queue.indexOf(prev);
  if(pi>=0)queue.splice(pi,1);
  queue.unshift(prev);
  cur=prev;flipped=false;render();
  return true;
}
// 左右滑（只在正面生效）：右滑下一词，左滑返回上一词
function bindSwipe(){
  const card=document.getElementById("card");
  if(!card)return;
  let x0=null,y0=null,dx=0,dragging=false;
  card.addEventListener("touchstart",e=>{
    if(flipped)return;
    x0=e.touches[0].clientX;y0=e.touches[0].clientY;dx=0;dragging=false;
    card.classList.remove("snap");
  },{passive:true});
  card.addEventListener("touchmove",e=>{
    if(flipped||x0===null)return;
    const cx=e.touches[0].clientX,cy=e.touches[0].clientY;
    if(!dragging&&Math.abs(cx-x0)<Math.abs(cy-y0))return;
    dragging=true;dx=cx-x0;
    card.classList.add("swiping");
    card.style.transform="translateX("+dx+"px) rotate("+(dx/40)+"deg)";
    card.style.opacity=Math.max(.4,1-Math.abs(dx)/300);
  },{passive:true});
  const snapBack=()=>{card.classList.add("snap");card.style.transform="";card.style.opacity=""};
  card.addEventListener("touchend",()=>{
    if(flipped||x0===null)return;
    x0=null;card.classList.remove("swiping");
    if(Math.abs(dx)>90){
      const next=dx<0;  // 左滑(dx<0)=下一张，右滑(dx>0)=返回上一张
      const canMove=next?(queue.length>1):(viewed.length>0);
      if(!canMove){next?toast("就剩这一个啦"):toast("已经是第一个了");snapBack();return}
      card.classList.add("snap");
      card.style.transform="translateX("+(next?-500:500)+"px) rotate("+(next?-20:20)+"deg)";
      card.style.opacity="0";
      setTimeout(next?nextWord:prevWord,180);
    }else{
      snapBack();
    }
  });
}
function rate(q){
  grade(cur.id,q);
  if(q<3)addMistake(cur,"答错收录");else removeMistake(cur.id);
  viewed=[];                        // 评分推进了进度，历史清空
  queue.shift();
  if(q<3)queue.push(cur);
  cur=queue[0]||null;flipped=false;render();
}

// ===== 发音（有道真人美音，失败退回浏览器合成）=====
function playAudio(word,btn){
  const w=word.trim();if(!w)return;
  if(btn)btn.classList.add("playing");
  const done=()=>{if(btn)btn.classList.remove("playing")};
  // type=0 美音, type=2 英音
  const a=new Audio("https://dict.youdao.com/dictvoice?type=0&audio="+encodeURIComponent(w));
  a.onended=done;
  a.onerror=()=>{ // 有道挂了/没网 -> 浏览器合成兜底
    if(window.speechSynthesis){const u=new SpeechSynthesisUtterance(w);u.lang="en-US";u.rate=.9;u.onend=done;speechSynthesis.cancel();speechSynthesis.speak(u)}
    else{done();toast("发音加载失败")}
  };
  a.play().catch(a.onerror);
}

// ===== 通用 AI 调用（四 provider，支持图片）=====
const VISION_PROVIDERS=["anthropic","doubao"];
async function callAI(messages, sys, maxTokens=600, images=null){
  if(!cfg.apikey)throw new Error("先在设置里填 API Key");
  if(cfg.provider==="doubao"&&!cfg.endpoint)throw new Error("豆包需要先填接入点 ID（ep-xxxx）");
  if(images&&images.length&&!VISION_PROVIDERS.includes(cfg.provider))throw new Error("当前服务商不支持图片，请切到豆包");
  const p=cfg.provider;
  let url,headers,body,readText;
  if(p==="anthropic"){
    url="https://api.anthropic.com/v1/messages";
    headers={"Content-Type":"application/json","x-api-key":cfg.apikey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
    let msgs=messages;
    if(images&&images.length){          // Anthropic: source.base64
      msgs=messages.map(m=>({...m}));
      const last=msgs[msgs.length-1];
      const blocks=images.map(d=>({type:"image",source:{type:"base64",media_type:d.mime,data:d.b64}}));
      blocks.push({type:"text",text:typeof last.content==="string"?last.content:""});
      last.content=blocks;
    }
    body={model:"claude-haiku-4-5-20251001",max_tokens:maxTokens,messages:msgs};
    if(sys)body.system=sys;
    readText=d=>(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  }else{
    if(p==="doubao")url="https://ark.cn-beijing.volces.com/api/v3/chat/completions";
    else if(p==="deepseek")url="https://api.deepseek.com/v1/chat/completions";
    else url="https://openrouter.ai/api/v1/chat/completions";
    const model=p==="doubao"?cfg.endpoint:p==="deepseek"?"deepseek-v4-flash":"anthropic/claude-3.5-haiku";
    headers={"Content-Type":"application/json","Authorization":"Bearer "+cfg.apikey};
    let msgs=sys?[{role:"system",content:sys},...messages]:messages.slice();
    if(images&&images.length){          // OpenAI 兼容: image_url data URL
      msgs=msgs.map(m=>({...m}));
      const last=msgs[msgs.length-1];
      const parts=[{type:"text",text:typeof last.content==="string"?last.content:""}];
      images.forEach(d=>parts.push({type:"image_url",image_url:{url:"data:"+d.mime+";base64,"+d.b64}}));
      last.content=parts;
    }
    body={model,max_tokens:maxTokens,messages:msgs};
    readText=d=>d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content;
  }
  const r=await fetch(url,{method:"POST",headers,body:JSON.stringify(body)});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||"接口报错");
  const text=readText(d);
  if(!text)throw new Error("空响应");
  return text;
}

// ===== 流式调用：逐字回调 onChunk(已累积的全文) =====
// 档位 -> 实际模型名映射。返回 {model, label, anthropicModel}
function tierModel(provider, tier){
  const map={
    deepseek:{fast:["deepseek-v4-flash","v4-flash"],strong:["deepseek-v4-pro","v4-pro"],think:["deepseek-reasoner","R1 思考"]},
    openrouter:{fast:["anthropic/claude-3.5-haiku","haiku"],strong:["anthropic/claude-sonnet-4","sonnet-4"],think:["anthropic/claude-sonnet-4","sonnet-4 思考"]},
    anthropic:{fast:["claude-haiku-4-5-20251001","haiku-4.5"],strong:["claude-sonnet-4-20250514","sonnet-4"],think:["claude-sonnet-4-20250514","sonnet-4 思考"]},
    doubao:{fast:["","接入点"],strong:["","接入点"],think:["","接入点+思考"]},
  };
  const m=(map[provider]||map.deepseek)[tier]||(map[provider]||map.deepseek).fast;
  return {model:m[0],label:m[1]};
}
// 当前 AI 助手档位对应的模型名（给界面显示）
function currentTierLabel(){
  if(cfg.provider==="doubao")return "豆包·由接入点决定";
  return tierModel(cfg.provider,cfg.chatTier).label;
}

async function callAIStream(messages, sys, onChunk, maxTokens=900, tier="fast"){
  if(!cfg.apikey)throw new Error("先在设置里填 API Key");
  if(cfg.provider==="doubao"&&!cfg.endpoint)throw new Error("豆包需要先填接入点 ID（ep-xxxx）");
  const p=cfg.provider;
  const isThink=tier==="think";
  let url,headers,body,parseLine;
  if(p==="anthropic"){
    url="https://api.anthropic.com/v1/messages";
    headers={"Content-Type":"application/json","x-api-key":cfg.apikey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
    body={model:tierModel("anthropic",tier).model,max_tokens:maxTokens,messages,stream:true};
    if(sys)body.system=sys;
    if(isThink)body.thinking={type:"enabled",budget_tokens:2000};
    parseLine=obj=>(obj.type==="content_block_delta"&&obj.delta&&obj.delta.text)?obj.delta.text:"";
  }else{
    if(p==="doubao")url="https://ark.cn-beijing.volces.com/api/v3/chat/completions";
    else if(p==="deepseek")url="https://api.deepseek.com/v1/chat/completions";
    else url="https://openrouter.ai/api/v1/chat/completions";
    const model=p==="doubao"?cfg.endpoint:tierModel(p,tier).model;
    headers={"Content-Type":"application/json","Authorization":"Bearer "+cfg.apikey};
    body={model,max_tokens:maxTokens,messages:sys?[{role:"system",content:sys},...messages]:messages,stream:true};
    // 豆包思考：thinking 参数（需接入点模型支持）
    if(p==="doubao"&&isThink)body.thinking={type:"enabled"};
    parseLine=obj=>(obj.choices&&obj.choices[0]&&obj.choices[0].delta&&obj.choices[0].delta.content)||"";
  }
  const r=await fetch(url,{method:"POST",headers,body:JSON.stringify(body)});
  if(!r.ok){let e="接口报错";try{const j=await r.json();e=j.error&&j.error.message||e}catch(x){}throw new Error(e)}
  const reader=r.body.getReader();const dec=new TextDecoder();
  let buf="",full="";
  while(true){
    const {done,value}=await reader.read();
    if(done)break;
    buf+=dec.decode(value,{stream:true});
    const lines=buf.split("\n");buf=lines.pop();
    for(const line of lines){
      const t=line.trim();
      if(!t||!t.startsWith("data:"))continue;
      const data=t.slice(5).trim();
      if(data==="[DONE]")continue;
      try{const obj=JSON.parse(data);const piece=parseLine(obj);if(piece){full+=piece;onChunk(full)}}catch(e){}
    }
  }
  if(!full)throw new Error("空响应");
  return full;
}

async function extractWords(){
  const txt=document.getElementById("import-text").value.trim();
  if(!txt&&!importImage)return toast("贴段英文，或选张图片");
  if(txt.length>8000)return toast("文章太长，截短到 8000 字以内");
  if(importImage&&!VISION_PROVIDERS.includes(cfg.provider))return toast("读图需要切到豆包 Key");
  const btn=document.getElementById("extract-btn");btn.disabled=true;btn.textContent="提取中…";
  const sys=`你是英语老师，学生是中文母语的中级偏初学习者（认识基础词如 the/is/have，目标是读技术文档和看美剧）。从用户给的英文内容（文字或图片里的英文）中挑出对这类学习者算"生词"的词或短语（跳过过于简单的词），每个生成词条，并归类。

【分类】每个词必须归到且只能归到以下7个大类之一（cat字段填对应英文key）：
- dev（科技开发：编程、报错、IT、AI、互联网）
- tv（影视口语：看剧高频、俚语、短语动词）
- life（日常生活：衣食住行、社交对话）
- biz（职场商务：邮件、会议、办公、商业）
- academic（学术阅读：论文、正式书面、逻辑连接词）
- news（新闻时事：报道、政经、社会话题）
- other（其他：不属于以上的）
不要发明新分类，必须从这7个里选。

【词性】pos字段填 n./v./adj./adv./phr./prep. 等。
【场景】scene字段：如果这个词在某专业场景有特殊含义（如 print 在编程里指"打印输出"），简短写明；普通词留空字符串。

只返回JSON数组，不要任何其他文字：[{"word":"原形","phonetic":"美式音标带斜杠","pos":"词性","cn":"中文释义","tip":"简短用法/记忆提示","exampleEn":"贴近原文语境的英文例句","exampleCn":"例句中文翻译","scene":"场景用法或空","cat":"7个key之一"}]。最多挑12个最值得学的。`;
  const prompt=importImage?(txt||"提取图片里的英文生词"):txt;
  try{
    let text=await callAI([{role:"user",content:prompt}],sys,2000,importImage?[importImage]:null);
    text=text.replace(/```json|```/g,"").trim();
    const arr=JSON.parse(text);
    if(!Array.isArray(arr)||!arr.length)throw new Error("没提取到词");
    const valid=["dev","tv","life","biz","academic","news","other"];
    importCandidates=arr.map(w=>({...w,pos:w.pos||"",scene:w.scene||"",cat:valid.includes(w.cat)?w.cat:"other",pick:true}));
    renderCandidates();
  }catch(e){
    toast("提取失败："+(e.message||"检查 Key 或换个输入"));
  }finally{btn.disabled=false;btn.textContent="从文章提取生词"}
}

// ===== 批量录入：给词表，AI 全部补全不挑，分批处理 =====
async function batchImport(){
  const raw=document.getElementById("import-text").value.trim();
  if(!raw)return toast("先贴一串单词");
  // 解析：先按行丢掉 ### 标题行，再按逗号/分号拆词
  let words=raw.split(/\n/)
    .filter(line=>!/^\s*#/.test(line))        // 丢掉 # 开头的标题行
    .join(",")
    .split(/[,;]+/)
    .map(s=>s.trim())
    .filter(s=>s&&/[a-zA-Z]/.test(s));
  words=[...new Set(words.map(w=>w.toLowerCase()))];  // 去重
  if(!words.length)return toast("没解析出单词");
  if(words.length>200)return toast("一次最多 200 个，太多了分几次");
  const btn=document.getElementById("batch-btn");btn.disabled=true;
  const prog=document.getElementById("import-progress");
  const BATCH=20;
  const sys=`你是英语老师。用户会给你一批英文单词/短语，请为【每一个】生成词条，一个都不能漏、不要挑选。

【分类】每个词归到且只能归到这7个key之一：dev(科技开发)、tv(影视口语)、life(日常生活)、biz(职场商务)、academic(学术阅读)、news(新闻时事)、other(其他)。
【词性】pos填 n./v./adj./adv./phr. 等。
【场景】scene：词在专业场景有特殊含义就简短写明（如 print 在编程里指打印输出），否则留空。

只返回JSON数组，不要任何其他文字，数组长度必须等于输入单词数：[{"word":"原词","phonetic":"美式音标带斜杠","pos":"词性","cn":"中文释义","tip":"简短提示","exampleEn":"英文例句","exampleCn":"中文翻译","scene":"场景或空","cat":"7个key之一"}]`;
  const valid=["dev","tv","life","biz","academic","news","other"];
  let all=[];
  try{
    for(let i=0;i<words.length;i+=BATCH){
      const chunk=words.slice(i,i+BATCH);
      prog.textContent=`处理中… ${Math.min(i+BATCH,words.length)}/${words.length}`;
      let text=await callAI([{role:"user",content:chunk.join(", ")}],sys,3000);
      text=text.replace(/```json|```/g,"").trim();
      const arr=JSON.parse(text);
      if(Array.isArray(arr))all=all.concat(arr);
    }
    if(!all.length)throw new Error("没生成出词条");
    importCandidates=all.map(w=>({...w,pos:w.pos||"",scene:w.scene||"",cat:valid.includes(w.cat)?w.cat:"other",pick:true}));
    prog.textContent=`完成，共 ${importCandidates.length} 个词条`;
    renderCandidates();
  }catch(e){
    toast("录入失败："+(e.message||"检查 Key 或减少数量"));
    prog.textContent="";
  }finally{btn.disabled=false}
}
function renderCandidates(){
  const box=document.getElementById("import-result");
  const dup=importCandidates.filter(c=>allWords().some(w=>w.word.toLowerCase()===c.word.toLowerCase())).length;
  box.innerHTML=`
    <p style="font-size:.78rem;color:var(--ink-dim);margin-bottom:8px">挑出 ${importCandidates.length} 个词，已自动分类${dup?`（其中 ${dup} 个已有，默认不勾）`:""}。取消勾选不想要的：</p>
    ${importCandidates.map((c,i)=>{
      const exists=allWords().some(w=>w.word.toLowerCase()===c.word.toLowerCase());
      if(exists)c.pick=false;
      return `<label style="display:flex;gap:8px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:6px;cursor:pointer">
        <input type="checkbox" ${c.pick?"checked":""} onchange="importCandidates[${i}].pick=this.checked" style="margin-top:3px">
        <div style="flex:1">
          <div style="font-family:Fraunces,serif;font-weight:600">${c.word} <span style="color:var(--accent);font-size:.8rem">${c.phonetic||""}</span>${exists?' <span style="font-size:.65rem;color:var(--gold)">已有</span>':""}</div>
          <div style="font-size:.78rem">${c.cn}</div>
          <div style="font-size:.72rem;color:var(--ink-dim);margin-top:2px">${c.exampleEn||""}</div>
          <div style="margin-top:4px"><span style="font-size:.65rem;background:var(--accent-soft);color:var(--accent);border-radius:10px;padding:2px 8px">📁 ${catName(c.cat)}</span></div>
        </div>
      </label>`;
    }).join("")}
    <button class="ai-btn" style="margin-top:8px" onclick="saveImported()">保存勾选的词（按分类归入）</button>`;
}
function saveImported(){
  const picks=importCandidates.filter(c=>c.pick);
  if(!picks.length)return toast("一个都没勾");
  let n=0;
  picks.forEach(c=>{
    if(imported.some(w=>w.word.toLowerCase()===c.word.toLowerCase()))return;
    imported.push({id:"imp"+Date.now()+"_"+(n++),word:c.word,phonetic:c.phonetic||"",pos:c.pos||"",cn:c.cn,tip:c.tip||"",exampleEn:c.exampleEn||"",exampleCn:c.exampleCn||"",scene:c.scene||"",cat:c.cat||"import"});
  });
  save(IMP_KEY,imported);
  toast("已存 "+n+" 个词");
  closeImport();
  if(page==="home"&&!studyStarted)render();  // 刷新分类页词数
}
function exportImported(){
  if(!imported.length)return toast("还没有导入的词");
  const blob=new Blob([JSON.stringify(imported,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="vocab-imported.json";a.click();
  URL.revokeObjectURL(url);
  toast("已导出 JSON");
}

// ===== 启动 =====
bindCfg();render();</script>
