<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Vocab AI v5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f6f2e9; --paper2:#efe9da; --card:#fffdf7; --ink:#2b2620; --ink-dim:#6b6358;
  --line:#ddd4c2; --accent:#b5462f; --accent-soft:#e8d3cb; --green:#5a7a4e; --gold:#c08a2d;
  --shadow:0 1px 3px rgba(43,38,32,.08),0 8px 24px rgba(43,38,32,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--paper);color:var(--ink);font-family:Inter,system-ui,sans-serif;line-height:1.6;padding-bottom:72px}
.wrap{max-width:640px;margin:0 auto;padding:16px}
h1{font-family:Fraunces,serif;font-weight:700;font-size:1.5rem;letter-spacing:-.01em}
.sub{color:var(--ink-dim);font-size:.78rem;margin-top:2px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0 16px}
.gear{background:none;border:1px solid var(--line);border-radius:10px;padding:6px 10px;font-size:.78rem;color:var(--ink-dim);cursor:pointer}
.gear:active{background:var(--paper2)}

/* 设置面板 */
.panel{display:none;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.panel.open{display:block}
.panel label{display:block;font-size:.72rem;color:var(--ink-dim);margin:10px 0 4px;font-weight:500}
.panel input,.panel select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--paper);font-size:.85rem;color:var(--ink);font-family:inherit}
.panel .hint{font-size:.68rem;color:var(--ink-dim);margin-top:6px;line-height:1.5}
.set-group{margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
.set-group>summary{cursor:pointer;font-size:.82rem;font-weight:600;color:var(--ink);list-style:none;display:flex;align-items:center;gap:6px;user-select:none}
.set-group>summary::before{content:"▸";display:inline-block;transition:transform .15s;color:var(--ink-dim)}
.set-group[open]>summary::before{transform:rotate(90deg)}
.set-group>summary::-webkit-details-marker{display:none}
.set-group-body{margin-top:10px}

/* 闪卡 */
.stage{text-align:center;padding:8px 0}
.progress{font-size:.72rem;color:var(--ink-dim);margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:32px 22px;box-shadow:var(--shadow);min-height:200px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;position:relative;overflow:hidden;touch-action:pan-y}
.card.swiping{transition:none}
.card.snap{transition:transform .2s ease,opacity .2s ease}
.cat-tag{position:absolute;top:12px;right:14px;font-size:.6rem;color:var(--ink-dim);border:1px solid var(--line);border-radius:20px;padding:2px 8px}
.word{font-family:Fraunces,serif;font-size:2.4rem;font-weight:600;letter-spacing:-.02em}
.phonetic{color:var(--accent);font-size:1rem;margin-top:6px;font-family:Fraunces,serif}
.speak{background:none;border:1px solid var(--line);border-radius:20px;padding:5px 14px;font-size:.78rem;color:var(--ink-dim);cursor:pointer;margin-top:14px;align-self:center;transition:transform .1s,border-color .1s}
.speak.playing{border-color:var(--green);color:var(--green);transform:scale(1.08)}
.flip-hint{font-size:.68rem;color:var(--ink-dim);margin-top:18px}
.back{border-top:1px dashed var(--line);margin-top:18px;padding-top:16px;text-align:left}
.cn{font-size:1.15rem;font-weight:600;margin-bottom:8px}
.tip{font-size:.8rem;color:var(--ink-dim);background:var(--paper2);border-radius:8px;padding:8px 11px;margin-bottom:10px}
.ex{font-size:.85rem;margin-bottom:3px}
.ex-cn{font-size:.78rem;color:var(--ink-dim)}

/* 评分按钮 */
.grades{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:18px}
.grade{padding:11px 4px;border:1px solid var(--line);border-radius:11px;background:var(--card);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink)}
.grade small{display:block;font-size:.6rem;font-weight:400;color:var(--ink-dim);margin-top:2px}
.grade:active{transform:scale(.96)}
.g-again{border-color:var(--accent-soft)} .g-again:active{background:var(--accent-soft)}
.g-good{border-color:#cfe0c4} .g-good:active{background:#e6efe0}

/* AI 造句区 */
.ai-box{margin-top:16px;text-align:left}
.ai-box textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-family:inherit;font-size:.85rem;resize:vertical;min-height:64px;background:var(--paper)}
.ai-btn{margin-top:8px;width:100%;padding:10px;border:none;border-radius:10px;background:var(--ink);color:var(--paper);font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit}
.ai-btn:disabled{opacity:.5}
.ai-result{margin-top:12px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:.82rem;display:none}
.ai-result.show{display:block}
.ai-result .score{font-family:Fraunces,serif;font-size:1.4rem;font-weight:700;color:var(--green)}
.ai-result .label{font-size:.7rem;color:var(--ink-dim)}
.ai-result .row{margin-top:8px}
.ai-result .rw{font-style:italic;color:var(--accent)}
.ai-thread{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.ai-msg{font-size:.84rem;line-height:1.65;white-space:pre-wrap;padding:8px 11px;border-radius:12px;border:1px solid var(--line);word-break:break-word}
.ai-msg.user{background:var(--accent-soft);border-color:var(--accent);align-self:flex-end;max-width:88%}
.ai-msg.assistant{background:var(--card);align-self:flex-start;max-width:96%}

/* 完成态 / 空态 */
.done{text-align:center;padding:48px 20px;color:var(--ink-dim)}
.done h2{font-family:Fraunces,serif;color:var(--ink);font-size:1.4rem;margin-bottom:8px}

/* 底部导航 */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.nav button{background:none;border:none;font-size:.72rem;color:var(--ink-dim);cursor:pointer;font-family:inherit;padding:4px 16px;border-radius:8px}
.nav button.active{color:var(--accent);font-weight:600}

/* 复习本 */
.mistake-item{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.mistake-item .w{font-family:Fraunces,serif;font-weight:600;font-size:1.05rem}
.mistake-item .c{font-size:.78rem;color:var(--ink-dim)}

/* 字母索引侧边栏 */
.az-index{position:fixed;right:2px;top:50%;transform:translateY(-50%);z-index:60;display:flex;flex-direction:column;align-items:center;padding:4px 3px;border-radius:10px;background:rgba(255,253,247,.55);touch-action:none}
.az-index .az-item{font-size:.6rem;line-height:1;color:var(--ink-dim);padding:1.5px 4px;cursor:pointer;font-weight:600;border-radius:3px}
.az-index .az-item.dim{opacity:.32;cursor:default}
.az-index .az-item.hit{background:var(--accent);color:#fff}
.az-bubble{position:fixed;right:34px;top:50%;transform:translateY(-50%);z-index:61;background:var(--ink);color:var(--paper);width:44px;height:44px;border-radius:50%;display:none;align-items:center;justify-content:center;font-family:Fraunces,serif;font-size:1.3rem;font-weight:700;box-shadow:0 4px 14px rgba(0,0,0,.28)}
/* 首页分类卡片：长按拖拽排序 */
.cat-row{position:relative;transition:transform .18s ease}
.cat-row.dragging{opacity:.9;box-shadow:0 8px 24px rgba(43,38,32,.25);z-index:50;transition:none;cursor:grabbing}
.cat-row.drag-placeholder{opacity:.3;background:var(--paper2);border-style:dashed}
.cat-row .drag-handle{color:var(--ink-dim);font-size:1rem;padding:0 4px;cursor:grab;touch-action:none;align-self:center}
.az-bubble.show{display:flex}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:9px 16px;border-radius:20px;font-size:.78rem;opacity:0;transition:opacity .2s;pointer-events:none;z-index:99}
.import-overlay{display:none;position:fixed;inset:0;background:rgba(43,38,32,.4);z-index:200;overflow-y:auto;padding:20px 12px}
.import-overlay.open{display:block}
#quick-add-fab{position:fixed;right:16px;bottom:72px;z-index:150;width:52px;height:52px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:.92rem;font-weight:700;font-family:inherit;box-shadow:0 4px 14px rgba(43,38,32,.28);cursor:pointer}
#quick-add-fab:active{transform:scale(.94)}
.scroll-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:1.1rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.18);display:none}
.scroll-btn:active{transform:scale(.92)}
.import-box{max-width:560px;margin:20px auto;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 12px 40px rgba(43,38,32,.2)}
.toast.show{opacity:1}
.undobar{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 14px;border-radius:12px;font-size:.8rem;display:none;align-items:center;gap:12px;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.28);max-width:92vw}
.undobar.show{display:flex}
.undobar button{background:transparent;border:1px solid rgba(255,255,255,.4);color:var(--paper);border-radius:8px;padding:5px 12px;font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
.typing{display:inline-flex;gap:4px;align-items:center;padding:4px 2px}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--ink-dim);opacity:.4;animation:typing-bounce 1.2s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typing-bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>Vocab AI</h1>
      <div class="sub" id="sub">每天背几个，慢慢攒</div>
    </div>
    <button class="gear" onclick="togglePanel()">⚙ 设置</button>
  </div>

  <div class="panel" id="panel">
    <label>AI 服务商</label>
    <select id="provider">
      <option value="deepseek">DeepSeek（纯文本·性价比）</option>
      <option value="doubao">豆包 / 火山方舟（可看图）</option>
      <option value="kimi">Kimi 月之暗面（可看图）</option>
      <option value="openrouter">OpenRouter（一把 Key 多模型）</option>
      <option value="anthropic">Anthropic 直连（可看图）</option>
    </select>
    <label>API Key</label>
    <input type="password" id="apikey" placeholder="sk-..." autocomplete="off">
    <div id="ep-row" style="display:none">
      <label>火山方舟接入点 ID</label>
      <input type="text" id="endpoint" placeholder="ep-xxxx（在火山控制台创建推理接入点后获得）" autocomplete="off">
    </div>
    <div id="model-row" style="display:none">
      <label>模型</label>
      <select id="model"></select>
    </div>
    <div class="hint">Key 只存在你本机浏览器里，不上传。每个服务商的 Key 分开保存，切换服务商会自动带出对应的 Key。<br>豆包用的是火山方舟接入点，需要填 ep-xxxx；DeepSeek 直接填 sk- 开头的 Key。深度思考开关在「AI 助手」页。</div>
    <label>每次学习上限（张卡）</label>
    <input type="number" id="daily-limit" min="5" max="200" step="5" placeholder="20">
    <div class="hint">每次进入背卡，最多出现多少张（新词+到期复习合计）。默认 20，词多想多背可调大。</div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="ai-btn" style="flex:1" onclick="saveCfg()">保存设置</button>
      <button class="gear" onclick="clearKey()">清空 Key</button>
    </div>
    <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--line)">
      <button class="gear" style="width:100%" onclick="openTrash()">🗑 回收站（找回删除的内容）</button>
    </div>
    <details class="set-group">
      <summary>💾 数据备份与导入导出</summary>
      <div class="set-group-body">
        <div class="hint" style="margin-bottom:8px">完整备份含复习进度/文章/语法/错题，换设备必备。</div>
        <button class="ai-btn" style="width:100%" onclick="exportAll()">导出全部数据</button>
        <label class="gear" style="display:block;width:100%;margin-top:8px;text-align:center;cursor:pointer;box-sizing:border-box">恢复全部数据（覆盖现有）<input type="file" accept=".json,application/json" style="display:none" onchange="importAll(this)"></label>
        <button class="gear" style="width:100%;margin-top:8px" onclick="exportImported()">导出我导入的词（仅单词）</button>
        <label class="gear" style="display:block;width:100%;margin-top:8px;text-align:center;cursor:pointer;box-sizing:border-box">导入备份（覆盖现有词）<input type="file" accept=".json,application/json" style="display:none" onchange="importBackup(this)"></label>
      </div>
    </details>
    <details class="set-group">
      <summary>🧹 清理旧数据（一般用不到）</summary>
      <div class="set-group-body">
        <div class="hint" style="margin-bottom:6px">仅删除本应用残留的旧短语/旧语法/旧 NCE 导入词，不影响军考等其他应用。NCE 改由课程库提供后用一次即可。</div>
        <button class="gear" style="width:100%" onclick="cleanupLegacyData()">清理旧短语 / 旧语法 / 旧 NCE 导入词</button>
      </div>
    </details>
  </div>

  <div id="view"></div>
</div>

<div class="nav">
  <button id="nav-home" class="active" onclick="go('home')">学习</button>
  <button id="nav-assistant" onclick="go('assistant')">AI 助手</button>
  <button id="nav-mistake" onclick="go('mistake')">复习 / 库</button>
  <button id="nav-stats" onclick="go('stats')">统计</button>
</div>

<div class="toast" id="toast"></div>
<div class="undobar" id="undobar"><span id="undobar-msg"></span><button onclick="undoLast()">↩ 撤回</button></div>
<div class="import-overlay" id="import-overlay"></div>
<button id="quick-add-fab" onclick="openQuickAdd()" title="快速加词">＋词</button>
<div id="scroll-nav" style="position:fixed;right:16px;bottom:134px;z-index:140;display:none;flex-direction:column;gap:8px">
  <button id="scroll-up" class="scroll-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">↑</button>
  <button id="scroll-down" class="scroll-btn" onclick="window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})" title="到底部">↓</button>
</div>
<div class="import-overlay" id="quickadd-overlay"></div>

<script src="words.js?v=20260628"></script>
<script src="nce.js?v=20260628"></script>
<script>
// ===== 状态 =====
const SRS_KEY="gh_vocab_srs_v1";
const CFG_KEY="vocab_v5_cfg";
let srs=load(SRS_KEY,{});          // {id:{ef,interval,reps,due}}
let cfg=load(CFG_KEY,{provider:"deepseek",apikey:"",endpoint:"",scope:"all",models:{},thinkOn:false,dailyLimit:20});
if(!cfg.dailyLimit)cfg.dailyLimit=20;  // 老用户补默认
if(!cfg.models)cfg.models={};
if(typeof cfg.thinkOn!=="boolean")cfg.thinkOn=false;
// Key 按 provider 分开存（修复切换 provider 后 Key 没跟着切）。迁移旧的单一 apikey
if(!cfg.keys)cfg.keys={};
if(cfg.apikey&&cfg.provider&&!cfg.keys[cfg.provider]){cfg.keys[cfg.provider]=cfg.apikey;save(CFG_KEY,cfg)}
// 启动时把当前 provider 的 key 同步到 apikey（其余代码读 cfg.apikey 不用动）
cfg.apikey=cfg.keys[cfg.provider]||"";
let queue=[], cur=null, flipped=false, page=load("vocab_v5_page","home");
if(!["home","assistant","mistake","stats"].includes(page))page="home";

function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch(e){return d}}
function save(k,v){
  try{localStorage.setItem(k,JSON.stringify(v))}
  catch(e){
    // 常见于 localStorage 配额已满（安卓 WebView 常见 5-10MB 上限）
    console.error("save失败",k,e);
    if(typeof toast==="function")toast("存储空间可能已满，建议去回收站清理或导出备份",3200);
  }
}
// 容错解析 AI 返回的 JSON 数组：先去 markdown，整体 parse 失败时逐个对象提取（应对被截断/多说话）
function parseJsonArrayLoose(text){
  let t=(text||"").replace(/```json|```/g,"").trim();
  try{const a=JSON.parse(t);if(Array.isArray(a))return a}catch(e){}
  // 截取第一个 [ 到最后一个 ] 再试
  const lb=t.indexOf("["),rb=t.lastIndexOf("]");
  if(lb>=0&&rb>lb){try{const a=JSON.parse(t.slice(lb,rb+1));if(Array.isArray(a))return a}catch(e){}}
  // 逐个 {...} 提取（容忍数组未闭合/末尾被截断）
  const out=[];const re=/\{[^{}]*\}/g;let m;
  while((m=re.exec(t))){try{out.push(JSON.parse(m[0]))}catch(e){}}
  return out;
}
function toast(m,ms){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),ms||1600)}
// AI 请求超时：连接建立超时 + 流式读取时单次无响应超时（代理抖动/断线常见，避免按钮卡死不恢复）
const AI_CONNECT_TIMEOUT=20000;   // 建立连接/拿到首个响应头
const AI_IMAGE_TIMEOUT=45000;     // 带图片的请求：base64体积大+多模态推理慢，超时放宽
const AI_STREAM_IDLE_TIMEOUT=25000; // 流式读取中，两次数据之间最长静默时间
async function fetchWithTimeout(url,opts,ms){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),ms||AI_CONNECT_TIMEOUT);
  try{
    return await fetch(url,{...opts,signal:ctrl.signal});
  }catch(e){
    if(e.name==="AbortError")throw new Error("网络超时，请检查网络/代理后重试");
    throw e;
  }finally{clearTimeout(timer)}
}
// 给一个 promise 包超时，超时则 reject（用于流式 reader.read() 防止卡死不返回）
function withIdleTimeout(promise,ms,msg){
  return new Promise((resolve,reject)=>{
    const timer=setTimeout(()=>reject(new Error(msg||"网络超时，请重试")),ms);
    promise.then(v=>{clearTimeout(timer);resolve(v)},e=>{clearTimeout(timer);reject(e)});
  });
}
// 去 Markdown 符号兜底（豆包爱用 #、DeepSeek 爱用 **）
function stripMd(s){
  if(!s)return s;
  return s
    .replace(/\*\*(.+?)\*\*/g,"$1")
    .replace(/(^|\s)\*(?!\s)(.+?)\*/g,"$1$2")
    .replace(/^#{1,6}\s+/gm,"")
    .replace(/`{1,3}([^`]+)`{1,3}/g,"$1")
    .replace(/^\s*[-•]\s+/gm,"· ")
    .replace(/^\s*([-*_])\1{2,}\s*$/gm,"")
    .trim();
}
// HTML 转义：用户自建内容/AI返回内容拼进 innerHTML 前过一遍，防止内容里恰好带 <> 等字符破坏渲染
function escapeHtml(s){
  if(s==null)return "";
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}


// ===== NCE 课程库注入 (来自 nce.js, 只读内置内容) =====
// 把 NCE_COURSES 展开成 WORDS 同构对象 / 文章 / 短语 / 语法。
// id 用 课次+序号 保证稳定(跨设备一致, SRS 进度不丢)。这些不写 localStorage。
let NCE_WORDS=[], NCE_ARTICLES=[], NCE_PHRASES=[], NCE_GRAMMAR=[];
(function buildNCE(){
  if(typeof NCE_COURSES==="undefined")return;
  Object.keys(NCE_COURSES).forEach(ckey=>{
    const course=NCE_COURSES[ckey];
    (course.lessons||[]).forEach(L=>{
      // 生词 -> WORDS 同构, cat=课程key(如 nce2), lid 记课次用于文章绑定
      (L.words||[]).forEach((w,i)=>{
        NCE_WORDS.push({
          id:L.lid+"_w"+i, word:w.word, phonetic:w.phonetic||"", pos:w.pos||"",
          cn:w.cn||"", tip:w.tip||"", exampleEn:w.exampleEn||"", exampleCn:w.exampleCn||"",
          scene:"", cat:ckey, lid:L.lid, fromArticle:L.lid, _nce:true
        });
      });
      // 文章: 正文+注释译文; lid 即文章 id
      NCE_ARTICLES.push({
        id:L.lid, title:L.title, text:L.text||"", mode:"deep",
        explain:L.explain||"", createdAt:0, _nce:true, course:ckey
      });
      // 短语
      (L.phrases||[]).forEach((p,i)=>{
        NCE_PHRASES.push({id:L.lid+"_ph"+i, phrase:p.phrase, cn:p.cn||"", tip:p.tip||"",
          type:p.type||"other", lid:L.lid, _nce:true});
      });
      // 语法
      (L.grammar||[]).forEach((g,i)=>{
        NCE_GRAMMAR.push({id:L.lid+"_gr"+i, point:g.point, cn:g.cn||"", example:g.example||"",
          topic:g.topic||"other", lid:L.lid, _nce:true});
      });
    });
  });
})();

const IMP_KEY="vocab_v5_imported";
let imported=load(IMP_KEY,[]);   // 用户导入的词，结构同 WORDS，cat:"import"
// 全局词表 = 内置 + NCE课程 + 导入。所有取词的地方用 allWords()
const CATOVR_KEY="vocab_v5_catoverride";
let catOverride=load(CATOVR_KEY,{});   // {wordId: newCat} 主要给内置词改分类用（imported 词直接改 w.cat）
const HIDDEN_KEY="vocab_v5_hidden";
let hiddenWords=load(HIDDEN_KEY,{});   // {wordId:true} 被"删除"的内置词（不真删 NCE_WORDS，渲染时过滤；可进回收站恢复）
function allWords(){
  const ovr=catOverride;
  const hasOvr=ovr&&Object.keys(ovr).length;
  const base=hasOvr?WORDS.map(w=>ovr[w.id]?{...w,cat:ovr[w.id]}:w):WORDS;
  const nce=hasOvr?NCE_WORDS.map(w=>ovr[w.id]?{...w,cat:ovr[w.id]}:w):NCE_WORDS;
  let list=base.concat(nce).concat(imported);
  // 过滤被隐藏（"删除"）的内置词
  const hasHidden=hiddenWords&&Object.keys(hiddenWords).length;
  if(hasHidden)list=list.filter(w=>!hiddenWords[w.id]);
  return list;
}
// 一次性迁移：words.js 旧 NCE 词(nce001..)已删，把其复习进度迁移给新课程库同名词，并清理旧 srs/imported 残留
(function migrateOldNce(){
  const OLD={nce001:"private",nce002:"conversation",nce003:"theatre",nce004:"attention",nce005:"bear",nce006:"business",nce007:"angrily",nce008:"outside",nce012:"send",nce013:"postcard",nce014:"spoil",nce017:"exciting",nce019:"abroad"};
  let changed=false;
  Object.keys(OLD).forEach(oldId=>{
    const word=OLD[oldId];
    const prog=srs[oldId];
    if(!prog)return;
    // 找新库同名词
    const nw=NCE_WORDS.find(w=>(w.word||"").toLowerCase()===word.toLowerCase());
    if(nw){
      // 新词没进度→直接迁移；都有→保留 reps 更多的那个（更熟）
      if(!srs[nw.id]||((prog.reps||0)>(srs[nw.id].reps||0)))srs[nw.id]=prog;
    }
    delete srs[oldId];changed=true;
  });
  // 清理 imported 里可能残留的旧 NCE 词（早期版本导入过）
  const before=imported.length;
  imported=imported.filter(w=>!OLD[w.id]);
  if(imported.length!==before){save(IMP_KEY,imported);changed=true}
  // words.js 内部重复 parse：dev054 已删，进度并入 dev021
  if(srs.dev054){if(!srs.dev021||((srs.dev054.reps||0)>(srs.dev021.reps||0)))srs.dev021=srs.dev054;delete srs.dev054;changed=true}
  if(changed)save(SRS_KEY,srs);
})();

const PHRASE_KEY="vocab_v5_phrases";
const GRAMMAR_KEY="vocab_v5_grammar";
let userPhrases=load(PHRASE_KEY,[]);  // 用户自建短语(存 localStorage)
let userGrammar=load(GRAMMAR_KEY,[]); // 用户自建语法(存 localStorage)
// NCE 课程短语/语法补默认复习字段(内置, due 让其立即可复习)
NCE_PHRASES.forEach(p=>{if(typeof p.inReview==="undefined")p.inReview=false});
NCE_GRAMMAR.forEach(g=>{if(typeof g.due!=="number")g.due=0});
// phrases/grammar = NCE(只读) + 用户自建。用于全局读取/复习
let phrases=NCE_PHRASES.concat(userPhrases);
let grammar=NCE_GRAMMAR.concat(userGrammar);
function rebuildPhraseGrammar(){
  phrases=NCE_PHRASES.concat(userPhrases);
  grammar=NCE_GRAMMAR.concat(userGrammar);
}
function isNcePhrase(id){return id&&id.indexOf("_ph")>0&&NCE_PHRASES.some(p=>p.id===id)}
function isNceGrammar(id){return id&&id.indexOf("_gr")>0&&NCE_GRAMMAR.some(g=>g.id===id)}
const GRAMMAR_REVIEW_DAYS=7;      // 语法回顾间隔（天）：展开详解一次后顺延这么久
function addPhrase(p){
  if(phrases.some(x=>x.phrase.toLowerCase()===(p.phrase||"").toLowerCase()))return false;
  const validT=["phrasal","collocation","prep","other"];
  userPhrases.push({id:"ph"+Date.now()+"_"+userPhrases.length,phrase:p.phrase,cn:p.cn||"",tip:p.tip||"",type:validT.includes(p.type)?p.type:"other"});
  save(PHRASE_KEY,userPhrases);rebuildPhraseGrammar();return true;
}
function addGrammar(g){
  if(grammar.some(x=>x.point===(g.point||"")))return false;
  const validTopic=["tense","word","sentence","other"];
  // 新加语法点立即进回顾队列：due=now，回顾后顺延
  userGrammar.push({id:"gr"+Date.now()+"_"+userGrammar.length,point:g.point,cn:g.cn||"",example:g.example||"",topic:validTopic.includes(g.topic)?g.topic:"other",due:Date.now()});
  save(GRAMMAR_KEY,userGrammar);rebuildPhraseGrammar();return true;
}
// 短语→闪卡对象（带齐卡片渲染所需字段，复用整套词卡渲染/评分；id 仍是 ph 前缀不与词撞）
function phraseCard(p){
  return {id:p.id,word:p.phrase,phonetic:"",pos:"phr.",cn:p.cn||"",tip:p.tip||"",exampleEn:"",exampleCn:"",scene:"",cat:"__phrase__",_phrase:true};
}
// 短语加入/移出复习曲线
function setPhraseReview(id,on){
  const p=phrases.find(x=>x.id===id);if(!p)return;
  if(on){if(!srs[id])srs[id]={ef:2.5,interval:0,reps:0,due:Date.now()};p.inReview=true}
  else{delete srs[id];p.inReview=false}
  // 用户短语的 inReview 要持久化; NCE 短语 inReview 仅存于内存(复习状态靠 srs[id] 持久)
  if(!isNcePhrase(id))save(PHRASE_KEY,userPhrases);
  save(SRS_KEY,srs);
}
// 一次性迁移：清理旧 phraseToReview 留下的 import 脏词条 + 旧字段
(function migrateB(){
  let dirty=false;
  // 旧 hack：phrase 上有 srsId 回指一个 import 词条。把复习状态迁到短语本身，删脏词条
  userPhrases.forEach(p=>{
    if(p.srsId){
      const old=srs[p.srsId];
      if(old){srs[p.id]=old;delete srs[p.srsId];dirty=true}
      p.inReview=true;delete p.srsId;dirty=true;
    }
  });
  // 删掉 hack 产生的 import 词条（word 等于某个短语、cat=import、pos=phr.）
  const before=imported.length;
  imported=imported.filter(w=>!(w.cat==="import"&&w.pos==="phr."&&userPhrases.some(p=>p.phrase===w.word)));
  if(imported.length!==before){save(IMP_KEY,imported);dirty=true}
  // 语法补 due（旧数据没有）
  userGrammar.forEach(g=>{if(typeof g.due!=="number"){g.due=Date.now();dirty=true}});
  if(dirty){save(SRS_KEY,srs);save(PHRASE_KEY,userPhrases);save(GRAMMAR_KEY,userGrammar);rebuildPhraseGrammar()}
})();

// ===== SM-2 =====
function grade(id,q){ // q: 0=again,3=hard,4=good,5=easy
  let c=srs[id]||{ef:2.5,interval:0,reps:0};
  if(q<3){c.reps=0;c.interval=1}
  else{
    c.reps++;
    if(c.reps===1)c.interval=1;
    else if(c.reps===2)c.interval=6;
    else c.interval=Math.round(c.interval*c.ef);
    c.ef=Math.max(1.3,c.ef+(0.1-(5-q)*(0.08+(5-q)*0.02)));
  }
  c.due=Date.now()+c.interval*86400000;
  srs[id]=c;save(SRS_KEY,srs);
  logStudy(id,q);  // 记录今日学习
}
// 每日学习量记录 {YYYY-MM-DD: 次数}（练习量，用于打卡/7天图）
const DAILY_KEY="vocab_v5_daily";
let daily=load(DAILY_KEY,{});
// 每日"记住"的去重词 {YYYY-MM-DD:{wordId:1}}（仅记得/秒答计入，用于"今日已背"）
const LEARNED_KEY="vocab_v5_daily_learned";
let dailyLearned=load(LEARNED_KEY,{});
function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function logStudy(id,q){
  const t=todayStr();
  daily[t]=(daily[t]||0)+1;save(DAILY_KEY,daily);          // 练习量（保持原样：打卡/图表用）
  if(q>=4&&id){                                            // 记得/秒答=今天记住了这个词（去重）
    if(!dailyLearned[t])dailyLearned[t]={};
    dailyLearned[t][id]=1;save(LEARNED_KEY,dailyLearned);
  }
}
function todayLearnedCount(){const o=dailyLearned[todayStr()];return o?Object.keys(o).length:0}
// 连续打卡天数（从今天往回数）
function streakDays(){
  let n=0;const d=new Date();
  for(;;){
    const s=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    if(daily[s]){n++;d.setDate(d.getDate()-1)}
    else break;
  }
  return n;
}

function isArtCat(c){return typeof c==="string"&&c.indexOf("art_")===0}
function looseCatsNow(){
  const builtinKeys=["all","nce2","dev","tv","life","biz","academic","news"];
  const all=allWords();
  return [...new Set(imported.map(w=>w.cat))].filter(c=>!builtinKeys.includes(c)&&c!=="import"&&c!=="other"&&!isArtCat(c)&&all.filter(w=>w.cat===c).length<3);
}
function inScope(w){
  if(cfg.scope==="all"||cfg.scope==="__due__"||cfg.scope==="__new__")return true;
  if(cfg.scope==="__fav__")return w.cat==="import"||w.cat==="other"||looseCatsNow().includes(w.cat);
  return w.cat===cfg.scope;
}
function buildQueue(){
  const now=Date.now();
  const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
  // 到期短语（已加入复习且到点）→ 闪卡对象，与词共用队列
  const duePhrases=phrases.filter(p=>p.inReview&&srs[p.id]&&srs[p.id].due&&srs[p.id].due<=now).map(phraseCard);
  const limit=cfg.dailyLimit||20;
  if(cfg.scope==="__mistake__"){
    // 复习本一键复习：复习本所有词 + 已加入复习的短语；不限量、不随机，按排序来
    queue=mistakeQueue();
    return;
  }
  if(cfg.scope==="__due__"){
    // 只复习已学过且到期的词 + 到期短语
    queue=shuffle(allWords().filter(w=>srs[w.id]&&srs[w.id].due&&srs[w.id].due<=now).concat(duePhrases)).slice(0,limit);
  }else if(cfg.scope==="__new__"){
    // 只背还没学过的新词
    queue=shuffle(allWords().filter(w=>!srs[w.id])).slice(0,limit);
  }else{
    // 普通分类：到期复习词优先，新词填剩余名额，各自打乱（避免复习被新词挤掉、总背靠前那批）
    const pool=allWords().filter(inScope);
    const due=shuffle(pool.filter(w=>srs[w.id]&&srs[w.id].due&&srs[w.id].due<=now).concat(duePhrases));
    const fresh=shuffle(pool.filter(w=>!srs[w.id]));
    queue=due.concat(fresh).slice(0,limit);
  }
}
// ===== 复习本一键复习 =====
// 排序：unfamiliar(最不熟优先)/recent(最近加入)/alpha(字母序)
let mistakeSort=load("vocab_v5_mistakesort","unfamiliar");
const MISTAKE_SORT_LABELS={unfamiliar:"最不熟优先",recent:"最近加入",alpha:"字母序"};
function setMistakeSort(m){mistakeSort=m;save("vocab_v5_mistakesort",m);renderMistake(document.getElementById("view"))}
// 把一个 mistake 词条解析成可背的卡片词对象（优先用 allWords 里的完整词，回退到 mistake 自存字段）
function mistakeToCard(m){
  const w=allWords().find(x=>x.id===m.id);
  if(w)return w;
  return {id:m.id,word:m.word,phonetic:"",pos:"",cn:m.cn||"",tip:"",exampleEn:"",exampleCn:"",scene:"",cat:"import"};
}
// "不熟度"：连对越少越不熟；mistakes 用 streak，短语用 srs.reps；缺省算最不熟(=-1)
function unfamiliarScore(id,isPhrase){
  if(isPhrase){const c=srs[id];return c&&typeof c.reps==="number"?c.reps:-1}
  const m=mistakes.find(x=>x.id===id);
  return m&&typeof m.streak==="number"?m.streak:-1;
}
// 复习本队列：复习本单词 + 已加入复习的短语；按 mistakeSort 排序
function mistakeQueue(){
  const wordCards=mistakes.map(m=>Object.assign(mistakeToCard(m),{_mid:m.id}));
  const phraseCards=phrases.filter(p=>p.inReview&&srs[p.id]).map(p=>Object.assign(phraseCard(p),{_pid:p.id}));
  let list=wordCards.concat(phraseCards);
  if(mistakeSort==="alpha")list.sort((a,b)=>(a.word||"").toLowerCase().localeCompare((b.word||"").toLowerCase()));
  else if(mistakeSort==="recent")list.reverse();  // mistakes/phrases 数组本身按加入先后，倒序=最近在前
  else list.sort((a,b)=>unfamiliarScore(a.id,a._phrase)-unfamiliarScore(b.id,b._phrase)); // unfamiliar：连对少的在前
  return list;
}
// 进入复习本一键复习
function startMistakeReview(){
  const n=mistakes.length+phrases.filter(p=>p.inReview&&srs[p.id]).length;
  if(!n){toast("复习本和待复习短语都是空的");return}
  if(tryResumeSession("__mistake__"))return;   // 有未背完的复习本会话→接着背
  previewCat=null;cfg.scope="__mistake__";save(CFG_KEY,cfg);
  studyStarted=true;cur=null;flipped=false;viewed=[];
  buildQueue();roundTotal=queue.length;roundDone=new Set();
  cur=queue[0]||null;page="home";save("vocab_v5_page","home");
  ["home","assistant","mistake","stats"].forEach(x=>{const el=document.getElementById("nav-"+x);if(el)el.classList.toggle("active",x==="home")});
  saveSession();render();
}

const FIXED_CAT_KEYS=["nce2","dev","tv","life","biz","academic","news"];
function allCatsWithCount(){
  const all=allWords();
  const cats=[...new Set(all.map(w=>w.cat).filter(Boolean))];
  return cats.map(c=>({cat:c,name:catName(c),n:all.filter(w=>w.cat===c).length,
    isFixed:FIXED_CAT_KEYS.includes(c),isArt:isArtCat(c),isSys:c==="import"||c==="other"||c==="codepath"}))
    .sort((a,b)=>b.n-a.n);
}
// 把 from 分类的所有词改成 to（合并/重命名通用）
function moveCatWords(from,to){
  let n=0;
  // imported 词：直接改 cat
  imported.forEach(w=>{if(w.cat===from){w.cat=to;n++}});
  save(IMP_KEY,imported);
  // 内置词：通过 catOverride 改（WORDS 是常量改不了）。注意 from 可能本身就是覆盖后的分类
  WORDS.forEach(w=>{
    const cur=catOverride[w.id]||w.cat;
    if(cur===from){catOverride[w.id]=to;n++}
  });
  save(CATOVR_KEY,catOverride);
  return n;
}

  }).join("");

function renameCat(cat){
  const cur=catName(cat);
  const name=prompt(`把分类「${cur}」改成什么名字？`,cur);
  if(!name||!name.trim()||name.trim()===cur)return;
  const nn=name.trim();
  // 重命名 = 把该 cat 的词改成新 cat 名（用新名作 key）
  moveCatWords(cat,nn);
  toast(`已改名为「${nn}」`);
  renderCatManager();
}
function mergeCat(cat){
  const cats=allCatsWithCount().filter(c=>c.cat!==cat&&!c.isArt);
  if(!cats.length)return toast("没有可合并到的分类");
  const list=cats.map((c,i)=>`${i+1}. ${c.name}（${c.n}词）`).join("\n");
  const pick=prompt(`把「${catName(cat)}」的词合并到哪个分类？输入序号：\n\n${list}`,"1");
  if(!pick)return;
  const idx=parseInt(pick,10)-1;
  if(isNaN(idx)||idx<0||idx>=cats.length)return toast("序号无效");
  const to=cats[idx];
  const n=moveCatWords(cat,to.cat);
  toast(`已把 ${n} 个词合并到「${to.name}」`);
  renderCatManager();
}

const SESSION_KEY="vocab_v5_session";
// 存当前背词进度。queue 含完整对象（含短语卡/复习本卡标记），保证恢复后词序与状态不变
function saveSession(){
  if(!studyStarted||!cur){clearSession();return}
  try{
    save(SESSION_KEY,{
      scope:cfg.scope,
      queue, viewed, flipped,
      roundTotal,
      roundDone:[...roundDone],
      ts:Date.now()
    });
  }catch(e){/* 配额异常等忽略，不影响背词 */}
}
function clearSession(){localStorage.removeItem(SESSION_KEY)}
// 启动时尝试恢复未完成的背词会话；成功返回 true
function restoreSession(){
  const s=load(SESSION_KEY,null);
  if(!s||!s.queue||!s.queue.length)return false;
  // 过期保护：超过 24 小时的会话不自动恢复（避免恢复很旧的队列）
  if(s.ts&&Date.now()-s.ts>24*3600000){clearSession();return false}
  cfg.scope=s.scope;
  queue=s.queue;
  viewed=s.viewed||[];
  flipped=!!s.flipped;
  roundTotal=s.roundTotal||queue.length;
  roundDone=new Set(s.roundDone||[]);
  // 已背完的轮次不恢复（避免"30/30 还在背"残留状态在刷新后复活）
  if(roundTotal>0&&roundDone.size>=roundTotal){clearSession();return false}
  cur=queue[0]||null;
  if(!cur){clearSession();return false}
  studyStarted=true;
  previewCat=null;curArticle=null;articleListOpen=false;
  return true;
}
function backToHome(){
  studyStarted=false;cur=null;flipped=false;viewed=[];

  const sp=cfg.scope;
  if(sp==="__mistake__"){previewCat=null;mistakeTab="mistake";save("vocab_v5_mtab","mistake");go("mistake");return}

}

const HOMECAT_ORDER_KEY="vocab_v5_homecat_order";
function getHomeCatOrder(){return load(HOMECAT_ORDER_KEY,[])}
function saveHomeCatOrder(order){save(HOMECAT_ORDER_KEY,order)}
// 按已保存的自定义顺序重排 rows；没记录过的分类保持原有相对顺序追加在后面
function sortRowsByOrder(rows){
  const order=getHomeCatOrder();
  const idx=k=>{const i=order.indexOf(k);return i===-1?Infinity:i};
  return rows.slice().sort((a,b)=>{
    const ia=idx(a.key),ib=idx(b.key);
    if(ia!==ib)return ia-ib;
    return 0;   // 都不在自定义顺序里的，保持原相对顺序（sort是稳定排序）
  });
}

// 长按拖拽排序：触摸版实现（不用HTML5 dragndrop，手机浏览器兼容性更好）
function initCatDrag(){
  const list=document.getElementById("cat-sort-list");
  if(!list)return;
  let dragEl=null,startY=0,startIndex=-1,longPressTimer=null,dragging=false;
  const rowsEls=()=>Array.from(list.querySelectorAll(".cat-row"));

  function onTouchStart(e,row){
    const touch=e.touches[0];
    startY=touch.clientY;
    longPressTimer=setTimeout(()=>{
      dragging=true;
      dragEl=row;
      startIndex=rowsEls().indexOf(row);
      row.classList.add("dragging");
      if(navigator.vibrate)navigator.vibrate(12);   // 轻微震动反馈，有则用，没有静默忽略
    },350);   // 350ms长按阈值，避免和点击/滚动冲突
  }
  function onTouchMove(e){
    const touch=e.touches[0];
    if(!dragging){
      // 还没触发长按前，如果手指已经明显移动（说明用户在滚动），取消长按计时
      if(Math.abs(touch.clientY-startY)>10)clearTimeout(longPressTimer);
      return;
    }
    e.preventDefault();   // 拖拽中阻止页面滚动
    const y=touch.clientY;
    dragEl.style.transform=`translateY(${y-startY}px)`;
    // 找到当前手指位置对应要插入的位置，实时重排DOM
    const els=rowsEls().filter(el=>el!==dragEl);
    let target=null;
    for(const el of els){
      const rect=el.getBoundingClientRect();
      if(y<rect.top+rect.height/2){target=el;break}
    }
    if(target)list.insertBefore(dragEl,target);
    else list.appendChild(dragEl);
    dragEl.style.transform=`translateY(${y-startY}px)`;   // 重新插入后DOM位置变了，transform要基于新位置重算更精确，这里简化保留原有位移量
  }
  function onTouchEnd(){
    clearTimeout(longPressTimer);
    if(!dragging){return}
    dragging=false;
    dragEl.classList.remove("dragging");
    dragEl.style.transform="";
    const newOrder=rowsEls().map(el=>el.dataset.key);
    saveHomeCatOrder(newOrder);
    toast("排序已保存");
    dragEl=null;
  }
  rowsEls().forEach(row=>{
    row.addEventListener("touchstart",e=>onTouchStart(e,row),{passive:true});

// ===== 查重清理：全库扫描拼写相同的词，保留1个、其余进回收站（可恢复）=====
let dedupGroups=null;   // 非空=正在复核查重结果：[{word,keepId,removeIds[],total,on}]
// 找出全库拼写重复的词（排除短语卡）。每组选保留：复习次数最高 → 并列时内置优先
function findDupGroups(){
  const all=allWords().filter(w=>w.cat!=="__phrase__"&&!w._phrase);
  const map={};
  all.forEach(w=>{const k=(w.word||"").trim().toLowerCase();if(!k)return;(map[k]=map[k]||[]).push(w)});
  const isBuiltin=w=>WORDS.some(x=>x.id===w.id)||NCE_WORDS.some(x=>x.id===w.id);
  const reps=w=>(srs[w.id]&&srs[w.id].reps)||0;
  const groups=[];
  Object.keys(map).forEach(k=>{
    const arr=map[k];if(arr.length<2)return;
    const sorted=arr.slice().sort((a,b)=>{const dr=reps(b)-reps(a);if(dr)return dr;return (isBuiltin(b)?1:0)-(isBuiltin(a)?1:0)});
    groups.push({word:arr[0].word,keepId:sorted[0].id,removeIds:sorted.slice(1).map(w=>w.id),total:arr.length,on:true});
  });
  groups.sort((a,b)=>b.total-a.total);
  return groups;
}

let enrichPhoneticState=null;   // null=未开始；否则 {list:[word对象], idx, done, failed, running}

// 单个词的音标补全：只请求音标，prompt跟maybeEnrichWord里"只缺音标"分支保持一致
async function enrichOnePhonetic(w){
  const sys=`只返回 JSON，不要任何其他文字：{"phonetic":"该单词的国际音标(美式优先，带斜杠)"}`;
  const raw0=await callAI([{role:"user",content:`单词：${w.word}`}],sys,120);
  let raw=raw0.replace(/```json|```/g,"").trim();
  const a=raw.indexOf("{"),b=raw.lastIndexOf("}");
  if(a>=0&&b>a)raw=raw.slice(a,b+1);
  const o=JSON.parse(raw);
  if(!o.phonetic)throw new Error("空音标");
  return o.phonetic;
}
// 串行跑完整个补全队列（避免并发打爆API/触发限流），每完成一个就刷新一次界面
async function runEnrichPhonetic(){
  if(!enrichPhoneticState||enrichPhoneticState.running)return;
  enrichPhoneticState.running=true;
  while(enrichPhoneticState&&enrichPhoneticState.running&&enrichPhoneticState.idx<enrichPhoneticState.list.length){
    const w=enrichPhoneticState.list[enrichPhoneticState.idx];
    try{
      const phonetic=await enrichOnePhonetic(w);
      // 用id去imported里找真身写回（enrichPhoneticState.list里的引用理论上和imported同源，双重保险按id查一次）
      const real=imported.find(x=>x.id===w.id);
      if(real)real.phonetic=phonetic;
      if(enrichPhoneticState)enrichPhoneticState.done++;
    }catch(e){
      if(enrichPhoneticState)enrichPhoneticState.failed++;
    }
    save(IMP_KEY,imported);
    if(enrichPhoneticState){enrichPhoneticState.idx++;render()}
  }
  if(enrichPhoneticState)enrichPhoneticState.running=false;
}

// 字母侧边栏：点击单个字母 或 按住上下滑动连续跳转，都会定位到该字母对应词行
function initAzIndex(){
  const box=document.getElementById("az-index");
  if(!box)return;
  const bubble=document.getElementById("az-bubble");
  const items=Array.from(box.querySelectorAll(".az-item"));
  let lastLetter=null;
  const clearHit=()=>items.forEach(it=>it.classList.remove("hit"));
  const letterAtY=(clientY)=>{
    const rect=box.getBoundingClientRect();
    let y=clientY-rect.top;
    if(y<0)y=0;if(y>rect.height)y=rect.height;
    const idx=Math.min(25,Math.floor(y/rect.height*26));
    return items[idx]?items[idx].dataset.l:null;
  };
  const activate=(letter,clientY)=>{
    if(!letter||letter===lastLetter)return;
    lastLetter=letter;
    clearHit();
    const it=items.find(x=>x.dataset.l===letter);
    if(it)it.classList.add("hit");
    if(bubble){bubble.textContent=letter;bubble.classList.add("show");if(clientY!=null)bubble.style.top=clientY+"px",bubble.style.transform="translateY(-50%)"}
    jumpToLetter(letter);
  };
  const end=()=>{lastLetter=null;clearHit();if(bubble)bubble.classList.remove("show")};
  box.addEventListener("touchstart",e=>{const t=e.touches[0];activate(letterAtY(t.clientY),t.clientY)},{passive:true});
  box.addEventListener("touchmove",e=>{const t=e.touches[0];activate(letterAtY(t.clientY),t.clientY)},{passive:true});
  box.addEventListener("touchend",end);
  box.addEventListener("touchcancel",end);
  items.forEach(it=>{
    it.addEventListener("click",()=>{if(it.classList.contains("dim"))return;activate(it.dataset.l,null);setTimeout(end,500)});
  });
}

function restartStudy(){
  const cat=cfg.scope;
  const keep=cur;
  clearSession();
  lastEnteredWordId=null;previewCat=null;cfg.scope=cat;save(CFG_KEY,cfg);
  studyStarted=true;flipped=false;viewed=[];
  buildQueue();

    const i=queue.findIndex(w=>w.id===keep.id);
    if(i>0){const p=queue.splice(i,1)[0];queue.unshift(p)}      // 已在队列→提到队首
    else if(i<0){queue.unshift(keep)}                           // 不在新队列→补回队首
  }
  roundTotal=queue.length;roundDone=new Set();
  cur=queue[0]||keep||null;saveSession();render();
  toast("已重新洗一组 🔄");

// 尝试恢复指定 scope 的未完成会话；成功返回 true
function tryResumeSession(cat){
  const s=load(SESSION_KEY,null);
  if(!s||!s.queue||!s.queue.length)return false;
  if(s.scope!==cat)return false;                       // 不是同一入口，不接续
  if(s.ts&&Date.now()-s.ts>24*3600000){clearSession();return false}  // 超 24h 不接续
  cfg.scope=s.scope;save(CFG_KEY,cfg);
  queue=s.queue;viewed=s.viewed||[];flipped=!!s.flipped;
  roundTotal=s.roundTotal||queue.length;roundDone=new Set(s.roundDone||[]);
  if(roundTotal>0&&roundDone.size>=roundTotal){clearSession();return false}  // 已背完不接续
  cur=queue[0]||null;
  if(!cur){clearSession();return false}
  studyStarted=true;previewCat=null;curArticle=null;articleListOpen=false;
  render();
  return true;
}

// 文章词缺音标/例句翻译时，自动 AI 补全一次并存好（方案A）
let __enriching=false;
async function maybeEnrichWord(){
  if(!cur||cur._phrase)return;
  if(__enriching)return;
  const w=imported.find(x=>x.id===cur.id);
  if(!w)return;                                // 只补导入的词，内置词不动
  const needPhonetic=!w.phonetic;
  const needEx=!w.exampleEn;                    // 缺英文例句
  const needExCn=w.exampleEn&&!w.exampleCn;     // 有英文例句但缺翻译
  if(!needPhonetic&&!needEx&&!needExCn)return;  // 不缺就不补
  if(!cfg.apikey&&!(cfg.keys&&cfg.keys[cfg.provider]))return;
  __enriching=true;
  let sys,payload;
  if(needEx){
    // 缺例句：补 音标 + 英文例句 + 翻译（快速录入瘦身后走这里）
    sys=`你是英语老师。为这个单词补全词条，只返回 JSON，不要其他文字：{"phonetic":"国际音标(带斜杠)","exampleEn":"一个地道的英文例句","exampleCn":"该例句的中文翻译"}`;
    payload=`单词：${w.word}（${w.cn||""}）`;
  }else{
    // 只缺音标或例句翻译（文章词场景）
    sys=`只返回 JSON，不要任何其他文字：{"phonetic":"该词的国际音标(带斜杠)","exampleCn":"这句英文的中文翻译"}`;
    payload=`单词：${w.word}\n例句：${w.exampleEn||""}`;
  }
  try{
    let raw=await callAI([{role:"user",content:payload}],sys,300);
    raw=raw.replace(/```json|```/g,"").trim();
    const a=raw.indexOf("{"),b=raw.lastIndexOf("}");
    if(a>=0&&b>a)raw=raw.slice(a,b+1);
    const o=JSON.parse(raw);
    if(needPhonetic&&o.phonetic)w.phonetic=o.phonetic;
    if(needEx&&o.exampleEn)w.exampleEn=o.exampleEn;
    if((needEx||needExCn)&&o.exampleCn)w.exampleCn=o.exampleCn;
    save(IMP_KEY,imported);
    if(cur&&cur.id===w.id){cur.phonetic=w.phonetic;cur.exampleEn=w.exampleEn;cur.exampleCn=w.exampleCn;if(flipped)render()}
  }catch(e){/* 补全失败静默，不影响背词 */}
  __enriching=false;
}

// 把文章切成块：先按空行/换行分段，累积到约 400 词成一块；超长单段按句子再切
function splitArticle(text,size){
  size=size||150;
  const minBlock=Math.max(30,Math.floor(size*0.4));  // 太短的块并入相邻
  // 拆成最小单元：优先按句末标点（中英），无标点则整体按词处理
  const raw=text.replace(/\s+/g," ").trim();
  if(!raw)return [text.trim()];
  // 先按句末标点切句；剩下没标点的长串再按词切
  let units=[];
  const sentRe=/[^.!?。！？\n]+[.!?。！？]+/g;
  let lastEnd=0,m;
  while((m=sentRe.exec(raw))){units.push(m[0].trim());lastEnd=sentRe.lastIndex}
  const tail=raw.slice(lastEnd).trim();
  if(tail)units.push(tail);
  if(!units.length)units=[raw];
  const wc=s=>s.split(/\s+/).filter(Boolean).length;
  // 把超过 size 的单元（多见于无标点长串）按词强制切
  const fine=[];
  units.forEach(u=>{
    if(wc(u)<=size){fine.push(u);return}
    const words=u.split(/\s+/);
    for(let i=0;i<words.length;i+=size)fine.push(words.slice(i,i+size).join(" "));
  });
  // 累积成块，单元拼到接近 size
  const chunks=[];let cur="",cw=0;
  fine.forEach(u=>{
    const uw=wc(u);
    if(cw+uw>size&&cur){chunks.push(cur.trim());cur="";cw=0}
    cur+=(cur?" ":"")+u;cw+=uw;
  });
  if(cur.trim())chunks.push(cur.trim());
  // 合并过短的尾块/碎块到前一块，避免残句单独成段
  for(let i=chunks.length-1;i>0;i--){
    if(wc(chunks[i])<minBlock){chunks[i-1]=chunks[i-1]+" "+chunks[i];chunks.splice(i,1)}
  }
  return chunks.length?chunks:[raw];
}

let artStat={w:0,p:0,g:0};
// 自动把提取结果分类入库（去重）：单词→文章词库进SRS带例句；短语→短语库进复习；语法→语法库进回顾
function autoFileExtract(ext){
  // 单词（当新词：不预建 SRS，背过后再进复习曲线，显示为"新词"）
  (ext.words||[]).forEach(it=>{
    const word=(it.w||"").trim();if(!word)return;
    if(allWords().some(x=>x.word.toLowerCase()===word.toLowerCase()))return;
    const id="aw"+Date.now()+"_"+artStat.w+"_"+Math.floor(Math.random()*1000);
    imported.push({id,word,phonetic:"",pos:"",cn:it.cn||"",tip:"",exampleEn:it.eg||"",exampleCn:"",scene:"",cat:artCatKey(artId),fromArticle:artId});
    artStat.w++;
  });
  // 短语（路径A：与单词一起归到本文章名下，进 imported，可与单词一起背）
  (ext.phrases||[]).forEach(it=>{
    const ph=(it.w||"").trim();if(!ph)return;
    if(allWords().some(x=>x.word.toLowerCase()===ph.toLowerCase()))return;
    const id="ap"+Date.now()+"_"+artStat.p+"_"+Math.floor(Math.random()*1000);
    imported.push({id,word:ph,phonetic:"",pos:"phrase",cn:it.cn||"",tip:"",exampleEn:it.eg||"",exampleCn:"",scene:"",cat:artCatKey(artId),fromArticle:artId});
    artStat.p++;
  });
  // 语法（进语法库，自动进7天回顾——语法本就是入库即回顾，保持不变）
  (ext.grammar||[]).forEach(it=>{
    const point=(it.point||"").trim();if(!point)return;
    if(addGrammar({point,cn:it.cn||"",example:it.eg||"",topic:"other"}))artStat.g++;
  });
  save(IMP_KEY,imported);save(SRS_KEY,srs);
  saveArtProgress();
}

// 从一段精讲对应的原文里，提取该段涉及的 单词/短语/语法，分类返回（prompt 精简，避免模型负担过重）
async function extractFromChunk(chunk){
  const sys=`读者英语水平相当于《新概念英语》第一册。从下面这段英文里，提取超出该水平、值得学的内容，分三类。
只返回 JSON，第一个字符必须是 {，不要任何解释、不要 Markdown：
{"words":[{"w":"单词","cn":"意思","eg":"原文中该词所在的句子"}],
"phrases":[{"w":"短语/固定搭配","cn":"意思","eg":"原文句子"}],
"grammar":[{"point":"语法点名称","cn":"一句话说明","eg":"原文例句"}]}
单词最多12个，短语最多8个，语法最多4个。没有的类别给空数组。`;
  try{
    const raw=await callAI([{role:"user",content:chunk}],sys,1500);
    let s=raw.trim().replace(/^```json?/i,"").replace(/```$/,"").trim();
    const a=s.indexOf("{"),b=s.lastIndexOf("}");
    if(a>=0&&b>a)s=s.slice(a,b+1);
    const o=JSON.parse(s);
    return {
      words:Array.isArray(o.words)?o.words:[],
      phrases:Array.isArray(o.phrases)?o.phrases:[],
      grammar:Array.isArray(o.grammar)?o.grammar:[]
    };
  }catch(e){return null}
}

const TRASH_KEY="vocab_v5_trash";
let trash=load(TRASH_KEY,[]);          // [{type,data,label,deletedAt,extra}]
const TRASH_MAX=100, TRASH_DAYS=30;
let undoTimer=null;
// 入站：存删除快照并弹撤回条。type: word|mistake|phrase|grammar|article
function trashPush(type,data,label,extra){
  trash.push({type,data,label:label||"",deletedAt:Date.now(),extra:extra||null});
  // 清理超期/超量（按时间，保留最近的）
  const cut=Date.now()-TRASH_DAYS*86400000;
  trash=trash.filter(t=>t.deletedAt>=cut);
  if(trash.length>TRASH_MAX)trash=trash.slice(trash.length-TRASH_MAX);
  save(TRASH_KEY,trash);
  showUndoBar(label||"已删除");
}
function showUndoBar(label){
  const bar=document.getElementById("undobar"),msg=document.getElementById("undobar-msg");
  if(!bar||!msg)return;
  msg.textContent=`已删除：${label}`;
  bar.classList.add("show");
  if(undoTimer)clearTimeout(undoTimer);
  undoTimer=setTimeout(()=>bar.classList.remove("show"),5000);
}
function hideUndoBar(){const bar=document.getElementById("undobar");if(bar)bar.classList.remove("show");if(undoTimer)clearTimeout(undoTimer)}
// 撤回最近一条删除
function undoLast(){
  if(!trash.length){hideUndoBar();return}
  const entry=trash[trash.length-1];
  doRestore(entry);
  trash.pop();save(TRASH_KEY,trash);
  hideUndoBar();
  toast("已撤回 ↩");
}
// 从回收站恢复指定条（回收站页用）
function restoreTrash(idx){
  const entry=trash[idx];if(!entry)return;
  doRestore(entry);
  trash.splice(idx,1);save(TRASH_KEY,trash);
  toast("已恢复 ✓");
  renderTrash(document.getElementById("view"));
}
// 实际把一条回收记录还原回数据
function doRestore(entry){
  const {type,data,extra}=entry;
  if(type==="word"){
    if(!imported.find(w=>w.id===data.word.id))imported.push(data.word);
    if(data.srs)srs[data.word.id]=data.srs;
    if(data.tag&&typeof tagCache!=="undefined"){tagCache[data.word.id]=data.tag;save(TAG_KEY,tagCache)}
    save(IMP_KEY,imported);save(SRS_KEY,srs);
  }else if(type==="mistake"){
    if(!mistakes.find(m=>m.id===data.mistake.id))mistakes.push(data.mistake);
    save(MIS_KEY,mistakes);
  }else if(type==="phrase"){
    if(!userPhrases.find(p=>p.id===data.phrase.id))userPhrases.push(data.phrase);
    if(data.srs)srs[data.phrase.id]=data.srs;
    save(PHRASE_KEY,userPhrases);save(SRS_KEY,srs);rebuildPhraseGrammar();
  }else if(type==="grammar"){
    if(!userGrammar.find(g=>g.id===data.grammar.id))userGrammar.push(data.grammar);
    save(GRAMMAR_KEY,userGrammar);rebuildPhraseGrammar();
  }else if(type==="hiddenword"){
    delete hiddenWords[data.id];save(HIDDEN_KEY,hiddenWords);
    if(data.srs)srs[data.id]=data.srs;save(SRS_KEY,srs);
  }else if(type==="article"){
    if(!userArticles.find(a=>a.id===data.article.id))userArticles.push(data.article);
    saveArticles();articles=NCE_ARTICLES.concat(userArticles);
    // 恢复文章的词 + srs
    (data.words||[]).forEach(w=>{if(!imported.find(x=>x.id===w.id))imported.push(w)});
    Object.assign(srs,data.srsMap||{});
    if(data.lessonExplain)lessonExplain[data.article.id]=data.lessonExplain;
    save(IMP_KEY,imported);save(SRS_KEY,srs);save(LESSON_KEY,lessonExplain);
  }
  render();
}

// 重新生成当前展开标签的内容：清掉缓存，重新调 AI
function regenTag(){
  if(!cur||!openTag)return;
  if(tagCache[cur.id]){delete tagCache[cur.id][openTag];save(TAG_KEY,tagCache)}
  const k=openTag;openTag=null;   // 清空 openTag 让 queryTag 走"重新请求"分支
  queryTag(k);
}
async function queryTag(k){
  if(!cur)return;
  const box=document.getElementById("tag-result");
  if(openTag===k){openTag=null;if(box)box.innerHTML="";refreshTagBar();return}  // 再点收起
  openTag=k;
  const tag=TAGS.find(t=>t.k===k);
  if(tagCache[cur.id]&&tagCache[cur.id][k]){if(box)box.innerHTML=tagResultHtml(tagCache[cur.id][k]);refreshTagBar();return}
  refreshTagBar();
  if(box)box.innerHTML=`<div class="typing"><span></span><span></span><span></span></div>`;
  const sys=`你是英语老师，面对中文母语初学者。针对给定单词，${tag.ask}\n直接给内容，不要开场白、不要总结、不要 Markdown 符号。`;
  try{
    const text=await callAI([{role:"user",content:`单词：${cur.word}（${cur.cn||""}）`}],sys,500);
    const clean=text.replace(/```/g,"").trim();
    if(!tagCache[cur.id])tagCache[cur.id]={};
    tagCache[cur.id][k]=clean;save(TAG_KEY,tagCache);
    if(openTag===k&&box)box.innerHTML=tagResultHtml(clean);
    refreshTagBar();
  }catch(e){
    if(box)box.innerHTML=`<div style="font-size:.78rem;color:var(--accent)">查询失败：${e.message||"检查 Key"}</div>`;
  }
}

// 浏览历史栈：记看过的词，支持左滑返回
let viewed=[];
// 只读回看态：点"上一个"时不再重排队列，只是临时展示 viewed 里的词；
// peekSnapshot 保存回看前的真实状态(cur/flipped)，点"继续背"时原样恢复
let peekSnapshot=null;
// 下一词（右滑）：当前词丢回队尾，记入历史
function nextWord(){
  if(peekSnapshot){resumeFromPeek()}  // 回看中先恢复，再正常前进（理论上按钮已禁用，双保险）
  if(queue.length<=1){toast("就剩这一个啦");return false}
  viewed.push(cur);
  const w=queue.shift();queue.push(w);
  cur=queue[0];flipped=false;openTag=null;saveSession();render();
  return true;
}
// 上一词：只读展示 viewed 里最后一个词，不改动 queue/进度，看完点"继续背"原样恢复
function prevWord(){
  if(!viewed.length){toast("已经是第一个了");return false}
  if(!peekSnapshot)peekSnapshot={cur,flipped};  // 第一次点"上一个"时才存快照，避免连续点多次时把快照覆盖成回看态本身
  cur=viewed[viewed.length-1];
  flipped=true;   // 回看直接展示释义面，不用再点一次卡片
  openTag=null;
  render();
  return true;
}
// 继续背：从只读回看态恢复到真正在背的那个词，进度/队列完全不受影响
function resumeFromPeek(){
  if(!peekSnapshot)return;
  cur=peekSnapshot.cur;flipped=peekSnapshot.flipped;
  peekSnapshot=null;openTag=null;
  render();
}
// 左右滑（只在正面生效）：右滑下一词，左滑返回上一词
function bindSwipe(){
  const card=document.getElementById("card");
  if(!card)return;
  let x0=null,y0=null,dx=0,dragging=false;
  card.addEventListener("touchstart",e=>{
    if(flipped)return;
    x0=e.touches[0].clientX;y0=e.touches[0].clientY;dx=0;dragging=false;
    card.classList.remove("snap");
  },{passive:true});
  card.addEventListener("touchmove",e=>{
    if(flipped||x0===null)return;
    const cx=e.touches[0].clientX,cy=e.touches[0].clientY;
    if(!dragging&&Math.abs(cx-x0)<Math.abs(cy-y0))return;
    dragging=true;dx=cx-x0;
    card.classList.add("swiping");
    card.style.transform="translateX("+dx+"px) rotate("+(dx/40)+"deg)";
    card.style.opacity=Math.max(.4,1-Math.abs(dx)/300);
  },{passive:true});
  const snapBack=()=>{card.classList.add("snap");card.style.transform="";card.style.opacity=""};
  card.addEventListener("touchend",()=>{
    if(flipped||x0===null)return;
    x0=null;card.classList.remove("swiping");
    if(Math.abs(dx)>90){
      const next=dx<0;  // 左滑(dx<0)=下一张，右滑(dx>0)=返回上一张
      const canMove=next?(queue.length>1):(viewed.length>0);
      if(!canMove){next?toast("就剩这一个啦"):toast("已经是第一个了");snapBack();return}
      card.classList.add("snap");
      card.style.transform="translateX("+(next?-500:500)+"px) rotate("+(next?-20:20)+"deg)";
      card.style.opacity="0";
      setTimeout(next?nextWord:prevWord,180);
    }else{
      snapBack();
    }
  });
}
const GRADUATE_STREAK=3;  // 复习本的词连续点"记得/秒答"达到此次数自动毕业移出
function rate(q){
  grade(cur.id,q);
  if(q>=3)roundDone.add(cur.id);  // 难/记得/秒答=本轮过关；忘了不算
  if(cur._phrase){
    // 短语卡：只走 SRS，不进复习本
  }else if(q===0){addMistake(cur,"忘了");resetStreak(cur.id)}
  else if(q===3){addMistake(cur,"难");resetStreak(cur.id)}
  else{
    // 记得/秒答：若该词在复习本，累加连对；达标毕业移出，否则保留
    const m=mistakes.find(x=>x.id===cur.id);
    if(m){
      m.streak=(m.streak||0)+1;
      if(m.streak>=GRADUATE_STREAK){removeMistake(cur.id);toast("已掌握，移出复习本 🎓")}
      else save(MIS_KEY,mistakes);
    }
  }
  viewed.push(cur);                 // 评分推进：跟左滑一样记入历史，允许评分后"上一个"回看
  queue.shift();
  if(q<3)queue.push(cur);
  cur=queue[0]||null;flipped=false;openTag=null;
  if(cur){saveSession();render();return}
  // 一组背完：清进度+清会话+回首页，不静默续接新队列（避免"30/30 还在背"和刷新自动跳进背词）
  const done=roundDone.size;
  clearSession();roundDone=new Set();roundTotal=0;
  toast("这组背完啦 🎉 共 "+done+" 个");
  backToHome();
}
function resetStreak(id){const m=mistakes.find(x=>x.id===id);if(m&&m.streak){m.streak=0;save(MIS_KEY,mistakes)}}

// ===== 发音 =====
// 单词：有道真人发音（更准）；句子：浏览器语音合成（带语调，不机械）
function isSentence(s){return /\s/.test(s.trim())&&s.trim().split(/\s+/).length>=2}
let speakStop=false;   // 朗读停止标志，stopSpeak 置真后队列不再续播
function speakSynth(text,btn){
  const done=()=>{if(btn)btn.classList.remove("playing")};
  if(!window.speechSynthesis){done();toast("此浏览器不支持句子朗读");return}
  speechSynthesis.cancel();
  speakStop=false;   // 新一次朗读，重置停止标志
  // 选英语嗓音
  let voice=null;
  const pick=()=>{
    const vs=speechSynthesis.getVoices().filter(v=>/en[-_]/i.test(v.lang));
    if(vs.length){const pref=vs.find(v=>/US|United States/i.test(v.lang+v.name));voice=pref||vs[0]}
  };
  pick();if(!voice)speechSynthesis.onvoiceschanged=pick;
  // 长文本按句子切分，逐段排队朗读（绕开部分引擎单次朗读字符上限）
  const segs=String(text).match(/[^.!?。！？\n]+[.!?。！？]?/g)||[String(text)];
  const raw=segs.map(s=>s.trim()).filter(Boolean);
  // 合并过短的段（如 "Mr." "Mrs." 等缩写被误断），并到下一段
  const chunks=[];
  raw.forEach(s=>{
    if(chunks.length&&chunks[chunks.length-1].length<=4){chunks[chunks.length-1]+=" "+s}
    else chunks.push(s);
  });
  if(!chunks.length){done();return}
  let i=0;
  const speakNext=()=>{
    if(speakStop||i>=chunks.length){done();return}   // 已停止或读完，不再续播
    const u=new SpeechSynthesisUtterance(chunks[i]);
    u.lang="en-US";u.rate=.92;u.pitch=1;if(voice)u.voice=voice;
    u.onend=()=>{i++;speakNext()};
    u.onerror=()=>{i++;speakNext()};   // 某段失败跳过，继续读后面
    speechSynthesis.speak(u);
  };
  speakNext();
}
// 停止朗读：置停止标志 + 清空队列（供停止按钮调用）
function stopSpeak(){speakStop=true;if(window.speechSynthesis)speechSynthesis.cancel();document.querySelectorAll(".speak.playing").forEach(b=>b.classList.remove("playing"))}
function playAudio(text,btn){
  const w=(text||"").trim();if(!w)return;
  if(btn)btn.classList.add("playing");
  const done=()=>{if(btn)btn.classList.remove("playing")};
  if(isSentence(w))return speakSynth(w,btn);  // 句子走合成，自然
  // 单词：有道美音，失败再退回合成
  const a=new Audio("https://dict.youdao.com/dictvoice?type=0&audio="+encodeURIComponent(w));
  a.onended=done;
  a.onerror=()=>speakSynth(w,btn);
  a.play().catch(()=>speakSynth(w,btn));
}
function speak(btn){playAudio(cur.word,btn)}

  const g=grammar.find(x=>x.point&&x.id===id);if(!g)return;

  if(g.detail){renderMistake(document.getElementById("view"));scrollToGrammar(id);return}

// ===== 通用 AI 调用（四 provider，支持图片）=====
const VISION_PROVIDERS=["anthropic","doubao","kimi"];
async function callAI(messages, sys, maxTokens=600, images=null){
  if(!cfg.apikey)throw new Error("先在设置里填 API Key");
  if(cfg.provider==="doubao"&&!cfg.endpoint)throw new Error("豆包需要先填接入点 ID（ep-xxxx）");
  if(images&&images.length&&!VISION_PROVIDERS.includes(cfg.provider))throw new Error("当前服务商不支持图片，请切到豆包");
  const p=cfg.provider;
  let url,headers,body,readText;
  if(p==="anthropic"){
    url="https://api.anthropic.com/v1/messages";
    headers={"Content-Type":"application/json","x-api-key":cfg.apikey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
    let msgs=messages;
    if(images&&images.length){          // Anthropic: source.base64
      msgs=messages.map(m=>({...m}));
      const last=msgs[msgs.length-1];
      const blocks=images.map(d=>({type:"image",source:{type:"base64",media_type:d.mime,data:d.b64}}));
      blocks.push({type:"text",text:typeof last.content==="string"?last.content:""});
      last.content=blocks;
    }
    body={model:currentModel(),max_tokens:maxTokens,messages:msgs};
    if(sys)body.system=sys;
    readText=d=>(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  }else{
    if(p==="doubao")url="https://ark.cn-beijing.volces.com/api/v3/chat/completions";
    else if(p==="deepseek")url="https://api.deepseek.com/v1/chat/completions";
    else if(p==="kimi")url="https://api.moonshot.cn/v1/chat/completions";
    else url="https://openrouter.ai/api/v1/chat/completions";
    const model=p==="doubao"?cfg.endpoint:currentModel();
    headers={"Content-Type":"application/json","Authorization":"Bearer "+cfg.apikey};
    let msgs=sys?[{role:"system",content:sys},...messages]:messages.slice();
    if(images&&images.length){          // OpenAI 兼容: image_url data URL
      msgs=msgs.map(m=>({...m}));
      const last=msgs[msgs.length-1];
      const parts=[{type:"text",text:typeof last.content==="string"?last.content:""}];
      images.forEach(d=>parts.push({type:"image_url",image_url:{url:"data:"+d.mime+";base64,"+d.b64}}));
      last.content=parts;
    }
    body={model,max_tokens:maxTokens,messages:msgs};
    if(p==="kimi")body.thinking={type:"disabled"};  // Kimi 默认快速模式，不思考
    readText=d=>d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content;
  }
  const r=await fetchWithTimeout(url,{method:"POST",headers,body:JSON.stringify(body)},(images&&images.length)?AI_IMAGE_TIMEOUT:AI_CONNECT_TIMEOUT);
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||"接口报错");
  const text=readText(d);
  if(!text)throw new Error("空响应");
  return text;
}

// 取当前 provider 实际要用的模型 ID
function currentModel(){
  const p=cfg.provider;
  if(p==="doubao")return cfg.endpoint;  // 豆包用接入点
  const list=MODELS[p]||MODELS.deepseek;
  const saved=cfg.models[p];

async function callAIStream(messages, sys, onChunk, maxTokens=900, think=false, images=null){
  if(!cfg.apikey)throw new Error("先在设置里填 API Key");
  if(cfg.provider==="doubao"&&!cfg.endpoint)throw new Error("豆包需要先填接入点 ID（ep-xxxx）");
  if(images&&images.length&&!VISION_PROVIDERS.includes(cfg.provider))throw new Error("当前服务商不支持图片，请切到豆包/Kimi/Claude");
  const p=cfg.provider;
  const isThink=think;
  const mdl=currentModel();
  let url,headers,body,parseLine;
  if(p==="anthropic"){
    url="https://api.anthropic.com/v1/messages";
    headers={"Content-Type":"application/json","x-api-key":cfg.apikey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
    let msgs=messages;
    if(images&&images.length){
      msgs=messages.map(m=>({...m}));
      const last=msgs[msgs.length-1];
      const blocks=images.map(d=>({type:"image",source:{type:"base64",media_type:d.mime,data:d.b64}}));
      blocks.push({type:"text",text:typeof last.content==="string"?last.content:""});
      last.content=blocks;
    }
    body={model:mdl,max_tokens:maxTokens,messages:msgs,stream:true};
    if(sys)body.system=sys;
    if(isThink)body.thinking={type:"enabled",budget_tokens:2000};
    parseLine=obj=>(obj.type==="content_block_delta"&&obj.delta&&obj.delta.text)?obj.delta.text:"";
  }else{
    if(p==="doubao")url="https://ark.cn-beijing.volces.com/api/v3/chat/completions";
    else if(p==="deepseek")url="https://api.deepseek.com/v1/chat/completions";
    else if(p==="kimi")url="https://api.moonshot.cn/v1/chat/completions";
    else url="https://openrouter.ai/api/v1/chat/completions";
    headers={"Content-Type":"application/json","Authorization":"Bearer "+cfg.apikey};
    let msgs=sys?[{role:"system",content:sys},...messages]:messages.slice();
    if(images&&images.length){
      msgs=msgs.map(m=>({...m}));
      const last=msgs[msgs.length-1];
      const parts=[{type:"text",text:typeof last.content==="string"?last.content:""}];
      images.forEach(d=>parts.push({type:"image_url",image_url:{url:"data:"+d.mime+";base64,"+d.b64}}));
      last.content=parts;
    }
    body={model:mdl,max_tokens:maxTokens,messages:msgs,stream:true};
    if(isThink&&(p==="doubao"||p==="deepseek"))body.thinking={type:"enabled"};
    if(p==="kimi")body.thinking={type:isThink?"enabled":"disabled"};  // Kimi 跟随思考开关，默认关=快
    parseLine=obj=>(obj.choices&&obj.choices[0]&&obj.choices[0].delta&&obj.choices[0].delta.content)||"";
  }
  const r=await fetchWithTimeout(url,{method:"POST",headers,body:JSON.stringify(body)},(images&&images.length)?AI_IMAGE_TIMEOUT:AI_CONNECT_TIMEOUT);
  if(!r.ok){let e="接口报错";try{const j=await r.json();e=j.error&&j.error.message||e}catch(x){}throw new Error(e)}
  const reader=r.body.getReader();const dec=new TextDecoder();
  let buf="",full="";
  while(true){
    const {done,value}=await withIdleTimeout(reader.read(),AI_STREAM_IDLE_TIMEOUT,"响应中断，网络超时，请重试");
    if(done)break;
    buf+=dec.decode(value,{stream:true});
    const lines=buf.split("\n");buf=lines.pop();
    for(const line of lines){
      const t=line.trim();
      if(!t||!t.startsWith("data:"))continue;
      const data=t.slice(5).trim();
      if(data==="[DONE]")continue;
      try{const obj=JSON.parse(data);const piece=parseLine(obj);if(piece){full+=piece;onChunk(full)}}catch(e){}
    }
  }
  if(!full)throw new Error("空响应");
  return full;
}

async function askWord(){
  if(!cur)return;
  const ta=document.getElementById("sentence");if(!ta)return;
  const q=ta.value.trim();
  if(!q)return toast("先输入问题");
  if(askWordId!==cur.id){askWordId=cur.id;askHistory=[]}   // 切到新词→开新对话
  askHistory.push({role:"user",content:q});
  ta.value="";
  render();                                                 // 立即显示用户气泡、清空输入框
  const btn=document.getElementById("check-btn");if(btn){btn.disabled=true;btn.textContent="思考中…"}
  const thread=document.getElementById("ai-thread");
  let bubble=null;
  if(thread){bubble=document.createElement("div");bubble.className="ai-msg assistant";bubble.textContent="🤖 …";thread.appendChild(bubble)}
  const sys=`你是英语老师，学生是中文母语初学者。围绕单词「${cur.word}」(${cur.cn||""})进行多轮答疑：记住前面聊过的内容，结合上下文回答。用中文讲，简明清楚。如果学生贴了英文句子，就帮他批改并给出改好的句子。不要用 Markdown 符号。`;
  let ans="";

    await callAIStream(askHistory.map(m=>({role:m.role,content:m.content})),sys,(full)=>{
      ans=stripMd(full);if(bubble)bubble.textContent="🤖 "+ans;   // onChunk 累积全文，用 =

// 图片压缩：canvas 缩放+重新编码，控制体积（AI 读文字/内容够用，不需要原图分辨率）
const IMG_MAX_EDGE=1600;   // 最长边像素上限
const IMG_QUALITY=0.8;     // JPEG 压缩质量
function compressImage(f){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(f);
    const img=new Image();
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let{width:w,height:h}=img;
      const scale=Math.min(1,IMG_MAX_EDGE/Math.max(w,h));
      w=Math.round(w*scale);h=Math.round(h*scale);
      const canvas=document.createElement("canvas");
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,w,h);
      canvas.toBlob(blob=>{
        if(!blob)return reject(new Error("压缩失败"));
        const reader=new FileReader();
        reader.onload=()=>resolve({b64:reader.result.split(",")[1],mime:"image/jpeg"});
        reader.onerror=()=>reject(new Error("读取失败"));
        reader.readAsDataURL(blob);
      },"image/jpeg",IMG_QUALITY);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error("图片解析失败"))};
    img.src=url;
  });
}
// 通用：读图片文件为 {b64,mime}（自动压缩，控制体积，避免多图/大图请求超时）
function readImageFile(f){
  return new Promise((resolve,reject)=>{
    if(!f)return reject(new Error("没有文件"));
    if(f.size>15*1024*1024)return reject(new Error("图片太大，请换一张（原图上限15MB，会自动压缩后再发送）"));
    compressImage(f).then(resolve).catch(()=>{
      // canvas压缩失败（极少数格式不支持）时兜底：退回原图直读，仍保留5MB硬限制
      if(f.size>5*1024*1024)return reject(new Error("图片太大，请压到 5MB 内"));
      const reader=new FileReader();
      reader.onload=()=>resolve({b64:reader.result.split(",")[1],mime:f.type});
      reader.onerror=()=>reject(new Error("读取失败"));
      reader.readAsDataURL(f);
    });
  });
}
// 通用：读文本文件
function readTextFile(f){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=()=>reject(new Error("读取失败"));
    reader.readAsText(f);
  });
}

// ===== 批量录入：给词表，AI 全部补全不挑，分批处理 =====
async function batchImport(){
  const raw=document.getElementById("import-text").value.trim();
  if(!raw)return toast("先贴一串单词");
  // 解析：先按行丢掉 ### 标题行，再按逗号/分号拆词
  let words=raw.split(/\n/)
    .filter(line=>!/^\s*#/.test(line))        // 丢掉 # 开头的标题行
    .join(",")
    .split(/[,;]+/)
    .map(s=>s.trim())
    .filter(s=>s&&/[a-zA-Z]/.test(s));
  words=[...new Set(words.map(w=>w.toLowerCase()))];  // 去重
  if(!words.length)return toast("没解析出单词");
  if(words.length>200)return toast("一次最多 200 个，太多了分几次");
  const btn=document.getElementById("batch-btn");btn.disabled=true;
  const prog=document.getElementById("import-progress");
  const BATCH=10;  // 缩小批次：20 个词条常超 token 被截断导致整批 JSON.parse 失败
  const sys=`你是英语老师。用户会给你一批英文单词/短语，请为【每一个】生成词条，一个都不能漏、不要挑选。

【分类】每个词归到且只能归到这7个key之一：dev(科技开发)、tv(影视口语)、life(日常生活)、biz(职场商务)、academic(学术阅读)、news(新闻时事)、other(其他)。
【词性】pos填 n./v./adj./adv./phr. 等。
【场景】scene：词在专业场景有特殊含义就简短写明（如 print 在编程里指打印输出），否则留空。

只返回JSON数组，不要任何其他文字，数组长度必须等于输入单词数：[{"word":"原词","phonetic":"美式音标带斜杠","pos":"词性","cn":"中文释义","tip":"简短提示","exampleEn":"英文例句","exampleCn":"中文翻译","scene":"场景或空","cat":"7个key之一"}]`;
  const valid=["dev","tv","life","biz","academic","news","other"];
  let all=[];let failedBatches=0;
  for(let i=0;i<words.length;i+=BATCH){
    const chunk=words.slice(i,i+BATCH);
    prog.textContent=`处理中… ${Math.min(i+BATCH,words.length)}/${words.length}`;
    try{
      const text=await callAI([{role:"user",content:chunk.join(", ")}],sys,4000);  // 提高 token，10 词留足空间
      const arr=parseJsonArrayLoose(text);  // 容错解析：单批截断也能捞回大部分
      if(arr.length)all=all.concat(arr);
      else failedBatches++;
    }catch(e){
      failedBatches++;  // 单批失败（网络/接口）不连累其它批，继续下一批
    }
  }
  btn.disabled=false;
  if(!all.length){
    toast("录入失败：一个都没生成，检查 Key 或网络");
    prog.textContent="";
    return;
  }
  // 按 word 去重（容错解析可能重复捞到）
  const seen=new Set();
  all=all.filter(w=>{const k=(w.word||"").toLowerCase();if(!k||seen.has(k))return false;seen.add(k);return true});
  importCandidates=all.map(w=>({...w,pos:w.pos||"",scene:w.scene||"",cat:valid.includes(w.cat)?w.cat:"other",pick:true}));
  prog.textContent=`完成 ${importCandidates.length} 个词条`+(failedBatches?`（有 ${failedBatches} 批没成功，可对剩下的词再录一次）`:"");
  renderCandidates();
}
function renderCandidates(){
  const box=document.getElementById("import-result");

// 清理本应用旧数据: 旧短语/旧语法/旧 NCE 导入词(现由 nce.js 提供)。只动 vocab 自己的 key。
function cleanupLegacyData(){
  // 统计将清理的量
  const oldPh=userPhrases.length, oldGr=userGrammar.length;
  const oldNceWords=imported.filter(w=>(w.cat||"").indexOf("art_nce2_")===0);
  if(!oldPh&&!oldGr&&!oldNceWords.length){toast("没有需要清理的旧数据 ✓",2000);return}
  if(!confirm(`将清理：\n· 旧短语 ${oldPh} 条\n· 旧语法 ${oldGr} 条\n· 旧 NCE 导入词 ${oldNceWords.length} 个\n\n(NCE 内容已由课程库提供，这些是冗余残留)\n不影响军考等其他应用。确定？`))return;
  // 1. 删旧 NCE 导入词 + 其 srs
  const delIds=oldNceWords.map(w=>w.id);
  imported=imported.filter(w=>(w.cat||"").indexOf("art_nce2_")!==0);
  delIds.forEach(id=>delete srs[id]);
  // 2. 清旧短语/语法 + 其 srs(ph*/gr* 前缀, 排除 NCE 的 nce2_*_ph/gr)
  userPhrases.forEach(p=>{if(p.id&&srs[p.id])delete srs[p.id]});
  userGrammar.forEach(g=>{if(g.id&&srs[g.id])delete srs[g.id]});
  userPhrases=[]; userGrammar=[];
  // 3. 删用户文章里残留的 nce2_* (上一轮导入遗留)
  userArticles=userArticles.filter(a=>String(a.id||"").indexOf("nce2_")!==0);
  // 4. 持久化
  save(IMP_KEY,imported);
  save(SRS_KEY,srs);
  save(PHRASE_KEY,userPhrases);
  save(GRAMMAR_KEY,userGrammar);
  save(ART_KEY,userArticles);
  // 5. 重建内存视图
  rebuildPhraseGrammar();
  articles=NCE_ARTICLES.concat(userArticles);
  toast(`已清理 ${oldPh+oldGr+oldNceWords.length} 项旧数据 ✓`,2400);
  setTimeout(()=>location.reload(),900);
}

      renderQaImagePreview();
    });
  input.value="";  // 允许连续选同一张文件也能触发onchange
}
function renderQaImagePreview(){
  const p=document.getElementById("qa-img-preview");
  if(!p)return;
  if(!qaImages.length){p.innerHTML="";return}
  const thumbs=qaImages.map((img,i)=>
    `<span style="position:relative;display:inline-block">
      <img src="data:${img.mime};base64,${img.b64}" style="width:44px;height:44px;object-fit:cover;border-radius:6px;border:1px solid var(--line)">
      <button onclick="removeQaImage(${i})" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--ink);color:var(--paper);border:none;font-size:.6rem;line-height:1;cursor:pointer">✕</button>
    </span>`
  ).join("");
  p.innerHTML=`<div style="font-size:.76rem;color:var(--green);margin-bottom:6px">✓ 已选 ${qaImages.length} 张图片，点「AI 挑生词」提取 <button class="gear" onclick="clearQaImage()">全部移除</button></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">${thumbs}</div>`;
}
function removeQaImage(i){qaImages.splice(i,1);renderQaImagePreview()}
function clearQaImage(){qaImages=[];const p=document.getElementById("qa-img-preview");if(p)p.innerHTML=""}
// 加词归类：用户选"新建一课"时弹输入框建空文章，把新课的 art_id 设为当前目标
function onQaTargetChange(){
  const sel=document.getElementById("qa-target");if(!sel)return;
  if(sel.value==="__new__"){
    const title=(prompt("新课/文章名称（如：NCE2 L5 No Wrong Numbers）")||"").trim();
    if(!title){sel.value="__auto__";return}
    const id="art"+Date.now();
    userArticles.unshift({id,title,text:"",mode:"manual",explain:"",createdAt:Date.now()});
    articles=NCE_ARTICLES.concat(userArticles);
    saveArticles();
    // 重建下拉，选中刚建的这一课
    const opts=[`<option value="__auto__">自动（AI 按主题归类）</option>`]
      .concat(articles.map(a=>`<option value="${artCatKey(a.id)}"${a.id===id?" selected":""}>📄 ${a.title}</option>`))
      .concat([`<option value="__new__">➕ 新建一课…</option>`]);
    sel.innerHTML=opts.join("");
  }
}
// 读取加词弹窗当前选定的目标分类：__auto__ 表示用 AI 分类，否则返回 art_<id>
let qaLockedCat="__auto__";   // quickAddGo 时锁定，confirmQuickAdd 时读取（避免 DOM 被预览覆盖后读不到）
function qaTargetCat(){
  const sel=document.getElementById("qa-target");
  return sel?sel.value:"__auto__";
}
function onPickQaText(input){
  const f=input.files&&input.files[0];if(!f)return;
  readTextFile(f).then(txt=>{
    const ta=document.getElementById("qa-input");if(ta)ta.value=(ta.value?ta.value+"\n":"")+txt;
    toast("已读入文本，点「AI 挑生词」");
  }).catch(e=>toast(e.message));
}
function closeQuickAdd(){const ov=document.getElementById("quickadd-overlay");ov.classList.remove("open");ov.innerHTML="";qaImages=[]}
// mode: 'all'=贴词全部补全录入；'extract'=贴文章/图片让AI挑生词
async function quickAddGo(mode){
  const raw=(document.getElementById("qa-input")||{}).value||"";
  qaLockedCat=qaTargetCat();   // DOM 被预览覆盖前先锁定用户选的分类
  const res=document.getElementById("qa-result");
  const valid=["dev","tv","life","biz","academic","news","other"];
  const eBtn=document.getElementById("qa-extract"),aBtn=document.getElementById("qa-all");

  if(mode==="all"){
    const words=raw.split(/[\n,，]+/).map(s=>s.trim()).filter(Boolean);
    if(!words.length)return toast("先贴要加的词");
    if(words.length>50)return toast("一次最多 50 个，多了分几次");
    aBtn.disabled=true;aBtn.textContent="补全中…";res.textContent="处理中…";
    const sys=`你是英语老师。为用户给的每个英文单词/短语生成简洁词条，一个都不能漏，不要例句（例句以后再补）。
分类 cat 只能填这7个之一：dev(科技开发)、tv(影视口语)、life(日常生活)、biz(职场商务)、academic(学术阅读)、news(新闻时事)、other(其他)。
只返回JSON数组，字段精简：[{"word":"原词","phonetic":"美式音标带斜杠","pos":"词性","cn":"中文释义","cat":"7个key之一"}]`;
    try{
      const text=await callAI([{role:"user",content:words.join(", ")}],sys,3000);
      const arr=parseJsonArrayLoose(text);
      if(!arr.length)throw new Error("没生成出来，重试一次");
      showQuickAddPreview(arr,valid);
    }catch(e){res.textContent="失败："+(e.message||"检查 Key")}
    finally{aBtn.disabled=false;aBtn.textContent="全部补全录入"}
    return;
  }

  // extract：贴文章 或 图片
  if(!raw.trim()&&!qaImages.length)return toast("贴段英文，或选图片");
  if(qaImages.length&&!VISION_PROVIDERS.includes(cfg.provider))return toast("读图需切到豆包/Kimi/Claude");
  eBtn.disabled=true;eBtn.textContent="提取中…";res.textContent="AI 正在挑生词…";
  const sys=`你是英语老师，面向中文母语的英语学习者。从用户给的英文文章或图片里挑出值得学的生词/短语（跳过 the/is 这类太简单的），为每个生成词条。如果给了多张图片，请综合所有图片里的内容一起挑词，不要重复。
分类 cat 只能填：dev、tv、life、biz、academic、news、other。
只返回JSON数组：[{"word":"原词","phonetic":"音标","pos":"词性","cn":"中文释义","tip":"提示","exampleEn":"例句","exampleCn":"翻译","scene":"或空","cat":"key"}]`;
  const prompt=qaImages.length?(raw.trim()||"提取图片里值得学的英文生词"):raw.trim();
  try{
    const text=await callAI([{role:"user",content:prompt}],sys,3000,qaImages.length?qaImages:null);
    const arr=parseJsonArrayLoose(text);
    if(!arr.length)throw new Error("没挑出生词，换段文字或图片");
    showQuickAddPreview(arr,valid);
  }catch(e){res.textContent="失败："+(e.message||"检查 Key")}
  finally{eBtn.disabled=false;eBtn.textContent="AI 挑生词"}
}
// 候选词暂存（预览用）
let qaCandidates=[];
// AI 补全后：渲染勾选列表让用户确认
function showQuickAddPreview(arr,valid){
  // 过滤无 word 的、标记已存在的
  qaCandidates=arr.filter(c=>c.word).map(c=>({
    word:c.word,phonetic:c.phonetic||"",pos:c.pos||"",cn:c.cn||"",tip:c.tip||"",
    exampleEn:c.exampleEn||"",exampleCn:c.exampleCn||"",scene:c.scene||"",
    cat:valid.includes(c.cat)?c.cat:"other",
    dup:allWords().some(w=>w.word.toLowerCase()===c.word.toLowerCase()),
    checked:!allWords().some(w=>w.word.toLowerCase()===c.word.toLowerCase())  // 已存在的默认不勾
  }));
  if(!qaCandidates.length){toast("没挑出可加入的词");return}
  const ov=document.getElementById("quickadd-overlay");
  ov.innerHTML=`<div class="import-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <h2 style="font-family:Fraunces,serif;font-size:1.2rem">确认加入（${qaCandidates.length} 个）</h2>
      <button class="gear" onclick="closeQuickAdd()">✕</button>
    </div>
    <p style="font-size:.74rem;color:var(--ink-dim);margin-bottom:8px">勾选要加入的词，取消不想要的。灰色是已在库里的。</p>
    <div style="max-height:48vh;overflow-y:auto;margin-bottom:10px">
      ${qaCandidates.map((c,i)=>`<label style="display:flex;gap:8px;align-items:flex-start;padding:8px;border-radius:8px;background:${c.dup?'var(--paper2)':'var(--card)'};border:1px solid var(--line);margin-bottom:6px;${c.dup?'opacity:.6':''}">
        <input type="checkbox" ${c.checked?"checked":""} onchange="qaCandidates[${i}].checked=this.checked" style="margin-top:3px">
        <div style="flex:1">
          <div><b>${c.word}</b> <span style="font-size:.72rem;color:var(--ink-dim)">${c.phonetic} ${c.pos}</span>${c.dup?' <span style="font-size:.7rem;color:var(--accent)">已在库</span>':''}</div>
          <div style="font-size:.8rem">${c.cn}</div>
          <div style="font-size:.7rem;color:var(--ink-dim)">→ ${catName(c.cat)}</div>
        </div>
      </label>`).join("")}
    </div>
    <button class="ai-btn" onclick="confirmQuickAdd()">确认加入勾选的词</button>
  </div>`;
}
function confirmQuickAdd(){
  const target=qaLockedCat;             // 用锁定的分类（下拉框此时已被预览覆盖）
  const forceCat=(target&&target!=="__auto__")?target:null;
  let n=0;const byCat={};
  qaCandidates.forEach(c=>{
    if(!c.checked||c.dup)return;
    const useCat=forceCat||c.cat;        // 选了具体课就归到那课，否则用 AI 分类
    const rec={id:"imp"+Date.now()+"_"+(n++),word:c.word,phonetic:c.phonetic,pos:c.pos,cn:c.cn,tip:c.tip,exampleEn:c.exampleEn,exampleCn:c.exampleCn,scene:c.scene,cat:useCat};
    if(forceCat&&isArtCat(forceCat))rec.fromArticle=forceCat.slice(4);  // 与文章抽词保持一致，带上来源文章
    imported.push(rec);
    byCat[useCat]=(byCat[useCat]||0)+1;
  });
  save(IMP_KEY,imported);
  if(n){
    const detail=Object.keys(byCat).map(c=>`${catName(c)} ${byCat[c]}`).join("、");
    toast(`已加入 ${n} 个词 → ${detail}`,3200);
  }else{
    toast("没有勾选要加入的词");
  }
  qaCandidates=[];
  closeQuickAdd();
  if(page==="home"&&!studyStarted)render();
}


// ===== 启动 =====
bindCfg();
// 启动时同步底部导航高亮到恢复的页面
["home","assistant","mistake","stats"].forEach(x=>{const el=document.getElementById("nav-"+x);if(el)el.classList.toggle("active",x===page)});
// 检测：SRS 里有 Codepath 的词（cp_ 前缀）但词库 imported 里缺 → 老数据，提示重新同步
(function checkCodepathSync(){
  const cpInSrs=Object.keys(srs).filter(k=>k.indexOf("cp_")===0);
  if(!cpInSrs.length)return;
  const missing=cpInSrs.filter(k=>!imported.some(w=>w.id===k));
  if(missing.length){
    setTimeout(()=>toast(`检测到 ${missing.length} 个 Codepath 词未同步，请去 Codepath 课程页重新点一次「加入 SRS 复习」`),800);
  }
})();
// ===== 滚动翻页按钮：默认隐藏，往上滚露↑、往下滚露↓，停止后淡出；背卡态不显示 =====
(function initScrollNav(){
  let lastY=window.scrollY||0, hideTimer=null;
  const nav=()=>document.getElementById("scroll-nav");
  const up=()=>document.getElementById("scroll-up");
  const down=()=>document.getElementById("scroll-down");
  function onScroll(){
    const navEl=nav(),upEl=up(),downEl=down();
    if(!navEl||!upEl||!downEl)return;
    if(page==="home"&&studyStarted){navEl.style.display="none";return}  // 背卡态不显示
    if(document.body.scrollHeight-window.innerHeight<200){navEl.style.display="none";return} // 页面太短
    const y=window.scrollY||0, dy=y-lastY;
    if(Math.abs(dy)<4){lastY=y;return}
    navEl.style.display="flex";
    if(dy<0){upEl.style.display="block";downEl.style.display="none"}   // 上滑→回顶
    else{downEl.style.display="block";upEl.style.display="none"}        // 下滑→到底
    lastY=y;
    clearTimeout(hideTimer);
    hideTimer=setTimeout(()=>{if(nav())nav().style.display="none"},1600);
  }
  window.addEventListener("scroll",onScroll,{passive:true});
})();
// 启动：若有未完成的背词会话则自动恢复（中途切走/刷新回到原处）
restoreSession();
render();
checkArtProgress();
</script>
