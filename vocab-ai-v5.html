<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab AI v5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f6f2e9; --paper2:#efe9da; --card:#fffdf7; --ink:#2b2620; --ink-dim:#6b6358;
  --line:#ddd4c2; --accent:#b5462f; --accent-soft:#e8d3cb; --green:#5a7a4e; --gold:#c08a2d;
  --shadow:0 1px 3px rgba(43,38,32,.08),0 8px 24px rgba(43,38,32,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--paper);color:var(--ink);font-family:Inter,system-ui,sans-serif;line-height:1.6;padding-bottom:72px}
.wrap{max-width:640px;margin:0 auto;padding:16px}
h1{font-family:Fraunces,serif;font-weight:700;font-size:1.5rem;letter-spacing:-.01em}
.sub{color:var(--ink-dim);font-size:.78rem;margin-top:2px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0 16px}
.gear{background:none;border:1px solid var(--line);border-radius:10px;padding:6px 10px;font-size:.78rem;color:var(--ink-dim);cursor:pointer}
.gear:active{background:var(--paper2)}

/* 设置面板 */
.panel{display:none;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.panel.open{display:block}
.panel label{display:block;font-size:.72rem;color:var(--ink-dim);margin:10px 0 4px;font-weight:500}
.panel input,.panel select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--paper);font-size:.85rem;color:var(--ink);font-family:inherit}
.panel .hint{font-size:.68rem;color:var(--ink-dim);margin-top:6px;line-height:1.5}

/* 闪卡 */
.stage{text-align:center;padding:8px 0}
.progress{font-size:.72rem;color:var(--ink-dim);margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:32px 22px;box-shadow:var(--shadow);min-height:200px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;position:relative;overflow:hidden;touch-action:pan-y}
.card.swiping{transition:none}
.card.snap{transition:transform .2s ease,opacity .2s ease}
.cat-tag{position:absolute;top:12px;right:14px;font-size:.6rem;color:var(--ink-dim);border:1px solid var(--line);border-radius:20px;padding:2px 8px}
.word{font-family:Fraunces,serif;font-size:2.4rem;font-weight:600;letter-spacing:-.02em}
.phonetic{color:var(--accent);font-size:1rem;margin-top:6px;font-family:Fraunces,serif}
.speak{background:none;border:1px solid var(--line);border-radius:20px;padding:5px 14px;font-size:.78rem;color:var(--ink-dim);cursor:pointer;margin-top:14px;align-self:center;transition:transform .1s,border-color .1s}
.speak.playing{border-color:var(--green);color:var(--green);transform:scale(1.08)}
.flip-hint{font-size:.68rem;color:var(--ink-dim);margin-top:18px}
.back{border-top:1px dashed var(--line);margin-top:18px;padding-top:16px;text-align:left}
.cn{font-size:1.15rem;font-weight:600;margin-bottom:8px}
.tip{font-size:.8rem;color:var(--ink-dim);background:var(--paper2);border-radius:8px;padding:8px 11px;margin-bottom:10px}
.ex{font-size:.85rem;margin-bottom:3px}
.ex-cn{font-size:.78rem;color:var(--ink-dim)}

/* 评分按钮 */
.grades{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:18px}
.grade{padding:11px 4px;border:1px solid var(--line);border-radius:11px;background:var(--card);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink)}
.grade small{display:block;font-size:.6rem;font-weight:400;color:var(--ink-dim);margin-top:2px}
.grade:active{transform:scale(.96)}
.g-again{border-color:var(--accent-soft)} .g-again:active{background:var(--accent-soft)}
.g-good{border-color:#cfe0c4} .g-good:active{background:#e6efe0}

/* AI 造句区 */
.ai-box{margin-top:16px;text-align:left}
.ai-box textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-family:inherit;font-size:.85rem;resize:vertical;min-height:64px;background:var(--paper)}
.ai-btn{margin-top:8px;width:100%;padding:10px;border:none;border-radius:10px;background:var(--ink);color:var(--paper);font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit}
.ai-btn:disabled{opacity:.5}
.ai-result{margin-top:12px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;font-size:.82rem;display:none}
.ai-result.show{display:block}
.ai-result .score{font-family:Fraunces,serif;font-size:1.4rem;font-weight:700;color:var(--green)}
.ai-result .label{font-size:.7rem;color:var(--ink-dim)}
.ai-result .row{margin-top:8px}
.ai-result .rw{font-style:italic;color:var(--accent)}

/* 完成态 / 空态 */
.done{text-align:center;padding:48px 20px;color:var(--ink-dim)}
.done h2{font-family:Fraunces,serif;color:var(--ink);font-size:1.4rem;margin-bottom:8px}

/* 底部导航 */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.nav button{background:none;border:none;font-size:.72rem;color:var(--ink-dim);cursor:pointer;font-family:inherit;padding:4px 16px;border-radius:8px}
.nav button.active{color:var(--accent);font-weight:600}

/* 错题本 */
.mistake-item{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.mistake-item .w{font-family:Fraunces,serif;font-weight:600;font-size:1.05rem}
.mistake-item .c{font-size:.78rem;color:var(--ink-dim)}

.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:9px 16px;border-radius:20px;font-size:.78rem;opacity:0;transition:opacity .2s;pointer-events:none;z-index:99}
.import-overlay{display:none;position:fixed;inset:0;background:rgba(43,38,32,.4);z-index:200;overflow-y:auto;padding:20px 12px}
.import-overlay.open{display:block}
.import-box{max-width:560px;margin:20px auto;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 12px 40px rgba(43,38,32,.2)}
.toast.show{opacity:1}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>Vocab AI</h1>
      <div class="sub" id="sub">每天背几个，慢慢攒</div>
    </div>
    <button class="gear" onclick="togglePanel()">⚙ 设置</button>
  </div>

  <div class="panel" id="panel">
    <label>AI 服务商</label>
    <select id="provider">
      <option value="deepseek">DeepSeek（纯文本·性价比）</option>
      <option value="doubao">豆包 / 火山方舟</option>
      <option value="openrouter">OpenRouter（一把 Key 多模型）</option>
      <option value="anthropic">Anthropic 直连</option>
    </select>
    <label>API Key</label>
    <input type="password" id="apikey" placeholder="sk-..." autocomplete="off">
    <div id="ep-row" style="display:none">
      <label>火山方舟接入点 ID</label>
      <input type="text" id="endpoint" placeholder="ep-xxxx（在火山控制台创建推理接入点后获得）" autocomplete="off">
    </div>
    <label>学习范围</label>
    <select id="scope">
      <option value="all">全部</option>
      <option value="nce2">只学新概念二</option>
      <option value="dev">只学开发者词</option>
      <option value="tv">只学影视口语</option>
    </select>
    <div class="hint">Key 只存在你本机浏览器里，不上传。造句批改是可选功能，不填 Key 也能正常背单词。<br>豆包用的是火山方舟接入点，需要填 ep-xxxx；DeepSeek 直接填 sk- 开头的 Key。</div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="ai-btn" style="flex:1" onclick="saveCfg()">保存设置</button>
      <button class="gear" onclick="clearKey()">清空 Key</button>
    </div>
    <button class="gear" style="width:100%;margin-top:8px" onclick="exportImported()">导出我导入的词（JSON）</button>
  </div>

  <div id="view"></div>
</div>

<div class="nav">
  <button id="nav-home" class="active" onclick="go('home')">学习</button>
  <button id="nav-assistant" onclick="go('assistant')">AI 助手</button>
  <button id="nav-mistake" onclick="go('mistake')">错题本</button>
  <button id="nav-stats" onclick="go('stats')">统计</button>
</div>

<div class="toast" id="toast"></div>
<div class="import-overlay" id="import-overlay"></div>

<script>
// ===== Vocab AI v5 词库 =====
// 例句全部原创，不复制任何教材原文
// 结构: {id, word, phonetic, cn, tip, exampleEn, exampleCn, cat}

const WORDS = [
  // ========== 新概念二 Lesson 1-5 生词 (cat: nce2) ==========
  // L1
  {id:"nce001", word:"private", phonetic:"/ˈpraɪvət/", cn:"私人的；私密的", tip:"反义词 public（公开的）。private message = 私信", exampleEn:"This is a private room, please knock first.", exampleCn:"这是私人房间，请先敲门。", cat:"nce2"},
  {id:"nce002", word:"conversation", phonetic:"/ˌkɑːnvərˈseɪʃn/", cn:"谈话；交谈", tip:"have a conversation 进行交谈", exampleEn:"We had a long conversation about our plans.", exampleCn:"我们就计划进行了长谈。", cat:"nce2"},
  {id:"nce003", word:"theatre", phonetic:"/ˈθiːətər/", cn:"剧院；戏院", tip:"英式拼 theatre，美式拼 theater", exampleEn:"They went to the theatre to watch a play.", exampleCn:"他们去剧院看戏。", cat:"nce2"},
  {id:"nce004", word:"attention", phonetic:"/əˈtenʃn/", cn:"注意；关注", tip:"pay attention to 注意……", exampleEn:"Please pay attention to the road signs.", exampleCn:"请注意路标。", cat:"nce2"},
  {id:"nce005", word:"bear", phonetic:"/ber/", cn:"忍受；承受", tip:"过去式 bore。= stand / tolerate", exampleEn:"I cannot bear this noise any longer.", exampleCn:"我再也忍受不了这噪音了。", cat:"nce2"},
  {id:"nce006", word:"business", phonetic:"/ˈbɪznəs/", cn:"事；商业；事务", tip:"It's none of your business 不关你的事", exampleEn:"How I spend my money is my own business.", exampleCn:"我怎么花钱是我自己的事。", cat:"nce2"},
  {id:"nce007", word:"angrily", phonetic:"/ˈæŋɡrɪli/", cn:"生气地", tip:"angry 的副词形式，修饰动词", exampleEn:"She closed the door angrily and left.", exampleCn:"她生气地关上门走了。", cat:"nce2"},
  // L2
  {id:"nce008", word:"outside", phonetic:"/ˌaʊtˈsaɪd/", cn:"外面；在外面", tip:"反义词 inside（里面）", exampleEn:"It is raining outside, so take an umbrella.", exampleCn:"外面在下雨，带把伞吧。", cat:"nce2"},
  {id:"nce009", word:"ripe", phonetic:"/raɪp/", cn:"成熟的（果实）", tip:"形容水果熟了。ripe banana 熟香蕉", exampleEn:"These apples are ripe and ready to eat.", exampleCn:"这些苹果熟了，可以吃了。", cat:"nce2"},
  {id:"nce010", word:"weigh", phonetic:"/weɪ/", cn:"称……的重量；重达", tip:"名词形式 weight（重量）", exampleEn:"Can you weigh this box for me?", exampleCn:"你能帮我称一下这个箱子吗？", cat:"nce2"},
  {id:"nce011", word:"customer", phonetic:"/ˈkʌstəmər/", cn:"顾客", tip:"区别于 client（客户/委托人）", exampleEn:"The shop was full of customers this morning.", exampleCn:"今天上午店里满是顾客。", cat:"nce2"},
  // L3
  {id:"nce012", word:"send", phonetic:"/send/", cn:"寄；发送", tip:"过去式 sent。send sb sth 给某人发某物", exampleEn:"Please send me the file by email.", exampleCn:"请把文件用邮件发给我。", cat:"nce2"},
  {id:"nce013", word:"postcard", phonetic:"/ˈpoʊstkɑːrd/", cn:"明信片", tip:"post（邮寄）+ card（卡片）", exampleEn:"I sent her a postcard from Paris.", exampleCn:"我从巴黎给她寄了张明信片。", cat:"nce2"},
  {id:"nce014", word:"spoil", phonetic:"/spɔɪl/", cn:"破坏；糟蹋", tip:"过去式 spoiled / spoilt 都行", exampleEn:"The bad weather spoiled our trip.", exampleCn:"坏天气破坏了我们的旅行。", cat:"nce2"},
  {id:"nce015", word:"decide", phonetic:"/dɪˈsaɪd/", cn:"决定", tip:"decide to do 决定做某事。名词 decision", exampleEn:"We decided to stay home tonight.", exampleCn:"我们决定今晚待在家里。", cat:"nce2"},
  {id:"nce016", word:"lonely", phonetic:"/ˈloʊnli/", cn:"孤独的", tip:"注意：lonely 是孤独感，alone 只是独自一人", exampleEn:"He felt lonely in the new city.", exampleCn:"在新城市里他感到孤独。", cat:"nce2"},
  // L4
  {id:"nce017", word:"exciting", phonetic:"/ɪkˈsaɪtɪŋ/", cn:"令人兴奋的", tip:"修饰事物用 exciting，人感到兴奋用 excited", exampleEn:"The football match was really exciting.", exampleCn:"那场足球赛真令人兴奋。", cat:"nce2"},
  {id:"nce018", word:"diary", phonetic:"/ˈdaɪəri/", cn:"日记", tip:"keep a diary 记日记。别和 dairy（乳制品）混", exampleEn:"She writes in her diary every night.", exampleCn:"她每晚都写日记。", cat:"nce2"},
  {id:"nce019", word:"abroad", phonetic:"/əˈbrɔːd/", cn:"在国外；到国外", tip:"副词，前面不加介词。go abroad 出国", exampleEn:"He wants to study abroad next year.", exampleCn:"他想明年出国留学。", cat:"nce2"},
  // L5
  {id:"nce020", word:"capital", phonetic:"/ˈkæpɪtl/", cn:"首都；资本；大写字母", tip:"一词多义，看语境", exampleEn:"Beijing is the capital of China.", exampleCn:"北京是中国的首都。", cat:"nce2"},
  {id:"nce021", word:"exhibition", phonetic:"/ˌeksɪˈbɪʃn/", cn:"展览；展览会", tip:"动词 exhibit（展出）", exampleEn:"We saw an art exhibition at the museum.", exampleCn:"我们在博物馆看了一场艺术展。", cat:"nce2"},
  {id:"nce022", word:"latest", phonetic:"/ˈleɪtɪst/", cn:"最新的", tip:"late 的最高级之一，指时间最近的", exampleEn:"Have you read the latest news?", exampleCn:"你看最新消息了吗？", cat:"nce2"},
  {id:"nce023", word:"fashion", phonetic:"/ˈfæʃn/", cn:"时尚；流行", tip:"in fashion 流行的，out of fashion 过时的", exampleEn:"This style is back in fashion.", exampleCn:"这种风格又流行起来了。", cat:"nce2"},
  {id:"nce024", word:"event", phonetic:"/ɪˈvent/", cn:"事件；大事", tip:"编程里也指“事件”（点击、输入等）", exampleEn:"The wedding was a happy event.", exampleCn:"婚礼是件喜事。", cat:"nce2"},

  // ========== 开发者高频英语 (cat: dev) ==========
  // 报错 / 调试
  {id:"dev001", word:"error", phonetic:"/ˈerər/", cn:"错误；报错", tip:"程序出问题时最常见的词", exampleEn:"The program stopped because of an error.", exampleCn:"程序因为一个错误停止了。", cat:"dev"},
  {id:"dev002", word:"exception", phonetic:"/ɪkˈsepʃn/", cn:"异常", tip:"程序运行时抛出的错误对象。throw / catch an exception", exampleEn:"The code threw an exception when the file was missing.", exampleCn:"文件缺失时代码抛出了异常。", cat:"dev"},
  {id:"dev003", word:"traceback", phonetic:"/ˈtreɪsbæk/", cn:"回溯；错误追踪信息", tip:"Python 报错时打印的调用栈", exampleEn:"Read the traceback to find which line failed.", exampleCn:"看回溯信息找出哪一行出错了。", cat:"dev"},
  {id:"dev004", word:"debug", phonetic:"/ˌdiːˈbʌɡ/", cn:"调试；排错", tip:"de（去除）+ bug（程序错误）", exampleEn:"I spent an hour debugging this function.", exampleCn:"我花了一小时调试这个函数。", cat:"dev"},
  {id:"dev005", word:"syntax", phonetic:"/ˈsɪntæks/", cn:"语法（代码）", tip:"syntax error 语法错误", exampleEn:"A missing colon caused a syntax error.", exampleCn:"少了个冒号导致语法错误。", cat:"dev"},
  {id:"dev006", word:"valid", phonetic:"/ˈvælɪd/", cn:"有效的；合法的", tip:"反义词 invalid。常见于输入校验", exampleEn:"Please enter a valid email address.", exampleCn:"请输入有效的邮箱地址。", cat:"dev"},
  // 通用动词
  {id:"dev007", word:"run", phonetic:"/rʌn/", cn:"运行（代码）", tip:"日常是“跑步”，技术里是“运行程序”", exampleEn:"Run the script to see the result.", exampleCn:"运行脚本看看结果。", cat:"dev"},
  {id:"dev008", word:"call", phonetic:"/kɔːl/", cn:"调用（函数）", tip:"日常是“打电话”，技术里是“调用”", exampleEn:"This line calls the login function.", exampleCn:"这一行调用了登录函数。", cat:"dev"},
  {id:"dev009", word:"return", phonetic:"/rɪˈtɜːrn/", cn:"返回（值）", tip:"函数把结果 return 出去", exampleEn:"The function returns a list of names.", exampleCn:"这个函数返回一个名字列表。", cat:"dev"},
  {id:"dev010", word:"import", phonetic:"/ɪmˈpɔːrt/", cn:"导入（模块）", tip:"把别的代码引进来用", exampleEn:"Import the math module before using it.", exampleCn:"使用前先导入 math 模块。", cat:"dev"},
  {id:"dev011", word:"deploy", phonetic:"/dɪˈplɔɪ/", cn:"部署（上线）", tip:"把代码发布到服务器/线上", exampleEn:"We deploy the app every Friday.", exampleCn:"我们每周五部署应用。", cat:"dev"},
  {id:"dev012", word:"merge", phonetic:"/mɜːrdʒ/", cn:"合并（分支/代码）", tip:"Git 里把两个分支合到一起", exampleEn:"Merge your branch into main when ready.", exampleCn:"准备好后把你的分支合并到 main。", cat:"dev"},
  // Git / 协作
  {id:"dev013", word:"commit", phonetic:"/kəˈmɪt/", cn:"提交（代码记录）", tip:"Git 里保存一次改动", exampleEn:"Write a clear message for each commit.", exampleCn:"每次提交都写清楚说明。", cat:"dev"},
  {id:"dev014", word:"branch", phonetic:"/bræntʃ/", cn:"分支", tip:"从主线分出来独立开发", exampleEn:"Create a new branch for this feature.", exampleCn:"为这个功能新建一个分支。", cat:"dev"},
  {id:"dev015", word:"repository", phonetic:"/rɪˈpɑːzətɔːri/", cn:"代码仓库", tip:"简称 repo。代码存放的地方", exampleEn:"Clone the repository to your computer.", exampleCn:"把仓库克隆到你的电脑。", cat:"dev"},
  {id:"dev016", word:"pull", phonetic:"/pʊl/", cn:"拉取（远程代码）", tip:"把远程的更新拉到本地", exampleEn:"Pull the latest changes before you start.", exampleCn:"开始前先拉取最新改动。", cat:"dev"},
  {id:"dev017", word:"push", phonetic:"/pʊʃ/", cn:"推送（到远程）", tip:"把本地提交推到远程仓库", exampleEn:"Push your commits to the remote repository.", exampleCn:"把你的提交推送到远程仓库。", cat:"dev"},
  // API / Web
  {id:"dev018", word:"request", phonetic:"/rɪˈkwest/", cn:"请求", tip:"客户端向服务器发的请求", exampleEn:"The app sends a request to the server.", exampleCn:"应用向服务器发送一个请求。", cat:"dev"},
  {id:"dev019", word:"response", phonetic:"/rɪˈspɑːns/", cn:"响应；回复", tip:"服务器返回的结果", exampleEn:"The server returned an empty response.", exampleCn:"服务器返回了空响应。", cat:"dev"},
  {id:"dev020", word:"endpoint", phonetic:"/ˈendpɔɪnt/", cn:"接口端点", tip:"API 的某个访问地址", exampleEn:"This endpoint returns user data.", exampleCn:"这个端点返回用户数据。", cat:"dev"},
  {id:"dev021", word:"parse", phonetic:"/pɑːrs/", cn:"解析", tip:"把文本/数据拆解成结构。parse JSON", exampleEn:"Parse the JSON before reading the values.", exampleCn:"读取数值前先解析 JSON。", cat:"dev"},
  {id:"dev022", word:"token", phonetic:"/ˈtoʊkən/", cn:"令牌；词元", tip:"既指身份令牌，也指 LLM 的词元", exampleEn:"The API key is sent as an access token.", exampleCn:"API 密钥以访问令牌的形式发送。", cat:"dev"},
  // AI / LLM
  {id:"dev023", word:"prompt", phonetic:"/prɑːmpt/", cn:"提示词", tip:"给大模型的输入指令", exampleEn:"A clear prompt gives a better answer.", exampleCn:"清晰的提示词能得到更好的回答。", cat:"dev"},

  {id:"tv005", word:"awesome", phonetic:"/ˈɔːsəm/", cn:"太棒了；超赞", tip:"美剧口头禅，表示赞叹", exampleEn:"You finished it already? Awesome!", exampleCn:"你已经做完了？太棒了！", cat:"tv"},
  {id:"tv006", word:"guess", phonetic:"/ɡes/", cn:"猜；觉得（口语）", tip:"I guess 我觉得吧（不太确定的语气）", exampleEn:"I guess we could try that.", exampleCn:"我觉得我们可以试试那个吧。", cat:"tv"},

  {id:"tv011", word:"hang out", phonetic:"/hæŋ aʊt/", cn:"一起玩；闲混", tip:"约朋友出去玩、消磨时间", exampleEn:"We used to hang out every weekend.", exampleCn:"我们以前每周末都一起玩。", cat:"tv"},
  {id:"tv012", word:"awkward", phonetic:"/ˈɔːkwərd/", cn:"尴尬的", tip:"That's so awkward 太尴尬了", exampleEn:"There was an awkward silence at dinner.", exampleCn:"晚饭时有段尴尬的沉默。", cat:"tv"},
  {id:"tv013", word:"creepy", phonetic:"/ˈkriːpi/", cn:"瘆人的；令人发毛的", tip:"形容人或场景让人不舒服", exampleEn:"That old house is really creepy at night.", exampleCn:"那栋老房子晚上真瘆人。", cat:"tv"},

  {id:"tv015", word:"weird", phonetic:"/wɪrd/", cn:"奇怪的；古怪的", tip:"比 strange 更口语、更高频", exampleEn:"It feels weird being back home.", exampleCn:"回到家感觉怪怪的。", cat:"tv"},

  {id:"tv019", word:"wanna", phonetic:"/ˈwɒnə/", cn:"想要（want to 口语缩写）", tip:"Do you wanna…? 你想不想……？", exampleEn:"Do you wanna come with us?", exampleCn:"你想跟我们一起去吗？", cat:"tv"},
  {id:"tv020", word:"barely", phonetic:"/ˈberli/", cn:"几乎不；勉强", tip:"barely + 动词 = 差点没……", exampleEn:"I barely slept last night.", exampleCn:"我昨晚几乎没睡。", cat:"tv"},
  {id:"tv021", word:"owe", phonetic:"/oʊ/", cn:"欠（钱/人情）", tip:"I owe you one 我欠你个人情", exampleEn:"Thanks, I owe you one.", exampleCn:"谢了，我欠你个人情。", cat:"tv"},
  {id:"tv022", word:"creep", phonetic:"/kriːp/", cn:"讨厌鬼；慢慢移动", tip:"骂人时指“变态/讨厌的家伙”", exampleEn:"That guy is such a creep.", exampleCn:"那家伙真是个讨厌鬼。", cat:"tv"},
];
</script>
<script>
// ===== 状态 =====
const SRS_KEY="gh_vocab_srs_v1";
const CFG_KEY="vocab_v5_cfg";
let srs=load(SRS_KEY,{});          // {id:{ef,interval,reps,due}}
let cfg=load(CFG_KEY,{provider:"deepseek",apikey:"",endpoint:"",scope:"all"});
let queue=[], cur=null, flipped=false, page="home";

function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch(e){return d}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1600)}

// ===== 导入词库 =====
const IMP_KEY="vocab_v5_imported";
let imported=load(IMP_KEY,[]);   // 用户导入的词，结构同 WORDS，cat:"import"
// 全局词表 = 内置 + 导入。所有取词的地方用 allWords()
function allWords(){return WORDS.concat(imported)}

// ===== 设置面板 =====
function togglePanel(){document.getElementById("panel").classList.toggle("open")}
function bindCfg(){
  const p=document.getElementById("provider"),k=document.getElementById("apikey"),s=document.getElementById("scope"),ep=document.getElementById("endpoint"),epRow=document.getElementById("ep-row");
  p.value=cfg.provider;k.value=cfg.apikey;s.value=cfg.scope;ep.value=cfg.endpoint||"";
  const syncEpRow=()=>{epRow.style.display=cfg.provider==="doubao"?"block":"none"};
  syncEpRow();
  p.onchange=()=>{cfg.provider=p.value;save(CFG_KEY,cfg);syncEpRow()};
  k.onchange=()=>{cfg.apikey=k.value.trim();save(CFG_KEY,cfg)};
  ep.onchange=()=>{cfg.endpoint=ep.value.trim();save(CFG_KEY,cfg)};
  s.onchange=()=>{cfg.scope=s.value;save(CFG_KEY,cfg);buildQueue();render()};
}
// 显式保存：读当前控件值存盘，折叠面板
function saveCfg(){
  cfg.provider=document.getElementById("provider").value;
  cfg.apikey=document.getElementById("apikey").value.trim();
  cfg.endpoint=document.getElementById("endpoint").value.trim();
  cfg.scope=document.getElementById("scope").value;
  save(CFG_KEY,cfg);
  document.getElementById("panel").classList.remove("open");
  toast("已保存");
}
function clearKey(){
  cfg.apikey="";cfg.endpoint="";save(CFG_KEY,cfg);
  document.getElementById("apikey").value="";
  document.getElementById("endpoint").value="";
  toast("Key 已清空");
}

// ===== SM-2 =====
function grade(id,q){ // q: 0=again,3=hard,4=good,5=easy
  let c=srs[id]||{ef:2.5,interval:0,reps:0};
  if(q<3){c.reps=0;c.interval=1}
  else{
    c.reps++;
    if(c.reps===1)c.interval=1;
    else if(c.reps===2)c.interval=6;
    else c.interval=Math.round(c.interval*c.ef);
    c.ef=Math.max(1.3,c.ef+(0.1-(5-q)*(0.08+(5-q)*0.02)));
  }
  c.due=Date.now()+c.interval*86400000;
  srs[id]=c;save(SRS_KEY,srs);
}

function inScope(w){return cfg.scope==="all"||w.cat===cfg.scope}
function buildQueue(){
  const now=Date.now();
  queue=allWords().filter(inScope).filter(w=>{
    const c=srs[w.id];return !c||!c.due||c.due<=now;
  });
  // 简单排序：新词和到期词混合，限每轮 20
  queue=queue.slice(0,20);
}

// ===== 渲染 =====
function go(p){page=p;["home","assistant","mistake","stats"].forEach(x=>{const el=document.getElementById("nav-"+x);if(el)el.classList.toggle("active",x===p)});render()}
let studyStarted=false;  // 是否已从分类页进入学习
function render(){
  const v=document.getElementById("view");
  if(page==="assistant")return renderAssistant(v);
  if(page==="mistake")return renderMistake(v);
  if(page==="stats")return renderStats(v);
  // home：未开始学习时显示分类选择，已开始则显示卡片
  if(page==="home"&&!studyStarted)return renderHome(v);
  // study (卡片)
  if(!cur){buildQueue();cur=queue[0]||null;flipped=false}
  if(!cur){
    v.innerHTML=`<div class="done"><h2>这组都复习完啦</h2><p>当前分类没有到期的词。</p><button class="ai-btn" style="max-width:200px;margin:16px auto 0" onclick="backToHome()">← 选其他分类</button></div>`;return;
  }
  v.innerHTML=`
    <div class="stage">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <button class="gear" onclick="backToHome()">← 返回</button>
        <div class="progress" style="margin:0">本轮剩 ${queue.length} 词</div>
      </div>
      <div class="card" id="card" onclick="if(!flipped)flip()">
        <span class="cat-tag">${catName(cur.cat)}</span>
        <div class="word">${cur.word}</div>
        <div class="phonetic">${cur.phonetic}</div>
        <button class="speak" onclick="event.stopPropagation();speak(this)">🔊 发音</button>
        ${flipped?backHtml():`<div class="flip-hint">点卡片看释义 · 右滑下一个，左滑返回</div>`}
      </div>
      ${flipped?gradesHtml():""}
      ${flipped?aiHtml():""}
    </div>`;
  bindSwipe();
}
function catName(c){return c==="nce2"?"新概念二":c==="dev"?"开发者":c==="tv"?"影视口语":"我的收藏"}
function backToHome(){studyStarted=false;cur=null;flipped=false;viewed=[];go("home")}
// 分类选择页
function renderHome(v){
  const cats=[
    {key:"all",name:"全部",desc:"混合所有分类"},
    {key:"nce2",name:"新概念二",desc:"课本基础生词"},
    {key:"dev",name:"开发者英语",desc:"报错·文档·Git·API"},
    {key:"tv",name:"影视口语",desc:"看剧高频·课本不教"},
  ];
  if(imported.length)cats.push({key:"import",name:"我的收藏词",desc:"从文章导入"});
  v.innerHTML=`<div style="padding-top:8px">
    <p style="color:var(--ink-dim);font-size:.82rem;margin-bottom:14px">选一个分类开始背：</p>
    ${cats.map(c=>{
      const n=allWords().filter(w=>c.key==="all"||w.cat===c.key).length;
      const due=allWords().filter(w=>(c.key==="all"||w.cat===c.key)&&(!srs[w.id]||!srs[w.id].due||srs[w.id].due<=Date.now())).length;
      return `<div class="mistake-item" style="cursor:pointer" onclick="startStudy('${c.key}')">
        <div><div class="w">${c.name}</div><div class="c">${c.desc} · 共 ${n} 词</div></div>
        <div style="text-align:right"><div style="font-family:Fraunces,serif;font-weight:700;color:var(--accent)">${due}</div><div class="c">待学</div></div>
      </div>`;
    }).join("")}
    <button class="ai-btn" style="margin-top:14px" onclick="openImport()">＋ 从文章导入生词</button>
  </div>`;
}
function startStudy(cat){cfg.scope=cat;save(CFG_KEY,cfg);studyStarted=true;cur=null;flipped=false;viewed=[];buildQueue();cur=queue[0]||null;render()}
function backHtml(){
  const fav=mistakes.find(m=>m.id===cur.id)?"★ 已收藏":"☆ 收藏";
  return `
  <div class="back">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="cn">${cur.cn}</div>
      <button class="gear" id="fav-btn" onclick="event.stopPropagation();toggleFav()">${fav}</button>
    </div>
    <div class="tip">💡 ${cur.tip}</div>
    <div class="ex">${cur.exampleEn}</div>
    <div class="ex-cn">${cur.exampleCn}</div>
  </div>`;
}
function toggleFav(){
  if(mistakes.find(m=>m.id===cur.id)){removeMistake(cur.id);toast("已取消收藏")}
  else{addMistake(cur,"手动收藏");toast("已收藏到错题本")}
  document.getElementById("fav-btn").textContent=mistakes.find(m=>m.id===cur.id)?"★ 已收藏":"☆ 收藏";
}
function gradesHtml(){return `
  <div class="grades">
    <button class="grade g-again" onclick="rate(0)">忘了<small>重来</small></button>
    <button class="grade" onclick="rate(3)">难<small>勉强</small></button>
    <button class="grade g-good" onclick="rate(4)">记得<small>good</small></button>
    <button class="grade g-good" onclick="rate(5)">秒答<small>easy</small></button>
  </div>`;
}
function aiHtml(){return `
  <div class="ai-box">
    <textarea id="sentence" placeholder="用 ${cur.word} 造个句子，AI 帮你批改（可选）"></textarea>
    <button class="ai-btn" id="check-btn" onclick="checkSentence()">AI 批改造句</button>
    <div class="ai-result" id="ai-result"></div>
  </div>`;
}
function flip(){flipped=true;render()}
// 浏览历史栈：记看过的词，支持左滑返回
let viewed=[];
// 下一词（右滑）：当前词丢回队尾，记入历史
function nextWord(){
  if(queue.length<=1){toast("就剩这一个啦");return}
  viewed.push(cur);
  const w=queue.shift();queue.push(w);
  cur=queue[0];flipped=false;render();
}
// 上一词（左滑）：从历史弹回，重新放回队首
function prevWord(){
  if(!viewed.length){toast("已经是第一个了");return}
  // 把当前从队首挪走、上一个塞回队首
  const idx=queue.indexOf(cur);
  if(idx>=0)queue.splice(idx,1);
  queue.unshift(cur);              // 当前词回队列（不丢）
  const prev=viewed.pop();
  const pi=queue.indexOf(prev);
  if(pi>=0)queue.splice(pi,1);
  queue.unshift(prev);             // 上一词放队首
  cur=prev;flipped=false;render();
}
// 左右滑（只在正面生效）：右滑下一词，左滑返回上一词
function bindSwipe(){
  const card=document.getElementById("card");
  if(!card)return;
  let x0=null,y0=null,dx=0,dragging=false;
  card.addEventListener("touchstart",e=>{
    if(flipped)return;
    x0=e.touches[0].clientX;y0=e.touches[0].clientY;dx=0;dragging=false;
    card.classList.remove("snap");
  },{passive:true});
  card.addEventListener("touchmove",e=>{
    if(flipped||x0===null)return;
    const cx=e.touches[0].clientX,cy=e.touches[0].clientY;
    if(!dragging&&Math.abs(cx-x0)<Math.abs(cy-y0))return;
    dragging=true;dx=cx-x0;
    card.classList.add("swiping");
    card.style.transform="translateX("+dx+"px) rotate("+(dx/40)+"deg)";
    card.style.opacity=Math.max(.4,1-Math.abs(dx)/300);
  },{passive:true});
  card.addEventListener("touchend",()=>{
    if(flipped||x0===null)return;
    x0=null;card.classList.remove("swiping");
    if(Math.abs(dx)>90){
      const right=dx>0;             // 右滑=下一词，左滑=返回
      card.classList.add("snap");
      card.style.transform="translateX("+(right?500:-500)+"px) rotate("+(right?20:-20)+"deg)";
      card.style.opacity="0";
      setTimeout(right?nextWord:prevWord,180);
    }else{
      card.classList.add("snap");
      card.style.transform="";card.style.opacity="";
    }
  });
}
function rate(q){
  grade(cur.id,q);
  if(q<3)addMistake(cur,"答错收录");else removeMistake(cur.id);
  viewed=[];                        // 评分推进了进度，历史清空
  queue.shift();
  if(q<3)queue.push(cur);
  cur=queue[0]||null;flipped=false;render();
}

// ===== 发音（有道真人美音，失败退回浏览器合成）=====
function playAudio(word,btn){
  const w=word.trim();if(!w)return;
  if(btn)btn.classList.add("playing");
  const done=()=>{if(btn)btn.classList.remove("playing")};
  // type=0 美音, type=2 英音
  const a=new Audio("https://dict.youdao.com/dictvoice?type=0&audio="+encodeURIComponent(w));
  a.onended=done;
  a.onerror=()=>{ // 有道挂了/没网 -> 浏览器合成兜底
    if(window.speechSynthesis){const u=new SpeechSynthesisUtterance(w);u.lang="en-US";u.rate=.9;u.onend=done;speechSynthesis.cancel();speechSynthesis.speak(u)}
    else{done();toast("发音加载失败")}
  };
  a.play().catch(a.onerror);
}
function speak(btn){playAudio(cur.word,btn)}

// ===== 错题本 =====
const MIS_KEY="vocab_v5_mistakes";
let mistakes=load(MIS_KEY,[]);
function addMistake(w,from){if(!mistakes.find(m=>m.id===w.id)){mistakes.push({id:w.id,word:w.word,cn:w.cn,from:from||"答错收录"});save(MIS_KEY,mistakes)}}
function removeMistake(id){const i=mistakes.findIndex(m=>m.id===id);if(i>=0){mistakes.splice(i,1);save(MIS_KEY,mistakes)}}
function delMistake(id){removeMistake(id);renderMistake(document.getElementById("view"))}
function renderMistake(v){
  if(!mistakes.length){v.innerHTML=`<div class="done"><h2>错题本是空的</h2><p>背单词时点了“忘了”的词会自动进来；翻面后点☆也能手动收藏。</p></div>`;return}
  v.innerHTML=`<div style="padding-top:8px">
    <p style="color:var(--ink-dim);font-size:.76rem;margin-bottom:12px">点“忘了”自动收录，或翻面点☆手动收藏。点 🗑 移出。</p>
    ${mistakes.map(m=>`
    <div class="mistake-item">
      <div><div class="w">${m.word}</div><div class="c">${m.cn} · <span style="opacity:.7">${m.from||"答错收录"}</span></div></div>
      <div style="display:flex;gap:6px">
        <button class="gear" onclick="speakWord('${m.word.replace(/'/g,"")}')">🔊</button>
        <button class="gear" onclick="delMistake('${m.id}')">🗑</button>
      </div>
    </div>`).join("")}</div>`;
}
function speakWord(w){playAudio(w,null)}

// ===== 统计 =====
function renderStats(v){
  const total=allWords().filter(inScope).length;
  const seen=allWords().filter(inScope).filter(w=>srs[w.id]&&srs[w.id].reps>0).length;
  const mastered=allWords().filter(inScope).filter(w=>srs[w.id]&&srs[w.id].interval>=6).length;
  v.innerHTML=`<div class="done" style="padding-top:24px">
    <h2>${seen} / ${total}</h2><p>已开始记忆的词</p>
    <p style="margin-top:16px;font-size:1.05rem;color:var(--green)">${mastered} 个已稳固（间隔≥6天）</p>
    <p style="margin-top:4px">错题本 ${mistakes.length} 个待消灭</p>
  </div>`;
}

// ===== 通用 AI 调用（四 provider，支持图片）=====
const VISION_PROVIDERS=["anthropic","doubao"];
async function callAI(messages, sys, maxTokens=600, images=null){
  if(!cfg.apikey)throw new Error("先在设置里填 API Key");
  if(cfg.provider==="doubao"&&!cfg.endpoint)throw new Error("豆包需要先填接入点 ID（ep-xxxx）");
  if(images&&images.length&&!VISION_PROVIDERS.includes(cfg.provider))throw new Error("当前服务商不支持图片，请切到豆包");
  const p=cfg.provider;
  let url,headers,body,readText;
  if(p==="anthropic"){
    url="https://api.anthropic.com/v1/messages";
    headers={"Content-Type":"application/json","x-api-key":cfg.apikey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
    let msgs=messages;
    if(images&&images.length){          // Anthropic: source.base64
      msgs=messages.map(m=>({...m}));
      const last=msgs[msgs.length-1];
      const blocks=images.map(d=>({type:"image",source:{type:"base64",media_type:d.mime,data:d.b64}}));
      blocks.push({type:"text",text:typeof last.content==="string"?last.content:""});
      last.content=blocks;
    }
    body={model:"claude-haiku-4-5-20251001",max_tokens:maxTokens,messages:msgs};
    if(sys)body.system=sys;
    readText=d=>(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  }else{
    if(p==="doubao")url="https://ark.cn-beijing.volces.com/api/v3/chat/completions";
    else if(p==="deepseek")url="https://api.deepseek.com/v1/chat/completions";
    else url="https://openrouter.ai/api/v1/chat/completions";
    const model=p==="doubao"?cfg.endpoint:p==="deepseek"?"deepseek-v4-flash":"anthropic/claude-3.5-haiku";
    headers={"Content-Type":"application/json","Authorization":"Bearer "+cfg.apikey};
    let msgs=sys?[{role:"system",content:sys},...messages]:messages.slice();
    if(images&&images.length){          // OpenAI 兼容: image_url data URL
      msgs=msgs.map(m=>({...m}));
      const last=msgs[msgs.length-1];
      const parts=[{type:"text",text:typeof last.content==="string"?last.content:""}];
      images.forEach(d=>parts.push({type:"image_url",image_url:{url:"data:"+d.mime+";base64,"+d.b64}}));
      last.content=parts;
    }
    body={model,max_tokens:maxTokens,messages:msgs};
    readText=d=>d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content;
  }
  const r=await fetch(url,{method:"POST",headers,body:JSON.stringify(body)});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||"接口报错");
  const text=readText(d);
  if(!text)throw new Error("空响应");
  return text;
}

// ===== AI 造句批改 + 追问 =====
async function checkSentence(){
  const txt=document.getElementById("sentence").value.trim();
  if(!txt)return toast("先写句话");
  const btn=document.getElementById("check-btn");btn.disabled=true;btn.textContent="批改中…";
  const sys=`你是温和的英语老师，学生是中文母语的初级学习者。请批改下面这句话，要求：用简单中文解释（不用语法术语），先肯定再纠错。只返回JSON，不要任何其他文字：{"score":0-100整数,"praise":"先夸一句中文","fix":"中文指出问题或说没问题","rewrite":"改好的英文句子"}`;
  try{
    let text=await callAI([{role:"user",content:`目标单词：${cur.word}（${cur.cn}）\n学生造句：${txt}`}],sys,400);
    text=text.replace(/```json|```/g,"").trim();
    const o=JSON.parse(text);
    const box=document.getElementById("ai-result");
    box.innerHTML=`<div class="score">${o.score}</div><div class="label">分</div>
      <div class="row">✅ ${o.praise}</div>
      <div class="row">📝 ${o.fix}</div>
      <div class="row rw">↳ ${o.rewrite}</div>
      <div class="row" style="margin-top:12px;border-top:1px dashed var(--line);padding-top:10px">
        <input id="followup" placeholder="就这个词/这句话继续问…" style="width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:.82rem;background:var(--paper)">
        <button class="ai-btn" style="margin-top:6px" onclick="askFollowup('${cur.word}')">追问</button>
        <div id="followup-ans" style="margin-top:8px;font-size:.82rem"></div>
      </div>`;
    box.classList.add("show");
  }catch(e){
    toast("批改失败："+(e.message||"检查 Key 或网络"));
  }finally{btn.disabled=false;btn.textContent="AI 批改造句"}
}
async function askFollowup(word){
  const q=document.getElementById("followup").value.trim();
  if(!q)return toast("写下你的问题");
  const ans=document.getElementById("followup-ans");ans.textContent="思考中…";
  try{
    const sys="你是耐心的英语老师，面对中文母语初学者。用简单中文回答，简明扼要，避免术语。";
    const text=await callAI([{role:"user",content:`关于单词「${word}」：${q}`}],sys,500);
    ans.textContent=text;
  }catch(e){ans.textContent="";toast("追问失败："+(e.message||"检查 Key"))}
}

// ===== AI 助手页 =====
let chatHistory=[];
function renderAssistant(v){
  v.innerHTML=`<div style="padding-top:8px">
    <p style="color:var(--ink-dim);font-size:.8rem;margin-bottom:12px">问任何英语问题：语法、用法、翻译、词的区别…</p>
    <div id="chat-log" style="margin-bottom:12px">${chatHistory.map(m=>chatBubble(m)).join("")}</div>
    <div style="display:flex;gap:8px">
      <textarea id="chat-input" placeholder="比如：in 和 on 表示时间时怎么区分？" style="flex:1;border:1px solid var(--line);border-radius:10px;padding:10px;font-family:inherit;font-size:.85rem;resize:vertical;min-height:48px;background:var(--paper)"></textarea>
    </div>
    <button class="ai-btn" id="chat-send" style="margin-top:8px" onclick="sendChat()">发送</button>
  </div>`;
}
function chatBubble(m){
  const me=m.role==="user";
  return `<div style="margin-bottom:10px;text-align:${me?"right":"left"}">
    <div style="display:inline-block;max-width:85%;text-align:left;background:${me?"var(--accent-soft)":"var(--card)"};border:1px solid var(--line);border-radius:12px;padding:9px 12px;font-size:.84rem;white-space:pre-wrap">${m.content.replace(/</g,"&lt;")}</div>
  </div>`;
}
async function sendChat(){
  const input=document.getElementById("chat-input");
  const q=input.value.trim();if(!q)return toast("写点什么");
  chatHistory.push({role:"user",content:q});
  const btn=document.getElementById("chat-send");btn.disabled=true;btn.textContent="思考中…";
  renderAssistant(document.getElementById("view"));
  try{
    const sys="你是耐心友好的英语老师，面对中文母语的英语初学者。用简单中文讲解，给例句，避免生硬术语。回答简明，不要长篇大论。";
    const text=await callAI(chatHistory.slice(-8),sys,700);
    chatHistory.push({role:"assistant",content:text});
  }catch(e){
    chatHistory.push({role:"assistant",content:"出错了："+(e.message||"检查设置里的 Key")});
  }
  renderAssistant(document.getElementById("view"));
  const btn2=document.getElementById("chat-send");if(btn2){btn2.disabled=false;btn2.textContent="发送"}
}

// ===== 从文章导入生词 =====
let importCandidates=[];  // AI 提取的候选词 [{word,phonetic,cn,tip,exampleEn,exampleCn,pick}]
function openImport(){
  const ov=document.getElementById("import-overlay");
  ov.classList.add("open");
  ov.innerHTML=`
    <div class="import-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="font-family:Fraunces,serif;font-size:1.2rem">导入生词</h2>
        <button class="gear" onclick="closeImport()">✕ 关闭</button>
      </div>
      <p style="color:var(--ink-dim);font-size:.78rem;margin-bottom:8px">贴一段英文，或上传图片（截图、字幕、菜单都行），AI 会挑出生词生成词条。</p>
      <textarea id="import-text" placeholder="Paste an English paragraph here…" style="width:100%;min-height:100px;border:1px solid var(--line);border-radius:10px;padding:10px;font-family:inherit;font-size:.85rem;background:var(--paper);resize:vertical"></textarea>
      <label style="display:block;margin-top:10px;border:1px dashed var(--line);border-radius:10px;padding:12px;text-align:center;font-size:.8rem;color:var(--ink-dim);cursor:pointer">
        📷 选图片（需用豆包 Key）
        <input type="file" id="import-img" accept="image/*" style="display:none" onchange="onPickImage(this)">
      </label>
      <div id="img-preview" style="margin-top:8px"></div>
      <button class="ai-btn" id="extract-btn" style="margin-top:10px" onclick="extractWords()">AI 提取生词</button>
      <div id="import-result" style="margin-top:14px"></div>
    </div>`;
}
let importImage=null;  // {b64, mime}
function onPickImage(input){
  const f=input.files&&input.files[0];if(!f)return;
  if(f.size>5*1024*1024)return toast("图片太大，请压到 5MB 内");
  const reader=new FileReader();
  reader.onload=()=>{
    const b64=reader.result.split(",")[1];
    importImage={b64,mime:f.type};
    document.getElementById("img-preview").innerHTML=`<div style="display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--green)">✓ 已选图片<button class="gear" onclick="clearImage()">移除</button></div>`;
  };
  reader.readAsDataURL(f);
}
function clearImage(){importImage=null;document.getElementById("img-preview").innerHTML="";const i=document.getElementById("import-img");if(i)i.value=""}
function closeImport(){const ov=document.getElementById("import-overlay");ov.classList.remove("open");ov.innerHTML="";importImage=null}
async function extractWords(){
  const txt=document.getElementById("import-text").value.trim();
  if(!txt&&!importImage)return toast("贴段英文，或选张图片");
  if(txt.length>2000)return toast("段落太长，截短到 2000 字以内");
  if(importImage&&!VISION_PROVIDERS.includes(cfg.provider))return toast("读图需要切到豆包 Key");
  const btn=document.getElementById("extract-btn");btn.disabled=true;btn.textContent="提取中…";
  const sys=`你是英语老师，学生是中文母语的中级偏初学习者（认识基础词如 the/is/have，目标是读技术文档和看美剧）。从用户给的英文内容（文字或图片里的英文）中挑出对这类学习者算"生词"的词或短语（跳过过于简单的词）。每个生成词条。只返回JSON数组，不要任何其他文字：[{"word":"原形","phonetic":"美式音标带斜杠","cn":"中文释义","tip":"简短用法/记忆提示","exampleEn":"一句英文例句，优先贴近原文语境","exampleCn":"例句中文翻译"}]。最多挑12个最值得学的。`;
  const prompt=importImage?(txt||"提取图片里的英文生词"):txt;
  try{
    let text=await callAI([{role:"user",content:prompt}],sys,1500,importImage?[importImage]:null);
    text=text.replace(/```json|```/g,"").trim();
    const arr=JSON.parse(text);
    if(!Array.isArray(arr)||!arr.length)throw new Error("没提取到词");
    importCandidates=arr.map(w=>({...w,pick:true}));
    renderCandidates();
  }catch(e){
    toast("提取失败："+(e.message||"检查 Key 或换个输入"));
  }finally{btn.disabled=false;btn.textContent="AI 提取生词"}
}
function renderCandidates(){
  const box=document.getElementById("import-result");
  const dup=importCandidates.filter(c=>allWords().some(w=>w.word.toLowerCase()===c.word.toLowerCase())).length;
  box.innerHTML=`
    <p style="font-size:.78rem;color:var(--ink-dim);margin-bottom:8px">挑出 ${importCandidates.length} 个词${dup?`（其中 ${dup} 个词库里已有，已默认不勾选）`:""}，取消勾选不想要的：</p>
    ${importCandidates.map((c,i)=>{
      const exists=allWords().some(w=>w.word.toLowerCase()===c.word.toLowerCase());
      if(exists)c.pick=false;
      return `<label style="display:flex;gap:8px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:6px;cursor:pointer">
        <input type="checkbox" ${c.pick?"checked":""} onchange="importCandidates[${i}].pick=this.checked" style="margin-top:3px">
        <div style="flex:1">
          <div style="font-family:Fraunces,serif;font-weight:600">${c.word} <span style="color:var(--accent);font-size:.8rem">${c.phonetic||""}</span>${exists?' <span style="font-size:.65rem;color:var(--gold)">已有</span>':""}</div>
          <div style="font-size:.78rem">${c.cn}</div>
          <div style="font-size:.72rem;color:var(--ink-dim);margin-top:2px">${c.exampleEn||""}</div>
        </div>
      </label>`;
    }).join("")}
    <button class="ai-btn" style="margin-top:8px" onclick="saveImported()">保存勾选的词到「我的收藏词」</button>`;
}
function saveImported(){
  const picks=importCandidates.filter(c=>c.pick);
  if(!picks.length)return toast("一个都没勾");
  let n=0;
  picks.forEach(c=>{
    if(imported.some(w=>w.word.toLowerCase()===c.word.toLowerCase()))return;
    imported.push({id:"imp"+Date.now()+"_"+(n++),word:c.word,phonetic:c.phonetic||"",cn:c.cn,tip:c.tip||"",exampleEn:c.exampleEn||"",exampleCn:c.exampleCn||"",cat:"import"});
  });
  save(IMP_KEY,imported);
  toast("已存 "+n+" 个词");
  closeImport();
  if(page==="home"&&!studyStarted)render();  // 刷新分类页词数
}
function exportImported(){
  if(!imported.length)return toast("还没有导入的词");
  const blob=new Blob([JSON.stringify(imported,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="vocab-imported.json";a.click();
  URL.revokeObjectURL(url);
  toast("已导出 JSON");
}

// ===== 启动 =====
bindCfg();render();</script>
